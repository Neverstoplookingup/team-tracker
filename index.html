<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队协作工作台 - HC & Orbiva</title>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .drag-over { border: 2px dashed #6366f1 !important; background-color: rgba(99, 102, 241, 0.05) !important; }
        .whitespace-pre-wrap { white-space: pre-wrap; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .modal-overlay { animation: fadeIn 0.2s ease-out; }
        .modal-content { animation: slideUp 0.3s ease-out; }
        .live-dot { border-radius: 50%; animation: pulse-green 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 您的专属 Firebase 配置
        const firebaseConfig = {
          apiKey: "AIzaSyDyfETIW3f_mqphx7w2eErR_Z4w-EUWsZg",
          authDomain: "kanban-a8614.firebaseapp.com",
          projectId: "kanban-a8614",
          storageBucket: "kanban-a8614.firebasestorage.app",
          messagingSenderId: "42784160848",
          appId: "1:42784160848:web:12d40daec006adad1ea555",
          measurementId: "G-J9014LF5NG"
        };
        
        // 初始化真实的 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.FB = { auth, db, doc, setDoc, deleteDoc, updateDoc, onSnapshot, collection, signInAnonymously, onAuthStateChanged };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const initialData = [
            { id: 'task-init-1', category: '演示数据', no: '1', task: '删除这条记录，开始使用', detail: '这是为了防止看板为空而显示的示例数据，您可以直接删除它。', progress: '欢迎使用团队云端工作台！', status: 'To Do', assignee: 'Team', updatedAt: Date.now() }
        ];

        // Excel 解析逻辑
        const parsePastedData = (text) => {
            let matrix = [];
            if (text.indexOf('\t') !== -1) {
                matrix = text.split('\n').map(row => row.split('\t').map(c => {
                    let cell = c.trim();
                    if (cell.startsWith('"') && cell.endsWith('"')) return cell.substring(1, cell.length - 1);
                    return cell;
                }));
            } else {
                let row = [], field = '', inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    let char = text[i];
                    if (char === '"') {
                        if (inQuotes && text[i+1] === '"') { field += '"'; i++; } else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) { row.push(field); field = ''; } 
                    else if ((char === '\n' || (char === '\r' && text[i+1] === '\n')) && !inQuotes) {
                        if (char === '\r') i++;
                        row.push(field); matrix.push(row); row = []; field = '';
                    } else { field += char; }
                }
                if (field || row.length > 0) { row.push(field); matrix.push(row); }
            }
            return matrix;
        };

        const processExcelData = (matrix) => {
            if (!matrix || matrix.length < 2) return [];
            const headers = matrix[0].map(h => h.trim().replace(/^"|"$/g, ''));
            const colMap = {
                category: Math.max(0, headers.findIndex(h => h.includes('分类') || h.includes('板块'))),
                no: Math.max(1, headers.findIndex(h => h.includes('序号'))),
                task: Math.max(2, headers.findIndex(h => h.includes('事项') || h.includes('项目'))),
                detail: Math.max(3, headers.findIndex(h => h.includes('操作') || h.includes('详细') || h.includes('备注'))),
                progress: Math.max(4, headers.findIndex(h => h.includes('进展') || h.includes('预期'))),
                status: Math.max(5, headers.findIndex(h => h.includes('状态'))),
                assignee: Math.max(6, headers.findIndex(h => h.includes('参与人') || h.includes('负责人'))),
            };

            let data = [], lastCat = "", lastNo = "", lastTask = "";
            for (let i = 1; i < matrix.length; i++) {
                const row = matrix[i];
                if (!row || row.length === 0 || row.every(c => !c || c.trim() === '')) continue;
                
                const getCell = (idx) => (idx === -1 || idx >= row.length) ? "" : (row[idx] || "").trim().replace(/^"|"$/g, '');

                let cat = getCell(colMap.category); if (cat) lastCat = cat; else cat = lastCat;
                let no = getCell(colMap.no); if (no) lastNo = no; else no = lastNo;
                let task = getCell(colMap.task); if (task) lastTask = task; else task = lastTask;
                
                let detail = getCell(colMap.detail), progress = getCell(colMap.progress);
                let statusRaw = getCell(colMap.status) || "To Do", assignee = getCell(colMap.assignee);
                if (!detail && !progress && !assignee && (!statusRaw || statusRaw === "To Do")) continue;

                let status = "To Do";
                const sLower = statusRaw.toLowerCase();
                if (sLower.includes("progress") || sLower.includes("进行")) status = "In progress";
                else if (sLower.includes("done") || sLower.includes("完成")) status = "Done";
                else if (sLower.includes("pending") || sLower.includes("暂缓")) status = "Pending";
                else if (statusRaw.trim()) status = statusRaw; 
                
                data.push({ id: `task-imp-${Date.now()}-${i}`, category: cat || "默认板块", no, task: task || "未命名事项", detail, progress, status, assignee: assignee || "未分配", updatedAt: Date.now() });
            }
            return data;
        };

        const COLUMN_CONFIG = {
            'To Do': { title: '待处理 (To Do)', bg: 'bg-slate-100', border: 'border-slate-200', text: 'text-slate-700', icon: '📝' },
            'In progress': { title: '进行中 (In Progress)', bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-800', icon: '🚀' },
            'Pending': { title: '等待/暂缓 (Pending)', bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', icon: '⏸️' },
            'Done': { title: '已完成 (Done)', bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', icon: '✅' }
        };

        const generateId = () => 'task-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        const getInitials = (name) => {
            if (!name || name.trim() === '') return '?';
            const first = name.split(/[,&、]/)[0].trim();
            return /^[a-zA-Z]/.test(first) ? first.substring(0, 2).toUpperCase() : first.substring(0, 1);
        };
        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${hash % 360}, 70%, 80%)`;
        };
        const timeAgo = (timestamp) => {
            if (!timestamp) return '';
            const mins = Math.floor((Date.now() - timestamp) / 60000);
            if (mins < 1) return '刚刚更新';
            if (mins < 60) return `${mins} 分钟前`;
            if (mins < 1440) return `${Math.floor(mins/60)} 小时前`;
            return `${Math.floor(mins/1440)} 天前`;
        };

        const Avatar = ({ name }) => {
            const names = name ? name.split(/[,&、]/).map(n => n.trim()).filter(n => n) : [];
            if (names.length === 0) return <div className="text-xs text-slate-400 border border-slate-200 px-2 py-0.5 rounded-full bg-slate-50">未分配</div>;
            return (
                <div className="flex -space-x-2 overflow-hidden">
                    {names.slice(0, 3).map((n, i) => (
                        <div key={i} className="inline-block w-7 h-7 rounded-full ring-2 ring-white flex items-center justify-center text-[10px] font-bold text-slate-700 shadow-sm" style={{ backgroundColor: stringToColor(n) }} title={n}>
                            {getInitials(n)}
                        </div>
                    ))}
                    {names.length > 3 && (
                        <div className="inline-block w-7 h-7 rounded-full ring-2 ring-white bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-600 shadow-sm">+{names.length - 3}</div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [notConfigured, setNotConfigured] = useState(false);

            const [view, setView] = useState('kanban'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('All');
            const [filterAssignee, setFilterAssignee] = useState('All');
            const [draggedOverCol, setDraggedOverCol] = useState(null);
            
            const [editingTask, setEditingTask] = useState(null);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [importText, setImportText] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            // ------------------------------------------
            // 1. 初始化鉴权
            // ------------------------------------------
            useEffect(() => {
                const initApp = () => {
                    if (window.FIREBASE_NOT_CONFIGURED) {
                        setNotConfigured(true);
                        setLoading(false);
                        return;
                    }
                    
                    if (window.FB && window.FB.auth) {
                        window.FB.signInAnonymously(window.FB.auth).catch(e => console.error("匿名登录失败:", e));
                        const unsub = window.FB.onAuthStateChanged(window.FB.auth, setUser);
                        return () => unsub();
                    }
                };

                if (window.FIREBASE_NOT_CONFIGURED !== undefined || window.FB) {
                    initApp();
                } else {
                    window.addEventListener('firebase-loaded', initApp);
                    return () => window.removeEventListener('firebase-loaded', initApp);
                }
                
                const interval = setInterval(() => setTasks(prev => [...prev]), 60000);
                return () => clearInterval(interval);
            }, []);

            // ------------------------------------------
            // 2. 实时数据库监听 (自己的 Firebase)
            // ------------------------------------------
            useEffect(() => {
                if (!user || notConfigured || !window.FB) return;

                // 使用专门为个人部署设立的集合路径
                const colRef = window.FB.collection(window.FB.db, 'artifacts', 'github-deploy', 'public', 'data', 'kanban_tasks');
                
                const unsub = window.FB.onSnapshot(colRef, (snapshot) => {
                    const fetchedTasks = [];
                    snapshot.forEach(doc => fetchedTasks.push({ id: doc.id, ...doc.data() }));
                    
                    setTasks(fetchedTasks);
                    setLoading(false);
                }, (err) => {
                    console.error("云同步异常:", err);
                    alert("无法连接到数据库。如果您刚创建了 Firebase，请确保您的 Firestore 规则 (Rules) 是公开可读写的！\n规则应为：allow read, write: if true;");
                    setLoading(false);
                });

                return () => unsub();
            }, [user, notConfigured]);

            // ------------------------------------------
            // 3. 数据操作 (云端真实写入)
            // ------------------------------------------
            const handleSaveTask = async (e) => {
                e.preventDefault();
                setSaving(true);
                const formData = new FormData(e.target);
                const taskId = editingTask.id || generateId();
                const taskData = {
                    id: taskId,
                    category: formData.get('category').trim(),
                    no: formData.get('no').trim(),
                    task: formData.get('task').trim(),
                    detail: formData.get('detail').trim(),
                    progress: formData.get('progress').trim(),
                    status: formData.get('status'),
                    assignee: formData.get('assignee').trim(),
                    updatedAt: Date.now()
                };

                try {
                    const docRef = window.FB.doc(window.FB.db, 'artifacts', 'github-deploy', 'public', 'data', 'kanban_tasks', taskId);
                    await window.FB.setDoc(docRef, taskData);
                    showToast(editingTask.id ? '已同步更新至全团队' : '已发布新任务');
                    setEditingTask(null);
                } catch (error) { 
                    alert("保存失败，请检查 Firestore Rules 权限设置。"); 
                } 
                finally { setSaving(false); }
            };

            const handleDeleteTask = async () => {
                if(!editingTask.id) return;
                if(confirm('确定要彻底删除这条记录吗？这会在所有人的屏幕上消失。')) {
                    setSaving(true);
                    try {
                        const docRef = window.FB.doc(window.FB.db, 'artifacts', 'github-deploy', 'public', 'data', 'kanban_tasks', editingTask.id);
                        await window.FB.deleteDoc(docRef);
                        showToast('任务已从云端彻底删除'); setEditingTask(null);
                    } catch (error) { console.error(error); } 
                    finally { setSaving(false); }
                }
            };

            const handleDrop = async (e, newStatus) => {
                e.preventDefault();
                setDraggedOverCol(null);
                const taskId = e.dataTransfer.getData('taskId');
                if (!taskId) return;

                // 乐观 UI 更新（瞬间移动）
                setTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus, updatedAt: Date.now() } : t));

                // 异步后台同步
                if (user && window.FB) {
                    try {
                        const docRef = window.FB.doc(window.FB.db, 'artifacts', 'github-deploy', 'public', 'data', 'kanban_tasks', taskId);
                        await window.FB.updateDoc(docRef, { status: newStatus, updatedAt: Date.now() });
                    } catch (error) { showToast("状态同步失败，请检查权限"); }
                }
            };

            const handleImportSubmit = async () => {
                if (!importText.trim()) return;
                const parsedData = processExcelData(parsePastedData(importText));
                if (parsedData.length === 0) { alert("未能解析出有效数据，请检查格式！"); return; }
                
                setSaving(true);
                try {
                    for (const t of parsedData) {
                        const docRef = window.FB.doc(window.FB.db, 'artifacts', 'github-deploy', 'public', 'data', 'kanban_tasks', t.id);
                        await window.FB.setDoc(docRef, t);
                    }
                    showToast(`成功导入并同步 ${parsedData.length} 条数据！`);
                    setIsImportModalOpen(false); setImportText('');
                } catch (error) { alert("批量同步失败"); }
                finally { setSaving(false); }
            };

            // ------------------------------------------
            // 4. 共享链接与导出
            // ------------------------------------------
            const handleShare = () => {
                const input = document.createElement('input');
                input.value = window.location.href;
                document.body.appendChild(input);
                input.select();
                try {
                    document.execCommand('copy');
                    showToast('🔗 协作链接已复制，快发给团队成员吧！');
                } catch (err) {
                    alert('请复制浏览器地址栏的链接进行分享');
                }
                document.body.removeChild(input);
            };

            const handleExport = () => {
                const headers = ['分类/板块', '序号', '重点事项', '具体说明', '进展情况', '状态', '参与人'];
                const rows = tasks.map(t => [
                    `"${(t.category||'').replace(/"/g, '""')}"`, `"${(t.no||'').replace(/"/g, '""')}"`,
                    `"${(t.task||'').replace(/"/g, '""')}"`, `"${(t.detail||'').replace(/"/g, '""')}"`,
                    `"${(t.progress||'').replace(/"/g, '""')}"`, `"${(t.status||'').replace(/"/g, '""')}"`, `"${(t.assignee||'').replace(/"/g, '""')}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `项目进展看板_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link); link.click(); link.remove();
                showToast('数据已导出至本地备份');
            };

            // ------------------------------------------
            // 5. 数据过滤与衍生状态
            // ------------------------------------------
            const filteredTasks = useMemo(() => {
                const sortedTasks = [...tasks].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                return sortedTasks.filter(t => {
                    const matchSearch = `${t.task} ${t.detail} ${t.progress} ${t.assignee}`.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchCategory = filterCategory === 'All' || t.category === filterCategory;
                    const matchAssignee = filterAssignee === 'All' || (t.assignee && t.assignee.includes(filterAssignee));
                    return matchSearch && matchCategory && matchAssignee;
                });
            }, [tasks, searchTerm, filterCategory, filterAssignee]);

            const categories = useMemo(() => ['All', ...new Set(tasks.map(t => t.category).filter(Boolean))], [tasks]);
            const assignees = useMemo(() => {
                const set = new Set();
                tasks.forEach(t => { if(t.assignee) t.assignee.split(/[,&、]/).forEach(a => { const n = a.trim(); if(n) set.add(n); }) });
                return ['All', ...Array.from(set)];
            }, [tasks]);
            
            const columns = useMemo(() => {
                const cols = Object.keys(COLUMN_CONFIG);
                tasks.forEach(t => { if (t.status && !cols.includes(t.status)) cols.push(t.status); });
                return cols;
            }, [tasks]);

            // ------------------------------------------
            // 渲染：未配置数据库的提示页面
            // ------------------------------------------
            if (notConfigured) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border border-red-100">
                            <h1 className="text-2xl font-bold text-slate-800 mb-4 flex items-center">
                                <span className="text-red-500 mr-2">⚠️</span> 缺少数据库配置，无法同步数据
                            </h1>
                            <div className="space-y-4 text-slate-600 text-sm leading-relaxed bg-slate-50 p-5 rounded-xl border border-slate-200">
                                <p>您已将看板部署到了公共网络，但 <b>HTML 静态网页无法自己保存数据</b>。为了让您的团队能实时看到彼此的修改，您需要提供一个免费的 Firebase 数据库配置。</p>
                                <h3 className="font-bold text-slate-800 mt-6">🔧 配置步骤：</h3>
                                <ol className="list-decimal pl-5 space-y-2">
                                    <li>前往 <a href="https://firebase.google.com/" target="_blank" className="text-blue-600 hover:underline font-medium">Firebase 官网</a> 创建一个免费项目。</li>
                                    <li>在左侧菜单点击 <b>Build</b> -> <b>Firestore Database</b>，创建一个数据库，并选择 <b><span className="text-red-600">Start in test mode (测试模式)</span></b>。</li>
                                    <li>在左侧菜单点击 <b>Build</b> -> <b>Authentication</b>，点击 <b>Sign-in method</b>，找到并启用 <b>Anonymous (匿名登录)</b>。</li>
                                    <li>点击左上角设置齿轮 ⚙️ -> <b>Project settings</b>，滚动到底部添加一个 <b>Web App <code>&lt;/&gt;</code></b>。</li>
                                    <li>系统会生成一段代码，请复制其中的 <code>firebaseConfig</code> 内容。</li>
                                    <li>打开您代码的 <b>第 44 行</b>，将默认的文字替换为您复制的真实配置，重新推送到 GitHub 即可！</li>
                                </ol>
                            </div>
                        </div>
                    </div>
                );
            }

            // ------------------------------------------
            // 渲染视图
            // ------------------------------------------
            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <h2 className="text-slate-600 font-medium text-lg">正在连接并拉取云端数据...</h2>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col h-screen overflow-hidden">
                    {/* 顶部导航 */}
                    <header className="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0 shadow-sm z-10 relative">
                        <div className="flex items-center space-x-4">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl shadow-md flex items-center justify-center font-bold text-white text-xl">HC</div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-800 leading-tight flex items-center">
                                    团队协作工作台
                                    <span className="ml-3 inline-flex items-center px-2 py-0.5 rounded-full border bg-green-50 border-green-200">
                                        <span className="w-2 h-2 rounded-full mr-1.5 bg-green-500 live-dot"></span>
                                        <span className="text-[10px] font-bold tracking-wide text-green-700">基于 GitHub Pages 部署 · 云端实时同步中</span>
                                    </span>
                                </h1>
                                <p className="text-xs text-slate-500 mt-0.5">多端实时更新 / 云端数据库共 {tasks.length} 项任务</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                            <button onClick={handleShare} className="hidden md:flex bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-emerald-100 transition-colors items-center shadow-sm">
                                🔗 复制网站链接
                            </button>
                            <button onClick={() => setIsImportModalOpen(true)} className="bg-white text-slate-700 border border-slate-300 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-50 shadow-sm transition-colors flex items-center">
                                📊 从 Excel 导入云端
                            </button>

                            <div className="w-px h-6 bg-slate-200 mx-1"></div>

                            <div className="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
                                <button onClick={() => setView('kanban')} className={`px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${view === 'kanban' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>看板</button>
                                <button onClick={() => setView('table')} className={`px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${view === 'table' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>表格</button>
                            </div>

                            <button onClick={() => setEditingTask({ status: 'To Do' })} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-sm transition-colors flex items-center ml-2">
                                <span className="mr-1 text-lg leading-none">+</span> 新建任务
                            </button>
                        </div>
                    </header>

                    {/* 工具栏 (过滤 & 搜索) */}
                    <div className="bg-slate-50/80 backdrop-blur border-b border-slate-200 px-6 py-2 flex items-center justify-between shrink-0">
                        <div className="flex items-center space-x-4 overflow-x-auto no-scrollbar py-1">
                            <div className="flex items-center space-x-2 border-r border-slate-200 pr-4">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">看谁的</span>
                                <select 
                                    className="text-xs bg-white border border-slate-200 rounded-md py-1 px-2 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer"
                                    value={filterAssignee} onChange={(e) => setFilterAssignee(e.target.value)}
                                >
                                    {assignees.map(a => <option key={a} value={a}>{a === 'All' ? '全部人员' : a}</option>)}
                                </select>
                            </div>
                            
                            <div className="flex items-center space-x-2">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider whitespace-nowrap">板块</span>
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilterCategory(cat)} className={`px-3 py-1 rounded-full text-xs font-medium whitespace-nowrap transition-colors border ${filterCategory === cat ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'}`}>
                                        {cat === 'All' ? '显示全部' : cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center space-x-2">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 flex items-center pl-2 text-slate-400 text-xs">🔍</span>
                                <input type="text" placeholder="全局搜索..." className="pl-7 pr-3 py-1.5 bg-white border border-slate-200 rounded-full text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500 w-48 shadow-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={handleExport} className="text-slate-400 hover:text-indigo-600 p-1.5 rounded transition-colors" title="备份导出当前数据"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg></button>
                        </div>
                    </div>

                    {/* 主内容区 */}
                    <main className="flex-1 overflow-hidden p-6 relative">
                        {view === 'kanban' ? (
                            <div className="flex h-full space-x-6 overflow-x-auto no-scrollbar pb-4 items-start">
                                {columns.map(status => {
                                    const colTasks = filteredTasks.filter(t => t.status === status);
                                    const config = COLUMN_CONFIG[status] || { title: status, bg: 'bg-slate-100', border: 'border-slate-200', text: 'text-slate-700', icon: '📌' };
                                    const isDragOver = draggedOverCol === status;

                                    return (
                                        <div 
                                            key={status} onDragOver={(e) => { e.preventDefault(); setDraggedOverCol(status); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={(e) => handleDrop(e, status)}
                                            className={`flex-shrink-0 w-80 max-h-full flex flex-col rounded-2xl border ${config.bg} ${config.border} transition-all duration-200 ${isDragOver ? 'ring-2 ring-indigo-400 scale-[1.02] shadow-lg' : ''}`}
                                        >
                                            <div className="px-4 py-3 flex justify-between items-center rounded-t-2xl">
                                                <h3 className={`font-bold text-sm flex items-center space-x-2 ${config.text}`}><span>{config.icon}</span><span>{config.title}</span></h3>
                                                <span className="bg-white/60 text-slate-700 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">{colTasks.length}</span>
                                            </div>
                                            
                                            <div className="p-3 flex-1 overflow-y-auto no-scrollbar space-y-3">
                                                {colTasks.length === 0 ? (
                                                    <div className="h-20 border-2 border-dashed border-slate-300/50 rounded-xl flex items-center justify-center text-slate-400 text-sm">拖拽卡片至此</div>
                                                ) : (
                                                    colTasks.map(task => (
                                                        <div 
                                                            key={task.id} draggable="true" onDragStart={(e) => { e.dataTransfer.setData('taskId', task.id); e.currentTarget.style.opacity = '0.5'; }} onDragEnd={(e) => { e.currentTarget.style.opacity = '1'; }} onClick={() => setEditingTask(task)}
                                                            className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:shadow-md hover:border-indigo-300 transition-all group relative overflow-hidden"
                                                        >
                                                            <div className="absolute top-2 right-3 text-[10px] text-slate-400 font-medium bg-slate-50 px-1.5 py-0.5 rounded">
                                                                {timeAgo(task.updatedAt)}
                                                            </div>

                                                            <div className="flex justify-between items-start mb-2 pr-16">
                                                                <span className="px-2 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded uppercase tracking-wider">{task.category || '未分类'}</span>
                                                            </div>
                                                            <h4 className="font-semibold text-slate-800 text-sm mb-2 leading-snug group-hover:text-indigo-600 transition-colors">{task.task || '未命名事项'}</h4>
                                                            {task.progress && (
                                                                <div className="bg-blue-50/50 p-2 rounded text-xs text-blue-800 mb-3 border border-blue-100">
                                                                    <div className="font-semibold mb-0.5 opacity-80">当前进展:</div>
                                                                    <div className="line-clamp-3 whitespace-pre-wrap">{task.progress}</div>
                                                                </div>
                                                            )}
                                                            <div className="flex items-center justify-between pt-2 border-t border-slate-50 mt-1">
                                                                <Avatar name={task.assignee} />
                                                                <span className="text-[10px] text-indigo-500 font-medium opacity-0 group-hover:opacity-100 transition-opacity flex items-center bg-indigo-50 px-2 py-1 rounded">✎ 修改并同步</span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="overflow-auto flex-1 relative">
                                    <table className="min-w-full divide-y divide-slate-200">
                                        <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-32">板块</th>
                                                <th className="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-1/4">重点事项</th>
                                                <th className="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">进展/预期</th>
                                                <th className="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-24">状态</th>
                                                <th className="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-32">参与人</th>
                                                <th className="px-4 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider w-24">最后更新</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {filteredTasks.map(task => (
                                                <tr key={task.id} onClick={() => setEditingTask(task)} className="hover:bg-indigo-50/50 transition-colors cursor-pointer group">
                                                    <td className="px-4 py-4 whitespace-nowrap text-sm text-slate-600"><span className="bg-slate-100 px-2 py-1 rounded text-xs">{task.category}</span></td>
                                                    <td className="px-4 py-4 text-sm text-slate-900 font-medium">{task.task} {task.no && <span className="ml-2 text-xs text-slate-400 font-normal">#{task.no}</span>}</td>
                                                    <td className="px-4 py-4 text-sm text-slate-600"><div className="line-clamp-2 whitespace-pre-wrap">{task.progress || <span className="text-slate-300 italic">无记录</span>}</div></td>
                                                    <td className="px-4 py-4 whitespace-nowrap">
                                                        <span className={`px-2.5 py-1 inline-flex text-[10px] leading-5 font-semibold rounded-full border ${task.status === 'Done' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : task.status === 'In progress' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-slate-50 text-slate-700 border-slate-200'}`}>
                                                            {task.status}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-4 whitespace-nowrap"><Avatar name={task.assignee} /></td>
                                                    <td className="px-4 py-4 whitespace-nowrap text-right text-xs text-slate-400">{timeAgo(task.updatedAt)}</td>
                                                </tr>
                                            ))}
                                            {filteredTasks.length === 0 && <tr><td colSpan="6" className="px-6 py-12 text-center text-slate-400">当前视图无数据</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 模态框：编辑/新增卡片 */}
                    {editingTask && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] modal-content border border-slate-100">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center">
                                        {editingTask.id ? '多人协作 · 实时编辑' : '创建新任务'}
                                        {saving && <span className="ml-3 text-xs text-indigo-500 font-normal flex items-center">...正在云端同步</span>}
                                    </h2>
                                    <button type="button" onClick={() => setEditingTask(null)} className="text-slate-400 hover:text-slate-700 transition-colors p-1" disabled={saving}>✕</button>
                                </div>
                                
                                <form id="task-form" onSubmit={handleSaveTask} className="flex-1 overflow-y-auto p-6 space-y-5">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-xs font-medium text-slate-500 mb-1">板块 / 分类</label><input name="category" defaultValue={editingTask.category} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="例如：顶层设计" disabled={saving} /></div>
                                        <div><label className="block text-xs font-medium text-slate-500 mb-1">序号 (可选)</label><input name="no" defaultValue={editingTask.no} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" disabled={saving} /></div>
                                    </div>
                                    
                                    <div><label className="block text-xs font-medium text-slate-500 mb-1">重点事项标题 <span className="text-red-500">*</span></label><input required name="task" defaultValue={editingTask.task} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm font-medium text-slate-900" disabled={saving} /></div>
                                    <div><label className="block text-xs font-medium text-slate-500 mb-1">进展情况及预期 (将高亮展示在团队看板上)</label><textarea name="progress" defaultValue={editingTask.progress} rows="3" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm whitespace-pre-wrap leading-relaxed" disabled={saving}></textarea></div>
                                    <div><label className="block text-xs font-medium text-slate-500 mb-1">具体操作 / 详细说明 (长文本备注)</label><textarea name="detail" defaultValue={editingTask.detail} rows="3" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm whitespace-pre-wrap leading-relaxed bg-slate-50" disabled={saving}></textarea></div>

                                    <div className="grid grid-cols-2 gap-5 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-500 mb-1">当前状态</label>
                                            <select name="status" defaultValue={editingTask.status || 'To Do'} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm bg-white" disabled={saving}>
                                                <option value="To Do">待处理 (To Do)</option>
                                                <option value="In progress">进行中 (In Progress)</option>
                                                <option value="Pending">等待/暂缓 (Pending)</option>
                                                <option value="Done">已完成 (Done)</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-xs font-medium text-slate-500 mb-1">主要参与人 (逗号分隔)</label><input name="assignee" defaultValue={editingTask.assignee} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm bg-white" placeholder="如：Finn, Lydia" disabled={saving} /></div>
                                    </div>
                                </form>
                                
                                <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                    {editingTask.id ? <button type="button" onClick={handleDeleteTask} disabled={saving} className="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm transition-colors">彻底删除</button> : <div></div>}
                                    <div className="flex space-x-3">
                                        <button type="button" onClick={() => setEditingTask(null)} disabled={saving} className="px-5 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg font-medium">取消</button>
                                        <button type="submit" form="task-form" disabled={saving} className="px-6 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">
                                            {saving ? '保存中...' : '✨ 立即同步至团队'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 模态框：导入 Excel */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh] modal-content">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-lg font-bold text-slate-800">📊 从 Excel 批量覆盖/追加到云端</h2>
                                    <button onClick={() => setIsImportModalOpen(false)} className="text-slate-400 hover:text-slate-600" disabled={saving}>✕</button>
                                </div>
                                
                                <div className="p-6 flex-1 overflow-y-auto">
                                    <div className="bg-blue-50 text-blue-800 text-sm p-4 rounded-xl mb-4 border border-blue-100">
                                        <p className="font-bold mb-1">操作步骤：</p>
                                        <ol className="list-decimal pl-5 space-y-1 text-blue-700">
                                            <li>在您的 Excel/WPS 中框选需要导入的行（<b>需包含表头</b>）。</li>
                                            <li>按 <code>Ctrl+C</code> 复制。</li>
                                            <li>在下方文本框按 <code>Ctrl+V</code> 粘贴，点击确认。</li>
                                        </ol>
                                        <p className="mt-2 text-xs text-blue-600">注：这将把表格中的任务批量写入云端。如有重复事项，建议在导入后手动删除。</p>
                                    </div>
                                    <textarea 
                                        className="w-full h-48 p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-mono text-sm whitespace-pre"
                                        placeholder="请在此处粘贴 Excel 内容..." value={importText} onChange={(e) => setImportText(e.target.value)} disabled={saving}
                                    ></textarea>
                                </div>
                                
                                <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
                                    <button onClick={() => setIsImportModalOpen(false)} className="px-5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg" disabled={saving}>取消</button>
                                    <button onClick={handleImportSubmit} className="px-5 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm" disabled={saving}>
                                        {saving ? '正在同步至云端...' : '🚀 解析并同步至所有设备'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全局 Toast */}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-lg flex items-center space-x-3 animate-bounce z-50">
                            <span className="text-xl">✨</span><span className="text-sm font-medium">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
