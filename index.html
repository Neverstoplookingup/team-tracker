<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队协作工作台 - HC & Orbiva</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: #1e293b;
            overflow: hidden;
        }
        
        /* 优雅的全局自定义滚动条 (可见版，方便鼠标拖拽) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
        
        /* 针对特定容器的明显滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 1px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
        
        /* 拖拽视觉反馈 */
        .drag-over { 
            background-color: #f3e8ff !important; 
            border: 2px dashed #a855f7 !important; 
        }
        .dragging { opacity: 0.4; transform: scale(0.98); }
        
        /* 动画效果 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* 平滑过渡 */
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .swimlane-content { transition: max-height 0.5s ease-in-out, opacity 0.4s ease-in-out; overflow: hidden; }
        .swimlane-open { max-height: 4000px; opacity: 1; }
        .swimlane-closed { max-height: 0; opacity: 0; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const userConfig = {
          apiKey: "AIzaSyDyfETIW3f_mqphx7w2eErR_Z4w-EUWsZg",
          authDomain: "kanban-a8614.firebaseapp.com",
          projectId: "kanban-a8614",
          storageBucket: "kanban-a8614.firebasestorage.app",
          messagingSenderId: "42784160848",
          appId: "1:42784160848:web:12d40daec006adad1ea555",
          measurementId: "G-J9014LF5NG"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.FB = { 
            auth, db, doc, setDoc, deleteDoc, updateDoc, onSnapshot, collection, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged
        };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 图标组件库
        const Icons = {
            Eye: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            File: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            Play: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Pause: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Link: () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
            Edit: () => <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
            Search: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Upload: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Calendar: () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        };

        const COLUMN_CONFIG = {
            'Need Attention': { title: '需老板过目', borderColor: 'border-violet-400', headerBg: 'bg-violet-50', text: 'text-violet-700', icon: <Icons.Eye />, barColor: 'bg-violet-500' },
            'To Do': { title: '待处理', borderColor: 'border-slate-300', headerBg: 'bg-slate-100', text: 'text-slate-600', icon: <Icons.File />, barColor: 'bg-slate-400' },
            'In progress': { title: '进行中', borderColor: 'border-indigo-400', headerBg: 'bg-indigo-50', text: 'text-indigo-600', icon: <Icons.Play />, barColor: 'bg-indigo-500' },
            'Pending': { title: '等待/暂停', borderColor: 'border-amber-400', headerBg: 'bg-amber-50', text: 'text-amber-600', icon: <Icons.Pause />, barColor: 'bg-amber-400' },
            'Done': { title: '已完成', borderColor: 'border-emerald-400', headerBg: 'bg-emerald-50', text: 'text-emerald-600', icon: <Icons.Check />, barColor: 'bg-emerald-500' }
        };

        const PRIORITY_WEIGHTS = { 'P0 - 极急': 4, 'P1 - 高优': 3, 'P2 - 正常': 2, 'P3 - 暂缓': 1 };
        const PRIORITY_STYLES = {
            'P0 - 极急': 'border-l-red-500 border-y-slate-200 border-r-slate-200',
            'P1 - 高优': 'border-l-orange-400 border-y-slate-200 border-r-slate-200',
            'P2 - 正常': 'border-l-blue-400 border-y-slate-200 border-r-slate-200',
            'P3 - 暂缓': 'border-l-slate-300 border-y-slate-200 border-r-slate-200'
        };

        // 辅助函数
        const generateId = () => 'task-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        
        const getCreatedAt = (task) => {
            if (task.createdAt) return task.createdAt;
            if (task.id && task.id.startsWith('task-')) {
                const parts = task.id.split('-');
                if (parts.length >= 2) {
                    const ts = parseInt(parts[1], 36);
                    if (!isNaN(ts) && ts > 1000000000000) return ts;
                }
            }
            return task.updatedAt || Date.now();
        };

        const getInitials = (name) => {
            if (!name || name.trim() === '') return '?';
            const first = name.split(/[,&、]/)[0].trim();
            return /^[a-zA-Z]/.test(first) ? first.substring(0, 2).toUpperCase() : first.substring(0, 1);
        };
        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${hash % 360}, 65%, 75%)`;
        };
        const formatDateTime = (timestamp) => {
            if (!timestamp) return '-';
            const d = new Date(timestamp);
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const date = d.getDate().toString().padStart(2, '0');
            const year = d.getFullYear();
            const hours = d.getHours().toString().padStart(2, '0');
            const minutes = d.getMinutes().toString().padStart(2, '0');
            return `${month}/${date}/${year}, ${hours}:${minutes}`;
        };
        const parseDateOnly = (dateStr) => {
            if (!dateStr) return null;
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? null : d;
        };

        // 排序算法：优先级 > 状态 > 创建时间
        const sortTasks = (tasksList) => {
            return [...tasksList].sort((a, b) => {
                const wa = PRIORITY_WEIGHTS[a.priority] || 2;
                const wb = PRIORITY_WEIGHTS[b.priority] || 2;
                if (wa !== wb) return wb - wa;
                return getCreatedAt(b) - getCreatedAt(a);
            });
        };

        // UI 组件: 头像堆叠
        const AvatarGroup = ({ name }) => {
            const names = name ? name.split(/[,&、]/).map(n => n.trim()).filter(Boolean) : [];
            if (names.length === 0) return <span className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-sm">未分配</span>;
            return (
                <div className="flex items-center">
                    <div className="flex -space-x-1.5">
                        {names.slice(0, 3).map((n, i) => (
                            <div key={i} className="w-5 h-5 rounded-full ring-2 ring-white flex items-center justify-center text-[9px] font-bold text-slate-700 shadow-sm" style={{ backgroundColor: stringToColor(n) }} title={n}>
                                {getInitials(n)}
                            </div>
                        ))}
                        {names.length > 3 && <div className="w-5 h-5 rounded-full ring-2 ring-white bg-slate-200 flex items-center justify-center text-[9px] font-bold text-slate-600 shadow-sm">+{names.length - 3}</div>}
                    </div>
                    {names.length === 1 && <span className="text-[10px] text-slate-500 ml-1.5 truncate max-w-[60px] font-medium">{names[0]}</span>}
                </div>
            );
        };

        // UI 组件: 看板列内部的板块折叠组
        const CategoryAccordionGroup = ({ category, tasks, onEdit }) => {
            const [isOpen, setIsOpen] = useState(true);
            const sortedTasks = sortTasks(tasks);

            return (
                <div className="mb-3 bg-white/60 rounded-xl shadow-sm border border-slate-200/60 overflow-hidden">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between px-3 py-2.5 hover:bg-white transition-colors border-b border-slate-100/50">
                        <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                            {category}
                        </span>
                        <div className="flex items-center space-x-2">
                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">{sortedTasks.length}</span>
                            <svg className={`w-3.5 h-3.5 text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </button>
                    <div className={`transition-all duration-300 overflow-hidden ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-2 space-y-2 bg-slate-50/20">
                            {sortedTasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} hideCategoryLabel={true} />)}
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 任务卡片
        const TaskCard = ({ task, onEdit, onDragStart, onDragEnd, hideCategoryLabel = false }) => {
            const handleDragStart = (e) => {
                e.dataTransfer.setData('taskId', task.id);
                setTimeout(() => e.target.classList.add('dragging'), 0);
                if (onDragStart) onDragStart(e);
            };
            const handleDragEnd = (e) => {
                e.target.classList.remove('dragging');
                if (onDragEnd) onDragEnd(e);
            };

            const borderClass = PRIORITY_STYLES[task.priority] || PRIORITY_STYLES['P2 - 正常'];
            const isNeedAttention = task.isUrgent === true;

            return (
                <div 
                    draggable="true" 
                    onDragStart={handleDragStart} 
                    onDragEnd={handleDragEnd} 
                    onClick={() => onEdit(task)}
                    className={`bg-white p-3.5 rounded-xl border-l-[5px] border-y border-r cursor-grab active:cursor-grabbing hover:shadow-md smooth-transition group relative flex flex-col min-h-[100px] ${borderClass} ${isNeedAttention ? 'ring-2 ring-violet-200 shadow-violet-100 bg-violet-50/30' : 'shadow-sm'}`}
                >
                    <div className="flex justify-between items-start mb-2.5">
                        <div className="flex flex-wrap gap-1.5 pr-2 flex-1">
                            {!hideCategoryLabel && <span className="px-1.5 py-0.5 bg-slate-100 text-slate-500 text-[10px] font-medium rounded-md">{task.category || '未分类'}</span>}
                            
                            {isNeedAttention && (
                                <span className="px-1.5 py-0.5 bg-violet-100 text-violet-700 border border-violet-200 text-[10px] font-bold rounded-md flex items-center shadow-sm">
                                    👀 待过目
                                </span>
                            )}
                            
                            {/* 如果在过目列中，显示原底层状态 */}
                            {isNeedAttention && task.status && (
                                <span className="px-1.5 py-0.5 bg-white text-slate-500 border border-slate-200 text-[10px] font-medium rounded-md flex items-center">
                                    {COLUMN_CONFIG[task.status]?.title.split(' ')[0] || task.status}
                                </span>
                            )}
                        </div>
                        
                        {/* 右上角优先级徽章 */}
                        <div className="shrink-0 ml-2">
                            {task.priority === 'P0 - 极急' && <span className="text-[11px] font-bold text-red-600 bg-red-50 border border-red-100 px-1.5 py-0.5 rounded shadow-sm">🚨 P0</span>}
                            {task.priority === 'P1 - 高优' && <span className="text-[11px] font-bold text-orange-600 bg-orange-50 border border-orange-100 px-1.5 py-0.5 rounded shadow-sm">🔥 P1</span>}
                            {task.priority === 'P2 - 正常' && <span className="text-[11px] font-bold text-blue-600 bg-blue-50 border border-blue-100 px-1.5 py-0.5 rounded shadow-sm">🔵 P2</span>}
                            {task.priority === 'P3 - 暂缓' && <span className="text-[11px] font-bold text-slate-500 bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded shadow-sm">🟢 P3</span>}
                        </div>
                    </div>
                    
                    <h4 className="font-semibold text-slate-800 text-sm mb-2 leading-relaxed group-hover:text-indigo-600 transition-colors">
                        {task.task || '未命名事项'}
                    </h4>
                    
                    {task.detail && (
                        <div className="mb-2">
                            <p className="text-xs text-slate-500 line-clamp-2 leading-relaxed bg-slate-50/80 p-1.5 rounded-md border border-slate-100">{task.detail}</p>
                        </div>
                    )}
                    
                    {task.progress && (
                        <div className="mb-3 flex-1">
                            <p className="text-[13px] text-slate-600 line-clamp-3 leading-relaxed whitespace-pre-wrap">{task.progress}</p>
                        </div>
                    )}

                    {task.attachmentUrl && (
                        <div className="mt-auto mb-3">
                            <button onClick={(e) => { e.stopPropagation(); window.open(task.attachmentUrl, '_blank'); }} className="max-w-full flex items-center space-x-1.5 px-2 py-1 bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-200 rounded-md text-xs text-slate-600 hover:text-indigo-600 transition-colors shadow-sm w-fit" title={task.attachmentName || '查看附件'}>
                                <Icons.Link />
                                <span className="truncate max-w-[140px] font-medium">{task.attachmentName || '访问链接'}</span>
                            </button>
                        </div>
                    )}
                    
                    <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100/80">
                        <AvatarGroup name={task.assignee} />
                        <div className="flex items-center space-x-2">
                            { (task.startDate || task.dueDate) && (
                                <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${(!task.dueDate || new Date(task.dueDate) < new Date()) && task.status !== 'Done' ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'}`}>
                                    {task.startDate ? task.startDate.substring(5).replace('-', '.') : '未定'} 
                                    {' 至 '} 
                                    {task.dueDate ? task.dueDate.substring(5).replace('-', '.') : '至今'}
                                </span>
                            )}
                            <span className="opacity-0 group-hover:opacity-100 smooth-transition text-indigo-500 bg-indigo-50 p-1 rounded"><Icons.Edit /></span>
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 可折叠板块内项目概览
        const CollapsibleSwimlane = ({ catName, columns, catTasks, draggedOverCol, onDragOver, onDragLeave, onDrop, onEdit }) => {
            const [isOpen, setIsOpen] = useState(true);

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col mb-5 smooth-transition">
                    <button onClick={() => setIsOpen(!isOpen)} className="bg-slate-50 hover:bg-slate-100 transition-colors px-4 py-3.5 flex justify-between items-center w-full border-b border-slate-200">
                        <div className="flex items-center space-x-3">
                            <svg className={`w-4 h-4 text-slate-400 smooth-transition ${isOpen ? 'rotate-90' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                            <h2 className="font-bold text-slate-700 text-sm tracking-wide flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-400"></span>
                                {catName}
                            </h2>
                            <span className="text-[11px] text-slate-500 bg-white border border-slate-200 px-2 py-0.5 rounded-full">{catTasks.length} 项</span>
                        </div>
                    </button>
                    
                    <div className={`swimlane-content bg-slate-50/50 ${isOpen ? 'swimlane-open' : 'swimlane-closed'}`}>
                        <div className="flex overflow-x-auto custom-scrollbar p-4 space-x-4 min-h-[200px]">
                            {columns.map(status => {
                                const config = COLUMN_CONFIG[status];
                                const rawTasks = catTasks.filter(t => {
                                    if (status === 'Need Attention') return t.isUrgent === true;
                                    return t.status === status && !t.isUrgent;
                                });
                                // 在泳道列中也应用排序
                                const colTasks = sortTasks(rawTasks);
                                
                                const dropKey = `${catName}-${status}`;
                                const isDragOver = draggedOverCol === dropKey;

                                return (
                                    <div 
                                        key={dropKey} 
                                        onDragOver={(e) => onDragOver(e, dropKey)} 
                                        onDragLeave={onDragLeave} 
                                        onDrop={(e) => onDrop(e, status, catName)} 
                                        className={`flex-shrink-0 w-[300px] flex flex-col rounded-xl bg-white transition-colors duration-200 border-t-4 border-x border-b ${config.borderColor} ${isDragOver ? 'drag-over border-transparent' : 'border-x-slate-200 border-b-slate-200'}`}
                                    >
                                        <div className={`px-3 py-2.5 flex justify-between items-center border-b border-slate-100/50 ${config.headerBg}`}>
                                            <h3 className={`font-semibold text-[13px] flex items-center space-x-1.5 ${config.text}`}>
                                                {config.icon}
                                                <span>{config.title}</span>
                                            </h3>
                                            <span className={`text-[11px] font-bold ${config.text} bg-white px-2 py-0.5 rounded shadow-sm opacity-80`}>{colTasks.length}</span>
                                        </div>
                                        <div className="p-2.5 flex-1 space-y-3 overflow-y-auto custom-scrollbar max-h-[500px]">
                                            {colTasks.length === 0 ? (
                                                <div className="h-full min-h-[80px] rounded-lg border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-300 text-xs">拖拽至此</div>
                                            ) : (
                                                colTasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} hideCategoryLabel={true} />)
                                            )}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 各板块进度条 (Timeline/Gantt View)
        const TimelineView = ({ tasks, categories, onEdit }) => {
            const today = useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);

            const enrichedTasks = useMemo(() => {
                return tasks.map(t => {
                    let s = parseDateOnly(t.startDate);
                    let e = parseDateOnly(t.dueDate);
                    if (!s && !e) {
                        s = new Date(today); e = new Date(today);
                    } else if (s && !e) {
                        e = new Date(today); 
                    } else if (!s && e) {
                        s = new Date(e);
                    }
                    if (e < s) e = new Date(s);
                    return { ...t, _start: s, _end: e };
                });
            }, [tasks, today]);

            const { minDate, maxDate, monthsArray, totalDays } = useMemo(() => {
                let minT = Math.min(...enrichedTasks.map(t => t._start.getTime()));
                let maxT = Math.max(...enrichedTasks.map(t => t._end.getTime()));
                
                if (!isFinite(minT)) minT = today.getTime();
                if (!isFinite(maxT)) maxT = today.getTime();

                let minD = new Date(minT);
                let maxD = new Date(maxT);
                
                minD = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
                maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 0); 

                const mArray = [];
                let curr = new Date(minD);
                while (curr <= maxD) {
                    const y = curr.getFullYear();
                    const m = curr.getMonth();
                    const days = new Date(y, m + 1, 0).getDate(); 
                    mArray.push({ year: y, month: m, daysInMonth: days, date: new Date(curr) });
                    curr.setMonth(m + 1);
                }
                
                const tDays = mArray.reduce((acc, val) => acc + val.daysInMonth, 0);
                return { minDate: minD, maxDate: maxD, monthsArray: mArray, totalDays: tDays };
            }, [enrichedTasks, today]);

            const DAY_WIDTH = 4; 
            const leftColWidth = 320; 

            const renderCategories = () => {
                return (categories.filter(c => c !== 'All')).map(catName => {
                    // 对甘特图里的数据同样应用优先级排序
                    const catTasks = sortTasks(enrichedTasks.filter(t => t.category === catName));
                    if (catTasks.length === 0) return null;

                    return (
                        <div key={catName} className="border-b border-slate-200 relative z-10">
                            <div className="flex bg-slate-50/90 sticky left-0 z-20 border-r border-slate-200 font-bold text-[13px] text-slate-700 items-center px-4 py-2.5 shadow-sm" style={{ width: leftColWidth }}>
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mr-2"></span>
                                {catName}
                            </div>
                            
                            {catTasks.map(task => {
                                const offsetDays = (task._start.getTime() - minDate.getTime()) / 86400000;
                                const durationDays = (task._end.getTime() - task._start.getTime()) / 86400000 + 1;
                                
                                const config = COLUMN_CONFIG[task.status];
                                const isNeedAttention = task.isUrgent === true;
                                const barColorClass = isNeedAttention ? 'bg-violet-500' : (config ? config.barColor : 'bg-slate-400');
                                const barWidth = Math.max(durationDays * DAY_WIDTH, 12);

                                return (
                                    <div key={task.id} className="relative flex group border-b border-slate-100 hover:bg-slate-50/70 transition-colors h-12">
                                        <div className="sticky left-0 z-20 bg-white group-hover:bg-slate-50 flex items-center px-4 border-r border-slate-200 cursor-pointer" style={{ width: leftColWidth }} onClick={() => onEdit(task)}>
                                            <div className="flex-1 min-w-0 pr-2">
                                                <p className="text-[13px] font-semibold text-slate-800 truncate flex items-center">
                                                    {task.priority === 'P0 - 极急' && <span className="mr-1 text-[10px] text-red-600">🚨</span>}
                                                    {task.task}
                                                </p>
                                                <p className="text-[11px] text-slate-400 truncate mt-0.5">{task.assignee}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="absolute top-0 bottom-0 right-0 pointer-events-none" style={{ left: leftColWidth }}>
                                            <div 
                                                className={`absolute top-2.5 bottom-2.5 rounded-md shadow-sm opacity-90 transition-all ${barColorClass} cursor-pointer pointer-events-auto flex items-center px-2 overflow-hidden hover:opacity-100 hover:shadow-md hover:-translate-y-0.5`}
                                                style={{ left: `${offsetDays * DAY_WIDTH}px`, width: `${barWidth}px` }}
                                                onClick={() => onEdit(task)}
                                                title={`状态: ${task.status}\n优先级: ${task.priority}\n时间: ${task.startDate || '未定'} 至 ${task.dueDate || '至今'}`}
                                            >
                                                {barWidth > 40 && <span className="text-[11px] font-bold text-white truncate mix-blend-screen pl-1">{task.progress || '查看详情'}</span>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    );
                });
            };

            const todayOffset = (today.getTime() - minDate.getTime()) / 86400000;

            return (
                <div className="h-full bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative">
                    <div className="flex-1 overflow-auto custom-scrollbar relative flex">
                        <div className="min-w-max relative pb-4">
                            <div className="flex sticky top-0 z-30 bg-white border-b border-slate-200 h-10 shadow-sm">
                                <div className="sticky left-0 z-40 bg-white border-r border-slate-200 flex items-center px-4 font-bold text-[13px] text-slate-600 uppercase tracking-wider" style={{ width: leftColWidth }}>
                                    板块与事项标题
                                </div>
                                <div className="flex relative" style={{ width: totalDays * DAY_WIDTH }}>
                                    {monthsArray.map((m, i) => (
                                        <div key={i} className="flex flex-col items-center justify-center border-r border-slate-200 text-[11px] text-slate-500 font-bold bg-slate-50/50" style={{ width: m.daysInMonth * DAY_WIDTH }}>
                                            {m.year}年{m.month + 1}月
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="relative" style={{ width: leftColWidth + totalDays * DAY_WIDTH, minHeight: '100%' }}>
                                <div className="absolute top-0 bottom-0 flex pointer-events-none z-0" style={{ left: leftColWidth }}>
                                    {monthsArray.map((m, i) => (
                                        <div key={i} className="border-r border-slate-100 h-full box-border" style={{ width: m.daysInMonth * DAY_WIDTH }}></div>
                                    ))}
                                </div>
                                
                                {todayOffset >= 0 && todayOffset <= totalDays && (
                                    <div className="absolute top-0 bottom-0 w-[2px] bg-red-400/70 z-0 pointer-events-none" style={{ left: leftColWidth + todayOffset * DAY_WIDTH }}></div>
                                )}
                                
                                {renderCategories()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 主应用组件
        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);

            // 视图状态与所有筛选器
            const [filters, setFilters] = useState({ 
                view: 'kanban', 
                search: '', 
                category: 'All', 
                assignee: 'All', 
                status: 'All'
            });
            const [draggedOverCol, setDraggedOverCol] = useState(null);
            
            const [editingTask, setEditingTask] = useState(null);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [importText, setImportText] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

            // 1. 鉴权初始化
            useEffect(() => {
                const initAuth = async () => {
                    if (window.FB && window.FB.auth) {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(window.FB.auth, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(window.FB.auth);
                            }
                        } catch (e) {
                            console.error("Auth failed:", e);
                        }
                    }
                };

                const setupListener = () => {
                    if(window.FB && window.FB.auth) {
                        initAuth();
                        return window.FB.onAuthStateChanged(window.FB.auth, setUser);
                    }
                }

                let unsub = window.FB ? setupListener() : null;
                if (!window.FB) {
                    window.addEventListener('firebase-loaded', () => { unsub = setupListener(); });
                }
                return () => { if(unsub) unsub(); window.removeEventListener('firebase-loaded', setupListener); };
            }, []);

            // 2. 数据库监听与智能自愈
            useEffect(() => {
                if (!user || !window.FB) return;
                
                const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
                const colRef = window.FB.collection(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks');
                
                const unsub = window.FB.onSnapshot(colRef, 
                    (snapshot) => {
                        const fetchedTasks = [];
                        const categoryCasingMap = new Map();

                        snapshot.forEach(doc => {
                            let data = doc.data();
                            
                            // 老数据自愈转换: 剥离 P0 和 Need Attention 的强制绑定
                            if (data.status === 'Need Attention') {
                                data.status = 'In progress'; 
                                data.isUrgent = true;
                            }
                            if (data.isUrgent && !data.priority) {
                                data.priority = 'P2 - 正常'; // 以前默认给的是P0，现在恢复正常，如果真的是P0需要用户手动改
                            }
                            if (!data.priority) {
                                data.priority = 'P2 - 正常';
                            }

                            if (data.category) {
                                const lowerCat = data.category.toLowerCase().trim();
                                if (!categoryCasingMap.has(lowerCat)) {
                                    categoryCasingMap.set(lowerCat, data.category.trim());
                                }
                                data.category = categoryCasingMap.get(lowerCat);
                            }

                            fetchedTasks.push({ id: doc.id, ...data });
                        });
                        setTasks(fetchedTasks);
                        setLoading(false);
                    }, 
                    (err) => {
                        console.error("Firestore sync error:", err);
                        showToast("连接数据库失败，请检查配置或权限！");
                        setLoading(false);
                    }
                );
                return () => unsub();
            }, [user]);

            const getNormalizedCategory = (catName) => {
                if (!catName) return "未分类";
                const trimmed = catName.trim();
                const lower = trimmed.toLowerCase();
                const existing = tasks.find(t => t.category && t.category.toLowerCase() === lower);
                return existing ? existing.category : trimmed;
            };

            const getDocRef = (taskId) => {
                const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
                return window.FB.doc(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks', taskId);
            };

            // 数据保存操作
            const handleSaveTask = async (e) => {
                e.preventDefault();
                setSaving(true);
                const formData = new FormData(e.target);
                const taskId = editingTask.id || generateId();
                
                let sDate = formData.get('startDate');
                let eDate = formData.get('dueDate');
                if (sDate && eDate && new Date(eDate) < new Date(sDate)) eDate = sDate;

                const linkVal = formData.get('attachmentUrl').trim();
                const priorityVal = formData.get('priority');

                const taskData = {
                    id: taskId,
                    category: getNormalizedCategory(formData.get('category')),
                    task: formData.get('task').trim(),
                    detail: formData.get('detail').trim(),
                    progress: formData.get('progress').trim(),
                    status: formData.get('status'),
                    priority: priorityVal,
                    isUrgent: formData.get('isUrgent') === 'on', // 独立判断是否在 Need Attention 列
                    assignee: formData.get('assignee').trim(),
                    startDate: sDate || '',
                    dueDate: eDate || '',
                    attachmentUrl: linkVal, 
                    attachmentName: linkVal ? (editingTask.attachmentName || new URL(linkVal.startsWith('http') ? linkVal : `https://${linkVal}`).hostname) : '', 
                    updatedAt: Date.now()
                };
                
                // 保留旧数据的创建时间戳
                if (!editingTask.id) taskData.createdAt = Date.now();
                else if (editingTask.createdAt) taskData.createdAt = editingTask.createdAt;

                try {
                    await window.FB.setDoc(getDocRef(taskId), taskData);
                    showToast(editingTask.id ? '已同步更新' : '已发布任务');
                    setEditingTask(null);
                } catch (error) { showToast("保存失败，请检查网络！"); console.error(error); } 
                finally { setSaving(false); }
            };

            const handleDeleteTask = async () => {
                if(!editingTask.id) return;
                if(confirm('确定彻底删除此记录吗？')) {
                    setSaving(true);
                    try {
                        await window.FB.deleteDoc(getDocRef(editingTask.id));
                        showToast('已删除'); setEditingTask(null);
                    } catch (error) {} 
                    finally { setSaving(false); }
                }
            };

            const handleDrop = async (e, targetStatus, newCategory = null) => {
                e.preventDefault();
                setDraggedOverCol(null);
                const taskId = e.dataTransfer.getData('taskId');
                if (!taskId) return;

                const taskToMove = tasks.find(t => t.id === taskId);
                if (!taskToMove) return;

                let updatedFields = { updatedAt: Date.now() };
                if (newCategory) updatedFields.category = newCategory;

                // 解耦处理：拖入第一列只改变 isUrgent 状态，不修改其真实底层 status 和 priority
                if (targetStatus === 'Need Attention') {
                    updatedFields.isUrgent = true;
                } else {
                    updatedFields.status = targetStatus;
                    updatedFields.isUrgent = false;
                }

                setTasks(prev => prev.map(t => t.id === taskId ? { ...t, ...updatedFields } : t));
                
                if (user && window.FB) {
                    try { await window.FB.updateDoc(getDocRef(taskId), updatedFields); } 
                    catch (error) { showToast("状态同步失败，将刷新页面重试"); }
                }
            };

            const handleCsvUpload = (e) => {
                const fileInput = e.target;
                const file = fileInput.files[0];
                if (!file) return;

                try {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImportText(event.target.result);
                        showToast("文件读取成功，请检查内容并点击「解析并导入」");
                        fileInput.value = '';
                    };
                    reader.onerror = () => { alert("读取异常"); fileInput.value = ''; };
                    reader.readAsText(file);
                } catch (error) {
                    alert("加载文件发生异常！"); fileInput.value = '';
                }
            };

            const handleImportSubmit = async () => {
                if (!importText.trim()) return;
                
                const parseCSV = (text) => {
                    const rows = []; let row = []; let cell = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const char = text[i]; const nextChar = text[i + 1];
                        if (char === '"') {
                            if (inQuotes && nextChar === '"') { cell += '"'; i++; } else { inQuotes = !inQuotes; }
                        } else if ((char === ',' || char === '\t') && !inQuotes) { row.push(cell.trim()); cell = '';
                        } else if ((char === '\n' || char === '\r') && !inQuotes) {
                            if (char === '\r' && nextChar === '\n') i++; 
                            row.push(cell.trim()); if (row.some(c => c !== '')) rows.push(row);
                            row = []; cell = '';
                        } else { cell += char; }
                    }
                    if (cell || row.length > 0) { row.push(cell.trim()); if (row.some(c => c !== '')) rows.push(row); }
                    return rows;
                };

                const matrix = parseCSV(importText);
                if (matrix.length < 2) { alert("未检测到有效数据"); return; }
                const headers = matrix[0];
                
                const colMap = {
                    category: Math.max(0, headers.findIndex(h => h.includes('分类') || h.includes('板块'))),
                    task: Math.max(1, headers.findIndex(h => h.includes('事项') || h.includes('项目'))),
                    detail: Math.max(2, headers.findIndex(h => h.includes('具体') || h.includes('详细') || h.includes('备注'))),
                    progress: Math.max(3, headers.findIndex(h => h.includes('进展') || h.includes('预期'))),
                    status: Math.max(4, headers.findIndex(h => h.includes('状态'))),
                    assignee: Math.max(5, headers.findIndex(h => h.includes('参与人') || h.includes('负责人'))),
                    priority: Math.max(-1, headers.findIndex(h => h.includes('紧急') || h.includes('优先')))
                };

                const localCategoryMap = new Map();
                let parsedData = [], lastCat = "", lastTask = "";
                
                for (let i = 1; i < matrix.length; i++) {
                    const row = matrix[i];
                    if (row.length === 0 || row.every(c => !c)) continue;
                    
                    const getCell = (idx) => (idx === -1 || idx >= row.length) ? "" : (row[idx] || "");
                    
                    let rawCat = getCell(colMap.category); if (rawCat) lastCat = rawCat; else rawCat = lastCat;
                    let task = getCell(colMap.task); if (task) lastTask = task; else task = lastTask;
                    
                    let detail = getCell(colMap.detail), progress = getCell(colMap.progress);
                    let statusRaw = getCell(colMap.status) || "To Do", assignee = getCell(colMap.assignee);
                    let priorityRaw = getCell(colMap.priority) || "";
                    if (!task && !detail && !progress) continue;

                    let normalizedCat = "未分类";
                    if (rawCat) {
                        const lower = rawCat.toLowerCase().trim();
                        if (!localCategoryMap.has(lower)) localCategoryMap.set(lower, getNormalizedCategory(rawCat));
                        normalizedCat = localCategoryMap.get(lower);
                    }

                    let isUrgent = false, status = "To Do", priority = "P2 - 正常";
                    
                    if (priorityRaw.includes("极急") || priorityRaw.includes("P0")) priority = "P0 - 极急";
                    else if (priorityRaw.includes("高优") || priorityRaw.includes("P1")) priority = "P1 - 高优";
                    else if (priorityRaw.includes("暂缓") || priorityRaw.includes("P3")) priority = "P3 - 暂缓";

                    const sLower = statusRaw.toLowerCase();
                    if (sLower.includes("attention") || sLower.includes("过目") || sLower.includes("批示")) { isUrgent = true; status = "In progress"; } 
                    else if (sLower.includes("progress") || sLower.includes("进行")) { status = "In progress"; } 
                    else if (sLower.includes("done") || sLower.includes("完成")) { status = "Done"; } 
                    else if (sLower.includes("pending") || sLower.includes("暂缓")) { status = "Pending"; } 
                    else if (statusRaw.trim() && COLUMN_CONFIG[statusRaw]) { status = statusRaw; }
                    
                    parsedData.push({ 
                        id: `task-imp-${Date.now()}-${i}`, category: normalizedCat, 
                        task: task || "未命名事项", detail, progress, status, priority, isUrgent: isUrgent, assignee: assignee || "未分配", 
                        startDate: '', dueDate: '', attachmentUrl: '', attachmentName: '', updatedAt: Date.now(), createdAt: Date.now()
                    });
                }

                setSaving(true);
                try {
                    await Promise.all(parsedData.map(t => window.FB.setDoc(getDocRef(t.id), t)));
                    showToast(`成功导入 ${parsedData.length} 条数据！`);
                    setIsImportModalOpen(false); setImportText('');
                } catch (error) { alert("批量同步失败"); }
                finally { setSaving(false); }
            };

            // 全新 Excel 本地真实导出 (SheetJS)
            const handleExport = () => {
                if (typeof XLSX === 'undefined') {
                    alert("导出引擎正在加载，请稍后再试...");
                    return;
                }
                
                showToast("正在生成 Excel，请稍候...");
                const wb = XLSX.utils.book_new();

                // 1. 列表清单 Sheet
                const ws1Data = sortTasks(filteredTasks).map(t => ({
                    '板块分类': t.category,
                    '事项标题': t.task,
                    '内部说明': t.detail,
                    '进展动态': t.progress,
                    '底层业务状态': t.status,
                    '紧急度(优先级)': t.priority || 'P2 - 正常',
                    '是否卡点需过目': t.isUrgent ? '是 (Need Attention)' : '否',
                    '参与人': t.assignee,
                    '开始日期': t.startDate || '-',
                    '截止日期': t.dueDate || '-',
                    '最后修订时间': formatDateTime(t.updatedAt)
                }));
                const ws1 = XLSX.utils.json_to_sheet(ws1Data);
                XLSX.utils.book_append_sheet(wb, ws1, "列表清单");

                // 2. 各板块进度条(甘特图) Sheet
                const ws2Data = sortTasks(filteredTasks).map(t => {
                    const s = parseDateOnly(t.startDate) || new Date();
                    const e = parseDateOnly(t.dueDate) || new Date();
                    const days = Math.round((e - s) / 86400000) + 1;
                    return {
                        '板块分类': t.category,
                        '事项标题': t.task,
                        '状态': t.status,
                        '紧急度': t.priority || 'P2 - 正常',
                        '需过目': t.isUrgent ? '是' : '否',
                        '开始时间': t.startDate || '未定',
                        '截止时间': t.dueDate || '至今',
                        '持续天数': days,
                        '参与人': t.assignee
                    };
                });
                const ws2 = XLSX.utils.json_to_sheet(ws2Data);
                XLSX.utils.book_append_sheet(wb, ws2, "进度规划");

                // 3. 板块内项目概览 Sheet
                const ws3Data = [];
                categories.filter(c => c !== 'All').forEach(cat => {
                    columns.forEach(status => {
                        const cellTasks = sortTasks(filteredTasks.filter(t => {
                            if (status === 'Need Attention') return t.category === cat && t.isUrgent === true;
                            return t.category === cat && t.status === status && !t.isUrgent;
                        }));
                        cellTasks.forEach(t => {
                            ws3Data.push({
                                '板块分类': cat,
                                '所处流程列': COLUMN_CONFIG[status]?.title || status,
                                '底层状态': t.status,
                                '紧急度': t.priority || 'P2 - 正常',
                                '事项标题': t.task,
                                '进展动态': t.progress,
                                '参与人': t.assignee
                            });
                        });
                    });
                });
                const ws3 = XLSX.utils.json_to_sheet(ws3Data);
                XLSX.utils.book_append_sheet(wb, ws3, "板块内项目概览");

                XLSX.writeFile(wb, `工作台导出_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            // 过滤与计算 (加入了全栈过滤：状态、优先级等)
            const filteredTasks = useMemo(() => {
                return [...tasks].filter(t => {
                    const matchSearch = `${t.task} ${t.detail} ${t.progress} ${t.assignee}`.toLowerCase().includes(filters.search.toLowerCase());
                    const matchCat = filters.category === 'All' || t.category === filters.category;
                    const matchAssignee = filters.assignee === 'All' || (t.assignee && t.assignee.includes(filters.assignee));
                    const isTaskNeedAttention = t.isUrgent === true;
                    const matchStatus = filters.status === 'All' || t.status === filters.status || (filters.status === 'Need Attention' && isTaskNeedAttention);

                    return matchSearch && matchCat && matchAssignee && matchStatus;
                });
            }, [tasks, filters]);

            // 表格视图需要展示已排序的数据
            const sortedFilteredTasks = useMemo(() => sortTasks(filteredTasks), [filteredTasks]);

            const categories = ['All', ...new Set(tasks.map(t => t.category).filter(Boolean).sort())];
            const assignees = ['All', ...new Set(tasks.flatMap(t => t.assignee ? t.assignee.split(/[,&、]/).map(a => a.trim()).filter(Boolean) : []))];
            const columns = Object.keys(COLUMN_CONFIG);
            const statusOptions = ['All', ...columns];

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <h2 className="text-slate-500 font-medium text-sm">正在加载工作台...</h2>
                    </div>
                );
            }

            const viewOptions = [
                { id: 'kanban', label: '看板视图' },
                { id: 'swimlane', label: '板块内项目概览' },
                { id: 'timeline', label: '各板块进度条' },
                { id: 'table', label: '列表清单' }
            ];

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* 顶部导航 */}
                    <header className="glass-header border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 z-20">
                        <div className="flex items-center space-x-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-lg shadow-sm flex items-center justify-center font-bold text-white tracking-wider text-sm">HC</div>
                            <div>
                                <h1 className="text-[17px] font-bold text-slate-800 flex items-center">
                                    协同工作台
                                </h1>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                            <div className="flex bg-slate-100/80 rounded-lg p-1.5 border border-slate-200/60 shadow-inner">
                                {viewOptions.map(v => (
                                    <button key={v.id} onClick={() => setFilters(f => ({...f, view: v.id}))} className={`px-4 py-1.5 text-[13px] font-medium rounded-md transition-all ${filters.view === v.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                        {v.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setIsImportModalOpen(true)} className="flex items-center space-x-1.5 bg-white text-slate-600 border border-slate-300 px-4 py-2 rounded-lg text-[13px] font-medium hover:bg-slate-50 transition-colors shadow-sm">
                                <Icons.Upload /> <span>导入</span>
                            </button>
                            <button onClick={() => setEditingTask({ status: 'To Do', priority: 'P2 - 正常', isUrgent: false })} className="flex items-center space-x-1.5 bg-indigo-600 text-white px-5 py-2 rounded-lg text-[13px] font-medium hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">
                                <span className="text-lg leading-none mb-0.5">+</span> <span>新建任务</span>
                            </button>
                        </div>
                    </header>

                    {/* 控制栏 (多重筛选) */}
                    <div className="bg-white/80 backdrop-blur-sm border-b border-slate-200 px-6 py-2.5 flex items-center justify-between shrink-0 z-10">
                        <div className="flex items-center space-x-4 overflow-x-auto custom-scrollbar py-1">
                            <div className="flex items-center space-x-2 shrink-0">
                                <span className="text-[12px] font-medium text-slate-400 uppercase tracking-wider">执行人</span>
                                <select className="text-[12px] bg-slate-50 border border-slate-200 rounded-md py-1.5 px-2 focus:ring-1 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer max-w-[100px] truncate" value={filters.assignee} onChange={(e) => setFilters(f => ({...f, assignee: e.target.value}))}>
                                    {assignees.map(a => <option key={a} value={a}>{a === 'All' ? '全部' : a}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center space-x-2 shrink-0">
                                <span className="text-[12px] font-medium text-slate-400 uppercase tracking-wider">状态</span>
                                <select className="text-[12px] bg-slate-50 border border-slate-200 rounded-md py-1.5 px-2 focus:ring-1 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer max-w-[120px] truncate" value={filters.status} onChange={(e) => setFilters(f => ({...f, status: e.target.value}))}>
                                    {statusOptions.map(s => <option key={s} value={s}>{s === 'All' ? '全部' : (COLUMN_CONFIG[s]?.title || s)}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center space-x-2 shrink-0">
                                <span className="text-[12px] font-medium text-slate-400 uppercase tracking-wider">板块分类</span>
                                <select className="text-[12px] bg-slate-50 border border-slate-200 rounded-md py-1.5 px-2 focus:ring-1 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer max-w-[120px] truncate" value={filters.category} onChange={(e) => setFilters(f => ({...f, category: e.target.value}))}>
                                    {categories.map(cat => <option key={cat} value={cat}>{cat === 'All' ? '全部' : cat}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="flex items-center space-x-3 pl-4 border-l border-slate-200 shrink-0">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 flex items-center pl-2.5 text-slate-400"><Icons.Search /></span>
                                <input type="text" placeholder="搜索事项或人员..." className="pl-8 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-[13px] focus:outline-none focus:ring-1 focus:ring-indigo-500 w-40 transition-all focus:w-56 focus:bg-white" value={filters.search} onChange={(e) => setFilters(f => ({...f, search: e.target.value}))} />
                            </div>
                            <button onClick={handleExport} className="flex items-center space-x-1.5 bg-green-50 text-green-700 hover:bg-green-100 hover:text-green-800 border border-green-200 px-3 py-1.5 rounded-md transition-colors" title="下载 Excel 备份"><Icons.Download /> <span className="text-xs font-bold">导出Excel</span></button>
                        </div>
                    </div>

                    {/* 主内容区 */}
                    <main className="flex-1 overflow-hidden p-6 relative">
                        {tasks.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
                                <div className="text-4xl mb-4 opacity-50">✨</div>
                                <h3 className="text-base font-medium text-slate-700 mb-1">开始你的第一个项目</h3>
                                <p className="text-sm mb-4">点击右上角新建任务，或导入已有的 Excel 数据。</p>
                            </div>

                            <div className="flex h-full space-x-5 overflow-x-auto custom-scrollbar pb-2 items-start">
                                {columns.map(status => {
                                    const config = COLUMN_CONFIG[status];
                                    const rawTasks = filteredTasks.filter(t => {
                                        const isNeedAttention = t.isUrgent === true;
                                        if (status === 'Need Attention') return isNeedAttention;
                                        return t.status === status && !isNeedAttention;
                                    });
                                    // 看板列任务内部优先按“紧急度”排序
                                    const colTasks = sortTasks(rawTasks);
                                    const isDragOver = draggedOverCol === status;

                                    return (
