<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>团队协作工作台</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #f4f7fb 42%, #eef3f9 100%);
      color: #1e293b;
      overflow-x: hidden;
      overflow-y: auto;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #94a3b8 #e2e8f0; }
    .glass-header {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 10px 35px rgba(15, 23, 42, 0.04);
    }
    .panel-glass {
      background: rgba(255,255,255,.80);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
    }
    .summary-card {
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,250,252,.84));
      border: 1px solid rgba(226,232,240,.92);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
    }
    .summary-card-btn {
      width: 100%;
      text-align: left;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      cursor: pointer;
    }
    .summary-card-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.10);
    }
    .summary-card-btn.active {
      border-color: rgba(99, 102, 241, .30);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, .08), 0 16px 30px rgba(15, 23, 42, 0.10);
    }
    .kanban-column-shell {
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.92));
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
    }
    .task-card {
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.97));
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      transition: all .22s ease;
    }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.10);
      border-color: rgba(99, 102, 241, 0.18);
    }
    .task-card-urgent {
      background: linear-gradient(180deg, rgba(255,241,242,.95), rgba(255,255,255,.98));
      border-color: rgba(251,113,133,.28);
    }
    .task-card-overdue {
      background: linear-gradient(180deg, rgba(254,242,242,.96), rgba(255,255,255,.98));
      border-color: rgba(248,113,113,.30);
    }
    .board-main { position: relative; }
    .board-main::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.45) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(255,255,255,.22), transparent 88%);
    }
    .smooth-transition { transition: all .28s cubic-bezier(.4,0,.2,1); }
    .swimlane-content { transition: max-height .45s ease, opacity .35s ease; overflow: hidden; }
    .swimlane-open { max-height: 5000px; opacity: 1; }
    .swimlane-closed { max-height: 0; opacity: 0; }
    .overdue-pill { background: rgba(254,226,226,.92); color: #dc2626; border: 1px solid rgba(252,165,165,.55); }
    .healthy-pill { background: rgba(241,245,249,.96); color: #475569; border: 1px solid rgba(203,213,225,.9); }
    .line-clamp-1, .line-clamp-2, .line-clamp-3 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-1 { -webkit-line-clamp: 1; }
    .line-clamp-2 { -webkit-line-clamp: 2; }
    .line-clamp-3 { -webkit-line-clamp: 3; }
    .drag-over {
      background-color: #fff1f2 !important;
      border: 2px dashed #fb7185 !important;
      box-shadow: inset 0 0 0 1px rgba(251,113,133,.16);
    }
    .dragging { opacity: .4; transform: scale(.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const userConfig = {
      apiKey: "AIzaSyDyfETIW3f_mqphx7w2eErR_Z4w-EUWsZg",
      authDomain: "kanban-a8614.firebaseapp.com",
      projectId: "kanban-a8614",
      storageBucket: "kanban-a8614.firebasestorage.app",
      messagingSenderId: "42784160848",
      appId: "1:42784160848:web:12d40daec006adad1ea555",
      measurementId: "G-J9014LF5NG"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = {
      auth, db, doc, collection, setDoc, deleteDoc, updateDoc, onSnapshot,
      signInAnonymously, signInWithCustomToken, onAuthStateChanged
    };
    window.dispatchEvent(new Event('firebase-loaded'));
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icons = {
      Eye: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      File: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      Play: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Pause: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Alert: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v3m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 17c-.77 1.333.192 3 1.732 3z" /></svg>,
      Search: () => <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      Link: () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
      Edit: () => <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
      EmptyBox: () => <svg className="w-12 h-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
    };

    const COLUMN_CONFIG = {
      'Need Attention': { title: '需过目', borderColor: 'border-rose-400', headerBg: 'bg-rose-50', text: 'text-rose-600', icon: <Icons.Eye />, barColor: 'bg-rose-500' },
      'To Do': { title: '待处理', borderColor: 'border-slate-300', headerBg: 'bg-slate-100', text: 'text-slate-600', icon: <Icons.File />, barColor: 'bg-slate-400' },
      'In progress': { title: '进行中', borderColor: 'border-indigo-400', headerBg: 'bg-indigo-50', text: 'text-indigo-600', icon: <Icons.Play />, barColor: 'bg-indigo-500' },
      'Pending': { title: '等待/暂停', borderColor: 'border-amber-400', headerBg: 'bg-amber-50', text: 'text-amber-600', icon: <Icons.Pause />, barColor: 'bg-amber-400' },
      'Overdue': { title: '已逾期', borderColor: 'border-red-400', headerBg: 'bg-red-50', text: 'text-red-600', icon: <Icons.Alert />, barColor: 'bg-red-500' },
      'Done': { title: '已完成', borderColor: 'border-emerald-400', headerBg: 'bg-emerald-50', text: 'text-emerald-600', icon: <Icons.Check />, barColor: 'bg-emerald-500' }
    };

    const PRIORITY_WEIGHTS = { 'P0 - 紧急': 3, 'P1 - 优先': 2, 'P2 - 正常': 1, 'P3 - 暂缓': 0 };
    const EDITABLE_STATUS_OPTIONS = ['To Do', 'In progress', 'Pending', 'Done'];
    const KANBAN_COMPACT_STATUSES = ['Need Attention', 'To Do', 'Pending', 'Overdue'];
    const SWIMLANE_STATUSES = ['Need Attention', 'In progress', 'Pending', 'Overdue'];

    const DEFAULT_TASKS = [
      { id: 'demo-1', category: '官网项目', task: 'HC 官网首页改版', detail: '保留原导航逻辑，优化视觉层级。', progress: '已完成首屏和案例区设计稿，待过目。', status: 'In progress', priority: 'P1 - 优先', isUrgent: true, assignee: 'FeiFei', startDate: '2026-03-20', dueDate: '2026-03-29', attachmentUrl: '', updatedAt: Date.now() - 3600 * 1000, createdAt: Date.now() - 5 * 24 * 3600 * 1000 },
      { id: 'demo-2', category: '提案项目', task: 'Orbiva 提案整理', detail: '更新价格页与案例顺序。', progress: '提案初稿已完成，需要管理层确认。', status: 'To Do', priority: 'P0 - 紧急', isUrgent: false, assignee: 'HC 团队', startDate: '2026-03-22', dueDate: '2026-03-28', attachmentUrl: '', updatedAt: Date.now() - 3 * 3600 * 1000, createdAt: Date.now() - 4 * 24 * 3600 * 1000 },
      { id: 'demo-3', category: '运营支持', task: '客户跟进表同步', detail: '按负责人重新分配。', progress: '全部同步完成。', status: 'Done', priority: 'P2 - 正常', isUrgent: false, assignee: '运营', startDate: '2026-03-18', dueDate: '2026-03-24', attachmentUrl: '', updatedAt: Date.now() - 5 * 3600 * 1000, createdAt: Date.now() - 8 * 24 * 3600 * 1000 }
    ];

    const generateId = () => `task-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    const getCreatedAt = (task) => task?.createdAt || task?.updatedAt || Date.now();
    const parseDateOnly = (dateStr) => {
      if (!dateStr) return null;
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      return Number.isNaN(d.getTime()) ? null : d;
    };
    const formatDateTime = (timestamp) => {
      if (!timestamp) return '-';
      const d = new Date(Number(timestamp));
      if (Number.isNaN(d.getTime())) return String(timestamp);
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const date = String(d.getDate()).padStart(2, '0');
      const year = d.getFullYear();
      const hours = String(d.getHours()).padStart(2, '0');
      const minutes = String(d.getMinutes()).padStart(2, '0');
      return `${month}/${date}/${year}, ${hours}:${minutes}`;
    };
    const formatDateRange = (startDate, dueDate) => `${startDate ? startDate.substring(5).replace('-', '.') : '未定'} 至 ${dueDate ? dueDate.substring(5).replace('-', '.') : '至今'}`;
    const getInitials = (name) => {
      if (!name || !name.trim()) return '?';
      const first = name.split(/[,&、]/)[0].trim();
      return /^[a-zA-Z]/.test(first) ? first.substring(0, 2).toUpperCase() : first.substring(0, 1);
    };
    const stringToColor = (str = '') => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 65%, 78%)`;
    };
    const isOverdue = (task) => {
      if (!task?.dueDate || task?.status === 'Done') return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = parseDateOnly(task.dueDate);
      return due ? due < today : false;
    };
    const getBoardColumnKey = (task) => {
      if (!task) return 'To Do';
      if (task.status === 'Done') return 'Done';
      if (isOverdue(task)) return 'Overdue';
      if (task.isUrgent) return 'Need Attention';
      return task.status || 'To Do';
    };
    const normalizeCategory = (value) => {
      if (!value || !String(value).trim()) return '未分类';
      return String(value).trim();
    };
    const getStatusTitle = (statusKey) => COLUMN_CONFIG[statusKey]?.title || statusKey || '未知状态';
    const sortTasks = (tasksList) => [...tasksList].sort((a, b) => {
      const wa = PRIORITY_WEIGHTS[a.priority] ?? 1;
      const wb = PRIORITY_WEIGHTS[b.priority] ?? 1;
      if (wa !== wb) return wb - wa;
      return getCreatedAt(b) - getCreatedAt(a);
    });

    const AvatarGroup = ({ name }) => {
      const names = name ? name.split(/[,&、]/).map(n => n.trim()).filter(Boolean) : [];
      if (names.length === 0) return <span className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-sm">未分配</span>;
      return (
        <div className="flex items-center">
          <div className="flex -space-x-1.5">
            {names.slice(0, 3).map((n, i) => (
              <div key={i} className="w-5 h-5 rounded-full ring-2 ring-white flex items-center justify-center text-[9px] font-bold text-slate-700 shadow-sm" style={{ backgroundColor: stringToColor(n) }} title={n}>
                {getInitials(n)}
              </div>
            ))}
            {names.length > 3 && <div className="w-5 h-5 rounded-full ring-2 ring-white bg-slate-200 flex items-center justify-center text-[9px] font-bold text-slate-600 shadow-sm">+{names.length - 3}</div>}
          </div>
          {names.length === 1 && <span className="text-[10px] text-slate-500 ml-1.5 truncate max-w-[80px] font-medium">{names[0]}</span>}
        </div>
      );
    };

    const TaskCard = ({ task, onEdit }) => {
      const boardKey = getBoardColumnKey(task);
      const config = COLUMN_CONFIG[boardKey] || COLUMN_CONFIG['To Do'];
      const overdue = boardKey === 'Overdue';
      const handleDragStart = (e) => {
        e.dataTransfer.setData('taskId', task.id);
        setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
      };
      const handleDragEnd = (e) => e.currentTarget.classList.remove('dragging');
      return (
        <article
          draggable="true"
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          onClick={() => onEdit(task)}
          className={`task-card rounded-2xl p-3 flex flex-col min-h-[96px] cursor-grab active:cursor-grabbing group ${task.isUrgent ? 'task-card-urgent' : ''} ${overdue ? 'task-card-overdue' : ''}`}
        >
          <div className="flex items-start justify-between gap-2 mb-2">
            <div className="flex flex-wrap gap-1.5">
              {task.isUrgent && <span className="px-1.5 py-0.5 bg-rose-100 text-rose-700 border border-rose-200 text-[10px] font-bold rounded-md">需过目</span>}
              {(task.priority === 'P0 - 紧急' || task.priority === 'P1 - 优先') && (
                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-md shadow-sm ${task.priority === 'P0 - 紧急' ? 'text-red-600 bg-red-50 border border-red-100' : 'text-orange-600 bg-orange-50 border border-orange-100'}`}>
                  {task.priority === 'P0 - 紧急' ? 'P0 紧急' : 'P1 优先'}
                </span>
              )}
              <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${overdue ? 'overdue-pill' : 'healthy-pill'}`}>
                {config.title}
              </span>
            </div>
            <span className="opacity-0 group-hover:opacity-100 smooth-transition text-indigo-500 bg-indigo-50 p-1 rounded"><Icons.Edit /></span>
          </div>

          <h4 className="font-semibold text-slate-800 text-[13px] leading-5 line-clamp-2 group-hover:text-indigo-600 transition-colors">
            {task.task || '未命名事项'}
          </h4>

          {task.progress && <p className="text-[12px] text-slate-500 line-clamp-1 leading-5 mt-1.5">{task.progress}</p>}

          <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100/80 gap-2">
            <div className="flex items-center gap-2 min-w-0">
              <AvatarGroup name={task.assignee} />
              {task.attachmentUrl && <span className="text-[10px] text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded-md shrink-0">链接</span>}
            </div>
            <div className="flex items-center gap-1.5 flex-wrap justify-end shrink-0">
              {(task.startDate || task.dueDate) && (
                <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${overdue ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'}`}>
                  {formatDateRange(task.startDate, task.dueDate)}
                </span>
              )}
            </div>
          </div>
        </article>
      );
    };

    const CategoryAccordionGroup = ({ category, tasks, onEdit, defaultExpanded = false, previewCount = 2 }) => {
      const [isExpanded, setIsExpanded] = useState(defaultExpanded);
      const sortedTasks = sortTasks(tasks);
      const urgentCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'Need Attention').length;
      const overdueCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'Overdue').length;
      const inProgressCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'In progress').length;
      const visibleTasks = isExpanded ? sortedTasks : sortedTasks.slice(0, previewCount);
      return (
        <div className="mb-3 bg-white/60 rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
          <button onClick={() => setIsExpanded(!isExpanded)} className="w-full flex items-center justify-between px-3 py-3 hover:bg-white transition-colors border-b border-slate-100/50 text-left">
            <div className="min-w-0 pr-3">
              <div className="text-xs font-bold text-slate-700 flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>{category}</div>
              <div className="flex flex-wrap gap-1.5 mt-2">
                <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">{sortedTasks.length} 项</span>
                {inProgressCount > 0 && <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-semibold">推进中 {inProgressCount}</span>}
                {urgentCount > 0 && <span className="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded font-semibold">待过目 {urgentCount}</span>}
                {overdueCount > 0 && <span className="text-[10px] bg-red-50 text-red-600 px-2 py-0.5 rounded font-semibold">逾期 {overdueCount}</span>}
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              {!isExpanded && sortedTasks.length > previewCount && <span className="text-[11px] text-slate-400">先显示 {previewCount} 项</span>}
              <span className="text-[11px] font-semibold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">{isExpanded ? '收起' : '展开'}</span>
            </div>
          </button>
          <div className="p-2.5 space-y-2 bg-slate-50/20">
            {visibleTasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} />)}
            {!isExpanded && sortedTasks.length > previewCount && (
              <button onClick={() => setIsExpanded(true)} className="w-full rounded-xl border border-dashed border-slate-200 bg-white/70 hover:bg-white px-3 py-2 text-xs font-semibold text-slate-500 hover:text-indigo-600 transition-colors">
                还有 {sortedTasks.length - previewCount} 项，点击展开查看
              </button>
            )}
          </div>
        </div>
      );
    };

    const CollapsibleSwimlane = ({ catName, columns, catTasks, draggedOverCol, onDragOver, onDragLeave, onDrop, onEdit }) => {

        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col mb-5 smooth-transition">

            <div className="flex items-center space-x-3">
              <svg className={`w-4 h-4 text-slate-400 smooth-transition ${isOpen ? 'rotate-90' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>

    const TimelineView = ({ tasks, categories, onEdit }) => {
      const today = useMemo(() => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d;
      }, []);

      const enrichedTasks = useMemo(() => tasks.map(t => {
        let s = parseDateOnly(t.startDate);
        let e = parseDateOnly(t.dueDate);
        if (!s && !e) { s = new Date(today); e = new Date(today); }
        else if (s && !e) e = new Date(today);
        else if (!s && e) s = new Date(e);
        if (e < s) e = new Date(s);
        return { ...t, _start: s, _end: e };
      }), [tasks, today]);

      const { minDate, monthsArray, totalDays } = useMemo(() => {
        let minT = Math.min(...enrichedTasks.map(t => t._start.getTime()));
        let maxT = Math.max(...enrichedTasks.map(t => t._end.getTime()));
        if (!Number.isFinite(minT)) minT = today.getTime();
        if (!Number.isFinite(maxT)) maxT = today.getTime();
        let minD = new Date(minT);
        let maxD = new Date(maxT);
        minD = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
        maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 0);
        const mArray = [];
        let curr = new Date(minD);
        while (curr <= maxD) {
          const y = curr.getFullYear();
          const m = curr.getMonth();
          const days = new Date(y, m + 1, 0).getDate();
          mArray.push({ year: y, month: m, daysInMonth: days });
          curr.setMonth(m + 1);
        }
        return { minDate: minD, monthsArray: mArray, totalDays: mArray.reduce((acc, val) => acc + val.daysInMonth, 0) };
      }, [enrichedTasks, today]);

      const DAY_WIDTH = 4;
      const leftColWidth = 320;
      const todayOffset = (today.getTime() - minDate.getTime()) / 86400000;

      return (
        <div className="h-full bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative">
          <div className="flex-1 overflow-auto custom-scrollbar relative flex">
            <div className="min-w-max relative pb-4">
              <div className="flex sticky top-0 z-30 bg-white border-b border-slate-200 h-10 shadow-sm">
                <div className="sticky left-0 z-40 bg-white border-r border-slate-200 flex items-center px-4 font-bold text-[13px] text-slate-600 uppercase tracking-wider" style={{ width: leftColWidth }}>板块与事项标题</div>
                <div className="flex relative" style={{ width: totalDays * DAY_WIDTH }}>
                  {monthsArray.map((m, i) => <div key={i} className="flex flex-col items-center justify-center border-r border-slate-200 text-[11px] text-slate-500 font-bold bg-slate-50/50" style={{ width: m.daysInMonth * DAY_WIDTH }}>{m.year}年{m.month + 1}月</div>)}
                </div>
              </div>
              <div className="relative" style={{ width: leftColWidth + totalDays * DAY_WIDTH, minHeight: '100%' }}>
                <div className="absolute top-0 bottom-0 flex pointer-events-none z-0" style={{ left: leftColWidth }}>
                  {monthsArray.map((m, i) => <div key={i} className="border-r border-slate-100 h-full box-border" style={{ width: m.daysInMonth * DAY_WIDTH }}></div>)}
                </div>
                {todayOffset >= 0 && todayOffset <= totalDays && <div className="absolute top-0 bottom-0 w-[2px] bg-red-400/70 z-0 pointer-events-none" style={{ left: leftColWidth + todayOffset * DAY_WIDTH }}></div>}
                {categories.filter(c => c !== 'All').map(catName => {
                  const catTasks = sortTasks(enrichedTasks.filter(t => t.category === catName));
                  if (catTasks.length === 0) return null;
                  return (
                    <div key={catName} className="border-b border-slate-200 relative z-10">
                      <div className="flex bg-slate-50/90 sticky left-0 z-20 border-r border-slate-200 font-bold text-[13px] text-slate-700 items-center px-4 py-2.5 shadow-sm" style={{ width: leftColWidth }}><span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mr-2"></span>{catName}</div>
                      {catTasks.map(task => {
                        const offsetDays = (task._start.getTime() - minDate.getTime()) / 86400000;
                        const durationDays = (task._end.getTime() - task._start.getTime()) / 86400000 + 1;
                        const config = COLUMN_CONFIG[getBoardColumnKey(task)] || COLUMN_CONFIG['To Do'];
                        const barColorClass = config.barColor;
                        return (
                          <div key={task.id} className="relative flex group border-b border-slate-100 hover:bg-slate-50/70 transition-colors h-12">
                            <div className="sticky left-0 z-20 bg-white group-hover:bg-slate-50 flex items-center px-4 border-r border-slate-200 cursor-pointer" style={{ width: leftColWidth }} onClick={() => onEdit(task)}>
                              <div className="flex-1 min-w-0 pr-2">
                                <p className="text-[13px] font-semibold text-slate-800 truncate">{task.task}</p>
                                <p className="text-[11px] text-slate-400 truncate mt-0.5">{task.assignee}</p>
                              </div>
                            </div>
                            <div className="absolute top-0 bottom-0 right-0 pointer-events-none" style={{ left: leftColWidth }}>
                              <div
                                className={`absolute top-2.5 bottom-2.5 rounded-md shadow-sm opacity-90 transition-all ${barColorClass} cursor-pointer pointer-events-auto flex items-center px-2 overflow-hidden hover:opacity-100 hover:shadow-md hover:-translate-y-0.5`}
                                style={{ left: `${offsetDays * DAY_WIDTH}px`, width: `${Math.max(durationDays * DAY_WIDTH, 12)}px` }}
                                onClick={() => onEdit(task)}
                              >
                                {durationDays * DAY_WIDTH > 40 && <span className="text-[11px] font-bold text-white truncate pl-1">{task.progress || '查看详情'}</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const TableView = ({ tasks, onEdit }) => {
      const rows = sortTasks(tasks);
      return (
        <div className="h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-auto custom-scrollbar">
          <table className="w-full min-w-[960px] text-sm">
            <thead className="sticky top-0 bg-slate-50 z-10">
              <tr className="text-left text-slate-500 border-b border-slate-200">
                <th className="px-4 py-3 font-semibold">板块分类</th>
                <th className="px-4 py-3 font-semibold">事项标题</th>
                <th className="px-4 py-3 font-semibold">进展动态</th>
                <th className="px-4 py-3 font-semibold">状态</th>
                <th className="px-4 py-3 font-semibold">优先级</th>
                <th className="px-4 py-3 font-semibold">参与人</th>
                <th className="px-4 py-3 font-semibold">开始日期</th>
                <th className="px-4 py-3 font-semibold">截止日期</th>
                <th className="px-4 py-3 font-semibold">最后修订时间</th>
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan="9" className="px-4 py-16 text-center text-slate-400">暂无数据</td></tr>
              ) : rows.map(task => (
                <tr key={task.id} className="border-b border-slate-100 hover:bg-slate-50/70 cursor-pointer" onClick={() => onEdit(task)}>
                  <td className="px-4 py-3 text-slate-600">{task.category || '未分类'}</td>
                  <td className="px-4 py-3 font-medium text-slate-800">{task.task || '未命名事项'}</td>
                  <td className="px-4 py-3 text-slate-600 max-w-[360px]"><div className="line-clamp-2">{task.progress || '-'}</div></td>
                  <td className="px-4 py-3 text-slate-600">{getStatusTitle(getBoardColumnKey(task))}</td>
                  <td className="px-4 py-3 text-slate-600">{task.priority || 'P2 - 正常'}</td>
                  <td className="px-4 py-3 text-slate-600">{task.assignee || '未分配'}</td>
                  <td className="px-4 py-3 text-slate-600">{task.startDate || '-'}</td>
                  <td className="px-4 py-3 text-slate-600">{task.dueDate || '-'}</td>
                  <td className="px-4 py-3 text-slate-600">{formatDateTime(task.updatedAt)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    function App() {
      const [tasks, setTasks] = useState(DEFAULT_TASKS);
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [draggedOverCol, setDraggedOverCol] = useState(null);
      const [editingTask, setEditingTask] = useState(null);
      const [filters, setFilters] = useState({ view: 'kanban', search: '', category: 'All', assignee: 'All', status: 'All' });

      const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
      const getDocRef = (taskId) => window.FB.doc(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks', taskId);

      useEffect(() => {
        const init = async () => {
          if (!window.FB?.auth) return;
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await window.FB.signInWithCustomToken(window.FB.auth, __initial_auth_token);
            } else {
              await window.FB.signInAnonymously(window.FB.auth);
            }
          } catch (e) {
            console.error('Auth failed:', e);
            setLoading(false);
          }
        };
        const setup = () => {
          if (!window.FB?.auth) return;
          init();
          return window.FB.onAuthStateChanged(window.FB.auth, setUser);
        };
        let unsub = null;
        if (window.FB) unsub = setup();
        else window.addEventListener('firebase-loaded', setup, { once: true });
        return () => { if (typeof unsub === 'function') unsub(); };
      }, []);

      useEffect(() => {
        if (!user || !window.FB?.db) return;
        const colRef = window.FB.collection(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks');
        const unsub = window.FB.onSnapshot(colRef, (snapshot) => {
          const fetchedTasks = [];
          snapshot.forEach(docSnap => {
            const data = docSnap.data() || {};
            fetchedTasks.push({ id: docSnap.id, ...data });
          });
          setTasks(fetchedTasks.length ? fetchedTasks : DEFAULT_TASKS);
          setLoading(false);
        }, (err) => {
          console.error('Firestore sync error:', err);
          setLoading(false);
        });
        return () => unsub();
      }, [user]);

      useEffect(() => {
        const timer = setTimeout(() => { if (loading) setLoading(false); }, 2000);
        return () => clearTimeout(timer);
      }, [loading]);

      const categories = useMemo(() => ['All', ...new Set(tasks.map(t => t.category).filter(Boolean).sort())], [tasks]);
      const assignees = useMemo(() => ['All', ...new Set(tasks.flatMap(t => t.assignee ? t.assignee.split(/[,&、]/).map(a => a.trim()).filter(Boolean) : []))], [tasks]);
      const statusOptions = ['All', 'Need Attention', 'In progress', 'To Do', 'Pending', 'Overdue', 'Done'];

      const scopedTasks = useMemo(() => {
        return [...tasks].filter(t => {
          const matchSearch = `${t.task || ''} ${t.detail || ''} ${t.progress || ''} ${t.assignee || ''}`.toLowerCase().includes(filters.search.toLowerCase());
          const matchCat = filters.category === 'All' || t.category === filters.category;
          const matchAssignee = filters.assignee === 'All' || (t.assignee && t.assignee.includes(filters.assignee));
          return matchSearch && matchCat && matchAssignee;
        });
      }, [tasks, filters.search, filters.category, filters.assignee]);

      const filteredTasks = useMemo(() => {
        return scopedTasks.filter(t => filters.status === 'All' || getBoardColumnKey(t) === filters.status);
      }, [scopedTasks, filters.status]);

      const summary = useMemo(() => {
        const total = scopedTasks.length;
        const needAttention = scopedTasks.filter(t => getBoardColumnKey(t) === 'Need Attention').length;
        const inProgress = scopedTasks.filter(t => getBoardColumnKey(t) === 'In progress').length;
        const done = scopedTasks.filter(t => getBoardColumnKey(t) === 'Done').length;
        const overdue = scopedTasks.filter(t => getBoardColumnKey(t) === 'Overdue').length;
        return { total, needAttention, inProgress, done, overdue };
      }, [scopedTasks]);

      const completedArchiveTasks = useMemo(() => sortTasks(filteredTasks.filter(t => getBoardColumnKey(t) === 'Done')), [filteredTasks]);

      const openNewTask = () => setEditingTask({
        category: filters.category !== 'All' ? filters.category : '',
        task: '',
        detail: '',
        progress: '',
        status: 'To Do',
        priority: 'P2 - 正常',
        isUrgent: false,
        assignee: '',
        startDate: '',
        dueDate: '',
        attachmentUrl: ''
      });

      const handleSaveTask = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const taskId = editingTask?.id || generateId();
        const taskData = {
          id: taskId,
          category: normalizeCategory(formData.get('category')),
          task: String(formData.get('task') || '').trim(),
          detail: String(formData.get('detail') || '').trim(),
          progress: String(formData.get('progress') || '').trim(),
          status: String(formData.get('status') || 'To Do'),
          priority: String(formData.get('priority') || 'P2 - 正常'),
          isUrgent: formData.get('isUrgent') === 'on',
          assignee: String(formData.get('assignee') || '').trim(),
          startDate: String(formData.get('startDate') || '').trim(),
          dueDate: String(formData.get('dueDate') || '').trim(),
          attachmentUrl: String(formData.get('attachmentUrl') || '').trim(),
          updatedAt: Date.now(),
          createdAt: editingTask?.createdAt || Date.now()
        };
        if (!taskData.task) return;
        setSaving(true);
        const prevTasks = tasks;
        const nextTasks = editingTask?.id ? tasks.map(t => t.id === taskId ? taskData : t) : [taskData, ...tasks];
        setTasks(nextTasks);
        try {
          if (window.FB?.setDoc && window.FB?.db) await window.FB.setDoc(getDocRef(taskId), taskData);
          setEditingTask(null);
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert('保存失败，请重试');
        } finally {
          setSaving(false);
        }
      };

      const handleDeleteTask = async () => {
        if (!editingTask?.id) return;
        const prevTasks = tasks;
        setSaving(true);
        setTasks(tasks.filter(t => t.id !== editingTask.id));
        try {
          if (window.FB?.deleteDoc && window.FB?.db) await window.FB.deleteDoc(getDocRef(editingTask.id));
          setEditingTask(null);
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert('删除失败，请重试');
        } finally {
          setSaving(false);
        }
      };

      const handleDrop = async (e, targetStatus, newCategory = null) => {
        e.preventDefault();
        setDraggedOverCol(null);
        if (targetStatus === 'Overdue') return;
        const taskId = e.dataTransfer.getData('taskId');
        if (!taskId) return;
        const targetTask = tasks.find(t => t.id === taskId);
        if (!targetTask) return;
        const updatedFields = {
          status: targetStatus === 'Need Attention' ? (targetTask.status === 'Done' ? 'Done' : 'In progress') : targetStatus,
          isUrgent: targetStatus === 'Need Attention',
          updatedAt: Date.now(),
          ...(newCategory ? { category: newCategory } : {})
        };
        const prevTasks = tasks;
        const nextTasks = tasks.map(t => t.id === taskId ? { ...t, ...updatedFields } : t);
        setTasks(nextTasks);
        try {
          if (window.FB?.updateDoc && window.FB?.db) await window.FB.updateDoc(getDocRef(taskId), updatedFields);
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert('拖拽更新失败，请重试');
        }
      };

      const viewOptions = [
        { id: 'kanban', label: '看板视图' },
        { id: 'swimlane', label: '板块内项目概览' },
        { id: 'timeline', label: '各板块进度条' },
        { id: 'table', label: '列表清单' }
      ];

      const summaryCards = [
        { label: '总任务', value: summary.total, status: 'All', accent: 'text-slate-900' },
        { label: '需过目', value: summary.needAttention, status: 'Need Attention', accent: 'text-rose-600' },
        { label: '推进中', value: summary.inProgress, status: 'In progress', accent: 'text-indigo-600' },
        { label: '已完成', value: summary.done, status: 'Done', accent: 'text-emerald-600' },
        { label: '已逾期', value: summary.overdue, status: 'Overdue', accent: 'text-red-600' }
      ];

      const renderColumnSection = (status, compact = false, taskSource = null, fillHeight = false, fixedHeight = false) => {
        const config = COLUMN_CONFIG[status];
        const columnTasks = taskSource || filteredTasks.filter(task => getBoardColumnKey(task) === status);
        const groupCategories = [...new Set(columnTasks.map(t => t.category || '未分类'))].sort();
        const isDragOver = draggedOverCol === status;
        const dropDisabled = status === 'Overdue';
        return (
          <section
            key={status}
            onDragOver={dropDisabled ? undefined : (e) => { e.preventDefault(); setDraggedOverCol(status); }}
            onDragLeave={dropDisabled ? undefined : () => setDraggedOverCol(null)}
            onDrop={dropDisabled ? undefined : (e) => handleDrop(e, status)}
            className={`kanban-column-shell rounded-3xl border ${config.borderColor} p-3.5 flex flex-col ${compact ? 'min-h-[180px]' : 'min-h-[500px]'} ${fixedHeight ? 'h-[500px]' : ''} ${fillHeight ? 'flex-1 min-h-0' : ''} ${isDragOver ? 'drag-over' : ''}`}
          >
            <div className={`rounded-2xl ${config.headerBg} px-4 py-3 flex items-center justify-between mb-4`}>
              <div className={`flex items-center gap-2 font-bold ${config.text}`}>
                {config.icon}
                <span>{config.title}</span>
              </div>
              <span className="text-sm font-semibold text-slate-500">{columnTasks.length}</span>
            </div>
            {status === 'Overdue' && (
              <div className="text-[11px] text-red-500 bg-red-50 border border-red-100 rounded-xl px-3 py-2 mb-3">
                到期未完成的项目会自动显示在这里；确认完成后再手动调整为“已完成”。
              </div>
            )}
            <div className="space-y-3 custom-scrollbar overflow-auto pr-1 flex-1">
              {columnTasks.length === 0 ? (
                <div className="h-40 rounded-2xl border border-dashed border-slate-200 bg-white/70 flex flex-col items-center justify-center text-center px-4">
                  <Icons.EmptyBox />
                  <p className="text-sm font-medium text-slate-500">当前列暂无任务</p>
                  <p className="text-xs text-slate-400 mt-1">{dropDisabled ? '根据截止日期自动出现。' : '可把卡片拖到这里。'}</p>
                </div>
              ) : groupCategories.map(cat => (
                <CategoryAccordionGroup key={`${status}-${cat}`} category={cat} tasks={columnTasks.filter(t => (t.category || '未分类') === cat)} onEdit={setEditingTask} previewCount={status === 'Overdue' ? 1 : 2} />
              ))}
            </div>
          </section>
        );
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <h2 className="text-slate-500 font-medium text-sm">正在加载工作台...</h2>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen lg:h-screen overflow-hidden">
          <header className="glass-header border-b border-white/60 px-4 md:px-5 py-3 shrink-0 z-20">
            <div className="max-w-[1700px] mx-auto space-y-3">
              <div className="flex flex-col 2xl:flex-row 2xl:items-center 2xl:justify-between gap-4">
                <div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-900">团队协作工作台</h1>
                  
                </div>
                <div className="flex flex-wrap gap-3 items-center">
                  <div className="flex flex-wrap bg-slate-100/90 rounded-2xl p-1.5 border border-slate-200/60 shadow-inner">
                    {viewOptions.map(v => (
                      <button key={v.id} onClick={() => setFilters(f => ({ ...f, view: v.id }))} className={`px-3.5 py-1.5 text-[12px] font-medium rounded-xl transition-all ${filters.view === v.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                        {v.label}
                      </button>
                    ))}
                  </div>
                  <button onClick={openNewTask} className="px-3.5 py-2 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-bold shadow-sm">+ 新增事项</button>
                </div>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3">
                {summaryCards.map(card => {
                  const active = filters.status === card.status;
                  return (
                    <button
                      key={card.label}
                      onClick={() => setFilters(f => ({ ...f, status: active ? 'All' : card.status }))}
                      className={`summary-card summary-card-btn rounded-2xl p-3 ${active ? 'active' : ''}`}
                    >
                      <div className="flex items-center justify-between gap-2">
                        <div className="text-xs text-slate-500">{card.label}</div>
                        <span className="text-[10px] text-slate-400">点击筛选</span>
                      </div>
                      <div className={`text-2xl font-bold mt-1.5 ${card.accent}`}>{card.value}</div>
                    </button>
                  );
                })}
              </div>

              <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-center">
                <div className="panel-glass rounded-2xl px-3.5 py-2.5 flex items-center gap-3 2xl:col-span-1"><Icons.Search /><input value={filters.search} onChange={(e) => setFilters(f => ({ ...f, search: e.target.value }))} placeholder="搜索事项、负责人、进展..." className="w-full bg-transparent outline-none text-sm" /></div>
                <div className="panel-glass rounded-2xl px-3.5 py-2.5"><select value={filters.category} onChange={(e) => setFilters(f => ({ ...f, category: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700"><option value="All">全部板块</option>{categories.filter(c => c !== 'All').map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                <div className="panel-glass rounded-2xl px-3.5 py-2.5"><select value={filters.assignee} onChange={(e) => setFilters(f => ({ ...f, assignee: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700"><option value="All">全部负责人</option>{assignees.filter(a => a !== 'All').map(a => <option key={a} value={a}>{a}</option>)}</select></div>
                <div className="panel-glass rounded-2xl px-3.5 py-2.5"><select value={filters.status} onChange={(e) => setFilters(f => ({ ...f, status: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700">{statusOptions.map(s => <option key={s} value={s}>{s === 'All' ? '全部状态' : getStatusTitle(s)}</option>)}</select></div>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-auto px-4 md:px-6 py-6 board-main">
            <div className="max-w-[1700px] mx-auto relative z-10">
              {filters.view === 'kanban' && (
                <>
                  <div className="grid grid-cols-1 xl:grid-cols-12 gap-5 items-stretch">
                    <div className="xl:col-span-3">
                      {renderColumnSection(
                        'Need Attention',
                        false,
                        filteredTasks.filter(task => {
                          const key = getBoardColumnKey(task);
                          return key === 'Need Attention' || key === 'To Do';
                        })
                      )}
                    </div>
                    <div className="xl:col-span-6">
                      {renderColumnSection('In progress', false, null, false, true)}
                    </div>
                    <div className="xl:col-span-3 flex flex-col gap-5 h-full">
                      {renderColumnSection('Overdue', true, null, true)}
                      {renderColumnSection('Pending', true, null, true)}
                    </div>
                  </div>

                  <CompletedArchivePanel tasks={completedArchiveTasks} onEdit={setEditingTask} />
                </>
              )}

              {filters.view === 'swimlane' && (
                <div>
                  {categories.filter(c => c !== 'All').length === 0 ? (
                    <div className="panel-glass rounded-2xl p-16 text-center text-slate-400">暂无板块数据</div>
                  ) : categories.filter(c => c !== 'All').map(cat => {
                    const catTasks = filteredTasks.filter(t => t.category === cat && getBoardColumnKey(t) !== 'Done');
                    if (catTasks.length === 0) return null;
                    return <CollapsibleSwimlane key={cat} catName={cat} columns={SWIMLANE_STATUSES} catTasks={catTasks} draggedOverCol={draggedOverCol} onDragOver={(e, key) => { e.preventDefault(); setDraggedOverCol(key); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={handleDrop} onEdit={setEditingTask} />;
                  })}
                  <CompletedArchivePanel tasks={completedArchiveTasks} onEdit={setEditingTask} />
                </div>
              )}

              {filters.view === 'timeline' && <TimelineView tasks={filteredTasks} categories={categories} onEdit={setEditingTask} />}
              {filters.view === 'table' && <TableView tasks={filteredTasks} onEdit={setEditingTask} />}
            </div>
          </main>

          {editingTask && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] border border-slate-200/50">
                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                  <h2 className="text-lg font-bold text-slate-800">{editingTask.id ? '编辑事项' : '新增事项'}</h2>
                  <button onClick={() => setEditingTask(null)} className="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-full transition-colors" disabled={saving}><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                <form id="task-form" onSubmit={handleSaveTask} className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div className="md:col-span-2"><label className="block text-[14px] font-semibold text-slate-600 mb-2">事项标题</label><input name="task" defaultValue={editingTask.task || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} required /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">板块分类</label><input name="category" defaultValue={editingTask.category || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">负责人</label><input name="assignee" defaultValue={editingTask.assignee || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">开始日期</label><input type="date" name="startDate" defaultValue={editingTask.startDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">截止日期</label><input type="date" name="dueDate" defaultValue={editingTask.dueDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">当前业务状态</label><select name="status" defaultValue={editingTask.status || 'To Do'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}>{EDITABLE_STATUS_OPTIONS.map(option => <option key={option} value={option}>{getStatusTitle(option)} ({option})</option>)}</select></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">紧急度</label><select name="priority" defaultValue={editingTask.priority || 'P2 - 正常'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}><option value="P0 - 紧急">P0 - 紧急</option><option value="P1 - 优先">P1 - 优先</option><option value="P2 - 正常">P2 - 正常</option><option value="P3 - 暂缓">P3 - 暂缓</option></select></div>
                  </div>
                  <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">最新进展</label><textarea name="progress" defaultValue={editingTask.progress || ''} rows="3" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap leading-relaxed transition-colors" disabled={saving}></textarea></div>
                  <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">内部说明备注</label><textarea name="detail" defaultValue={editingTask.detail || ''} rows="2" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap transition-colors" disabled={saving}></textarea></div>
                  <div><label className="flex items-center text-[14px] font-semibold text-slate-700 mb-3"><Icons.Link /><span className="ml-1.5">相关链接 (文档/网盘/网页)</span></label><input type="text" name="attachmentUrl" defaultValue={editingTask.attachmentUrl || ''} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-[13px] text-indigo-600 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400" placeholder="请粘贴 http:// 或 https:// 开头的链接..." disabled={saving} /></div>
                  <div className="mt-2 p-3 bg-rose-50/50 border border-rose-200 rounded-xl"><label className="flex items-center cursor-pointer select-none w-fit"><input type="checkbox" name="isUrgent" defaultChecked={editingTask.isUrgent} className="w-4 h-4 text-rose-600 rounded border-slate-300 focus:ring-rose-500 cursor-pointer" disabled={saving} /><span className="ml-2 text-[14px] font-bold text-rose-700">需过目</span></label></div>
                </form>
                <div className="px-6 py-4 bg-slate-50/80 border-t border-slate-200 flex justify-between items-center">
                  {editingTask.id ? <button type="button" onClick={handleDeleteTask} disabled={saving} className="text-slate-400 hover:text-red-500 text-[14px] font-medium transition-colors">删除任务</button> : <div></div>}
                  <div className="flex space-x-3">
                    <button type="button" onClick={() => setEditingTask(null)} disabled={saving} className="px-5 py-2.5 text-[14px] font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">取消</button>
                    <button type="submit" form="task-form" disabled={saving} className="px-6 py-2.5 text-[14px] font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-all shadow-sm">{saving ? '保存中...' : '确认保存'}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
