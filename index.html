<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队协作工作台 - HC & Orbiva</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-body); 
            color: #1e293b;
            overflow: hidden;
        }
        
        /* 优雅的自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 拖拽视觉反馈 */
        .drag-over { 
            background-color: #eef2ff !important; 
            border: 2px dashed #818cf8 !important; 
        }
        .dragging { opacity: 0.4; transform: scale(0.98); }
        
        /* 动画效果 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* 平滑过渡 */
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .swimlane-content { transition: max-height 0.5s ease-in-out, opacity 0.4s ease-in-out; overflow: hidden; }
        .swimlane-open { max-height: 4000px; opacity: 1; }
        .swimlane-closed { max-height: 0; opacity: 0; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const userConfig = {
          apiKey: "AIzaSyDyfETIW3f_mqphx7w2eErR_Z4w-EUWsZg",
          authDomain: "kanban-a8614.firebaseapp.com",
          projectId: "kanban-a8614",
          storageBucket: "kanban-a8614.firebasestorage.app",
          messagingSenderId: "42784160848",
          appId: "1:42784160848:web:12d40daec006adad1ea555",
          measurementId: "G-J9014LF5NG"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        window.FB = { 
            auth, db, storage, doc, setDoc, deleteDoc, updateDoc, onSnapshot, collection, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged, 
            ref, uploadBytesResumable, getDownloadURL 
        };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 图标组件库
        const Icons = {
            Alert: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            File: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            Play: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Pause: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Link: () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
            Edit: () => <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
            Search: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Upload: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
        };

        const COLUMN_CONFIG = {
            'Need Attention': { title: 'Need Attention', borderColor: 'border-red-400', headerBg: 'bg-red-50', text: 'text-red-600', icon: <Icons.Alert />, barColor: 'bg-red-500' },
            'To Do': { title: '待处理', borderColor: 'border-slate-300', headerBg: 'bg-slate-100', text: 'text-slate-600', icon: <Icons.File />, barColor: 'bg-slate-400' },
            'In progress': { title: '进行中', borderColor: 'border-indigo-400', headerBg: 'bg-indigo-50', text: 'text-indigo-600', icon: <Icons.Play />, barColor: 'bg-indigo-500' },
            'Pending': { title: '等待/暂停', borderColor: 'border-amber-400', headerBg: 'bg-amber-50', text: 'text-amber-600', icon: <Icons.Pause />, barColor: 'bg-amber-400' },
            'Done': { title: '已完成', borderColor: 'border-emerald-400', headerBg: 'bg-emerald-50', text: 'text-emerald-600', icon: <Icons.Check />, barColor: 'bg-emerald-500' }
        };

        // 辅助函数
        const generateId = () => 'task-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        const getInitials = (name) => {
            if (!name || name.trim() === '') return '?';
            const first = name.split(/[,&、]/)[0].trim();
            return /^[a-zA-Z]/.test(first) ? first.substring(0, 2).toUpperCase() : first.substring(0, 1);
        };
        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${hash % 360}, 65%, 75%)`;
        };
        const formatDateTime = (timestamp) => {
            if (!timestamp) return '-';
            const d = new Date(timestamp);
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const date = d.getDate().toString().padStart(2, '0');
            const year = d.getFullYear();
            const hours = d.getHours().toString().padStart(2, '0');
            const minutes = d.getMinutes().toString().padStart(2, '0');
            return `${month}月${date}日, ${year}, ${hours}:${minutes}`;
        };
        const parseDateOnly = (dateStr) => {
            if (!dateStr) return null;
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? null : d;
        };

        // UI 组件: 头像堆叠
        const AvatarGroup = ({ name }) => {
            const names = name ? name.split(/[,&、]/).map(n => n.trim()).filter(Boolean) : [];
            if (names.length === 0) return <span className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-sm">未分配</span>;
            return (
                <div className="flex items-center">
                    <div className="flex -space-x-1.5">
                        {names.slice(0, 3).map((n, i) => (
                            <div key={i} className="w-5 h-5 rounded-full ring-2 ring-white flex items-center justify-center text-[9px] font-bold text-slate-700 shadow-sm" style={{ backgroundColor: stringToColor(n) }} title={n}>
                                {getInitials(n)}
                            </div>
                        ))}
                        {names.length > 3 && <div className="w-5 h-5 rounded-full ring-2 ring-white bg-slate-200 flex items-center justify-center text-[9px] font-bold text-slate-600 shadow-sm">+{names.length - 3}</div>}
                    </div>
                    {names.length === 1 && <span className="text-[10px] text-slate-500 ml-1.5 truncate max-w-[60px] font-medium">{names[0]}</span>}
                </div>
            );
        };

        // UI 组件: 看板列内部的板块折叠组
        const CategoryAccordionGroup = ({ category, tasks, onEdit }) => {
            const [isOpen, setIsOpen] = useState(true);
            return (
                <div className="mb-3 bg-white/60 rounded-xl shadow-sm border border-slate-200/60 overflow-hidden">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between px-3 py-2.5 hover:bg-white transition-colors border-b border-slate-100/50">
                        <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                            {category}
                        </span>
                        <div className="flex items-center space-x-2">
                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">{tasks.length}</span>
                            <svg className={`w-3.5 h-3.5 text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </button>
                    <div className={`transition-all duration-300 overflow-hidden ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-2 space-y-2 bg-slate-50/20">
                            {tasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} hideCategoryLabel={true} />)}
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 任务卡片
        const TaskCard = ({ task, onEdit, onDragStart, onDragEnd, hideCategoryLabel = false }) => {
            const handleDragStart = (e) => {
                e.dataTransfer.setData('taskId', task.id);
                setTimeout(() => e.target.classList.add('dragging'), 0);
                if (onDragStart) onDragStart(e);
            };
            const handleDragEnd = (e) => {
                e.target.classList.remove('dragging');
                if (onDragEnd) onDragEnd(e);
            };

            return (
                <div 
                    draggable="true" 
                    onDragStart={handleDragStart} 
                    onDragEnd={handleDragEnd} 
                    onClick={() => onEdit(task)}
                    className={`bg-white p-3.5 rounded-xl border cursor-grab active:cursor-grabbing hover:border-indigo-300 hover:shadow-md smooth-transition group relative flex flex-col min-h-[100px] ${task.isUrgent ? 'border-red-200' : 'border-slate-200'}`}
                >
                    <div className="flex justify-between items-start mb-2">
                        <div className="flex flex-wrap gap-1.5 pr-8">
                            {!hideCategoryLabel && <span className="px-1.5 py-0.5 bg-slate-100 text-slate-500 text-[11px] font-medium rounded-md">{task.category || '未分类'}</span>}
                            
                            {task.isUrgent && (
                                <span className="px-1.5 py-0.5 border border-red-200 bg-red-50 text-red-600 text-[11px] font-bold rounded-md flex items-center shadow-sm">
                                    🚨 {COLUMN_CONFIG[task.status]?.title.split(' ')[0] || task.status}
                                </span>
                            )}
                        </div>
                    </div>
                    
                    <h4 className="font-semibold text-slate-800 text-sm mb-2 leading-relaxed group-hover:text-indigo-600 transition-colors">
                        {task.task || '未命名事项'}
                    </h4>
                    
                    {task.detail && (
                        <div className="mb-2">
                            <p className="text-xs text-slate-500 line-clamp-2 leading-relaxed bg-slate-50/80 p-1.5 rounded-md border border-slate-100">{task.detail}</p>
                        </div>
                    )}
                    
                    {task.progress && (
                        <div className="mb-3 flex-1">
                            <p className="text-[13px] text-slate-600 line-clamp-3 leading-relaxed whitespace-pre-wrap">{task.progress}</p>
                        </div>
                    )}

                    {task.attachmentUrl && (
                        <div className="mt-auto mb-3">
                            <button onClick={(e) => { e.stopPropagation(); window.open(task.attachmentUrl, '_blank'); }} className="max-w-full flex items-center space-x-1.5 px-2 py-1 bg-slate-50 hover:bg-indigo-50 border border-slate-200 hover:border-indigo-200 rounded-md text-xs text-slate-600 hover:text-indigo-600 transition-colors shadow-sm w-fit" title={task.attachmentName || '查看附件'}>
                                <Icons.Link />
                                <span className="truncate max-w-[140px] font-medium">{task.attachmentName || '附件链接'}</span>
                            </button>
                        </div>
                    )}
                    
                    <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100/80">
                        <AvatarGroup name={task.assignee} />
                        <div className="flex items-center space-x-2">
                            { (task.startDate || task.dueDate) && (
                                <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${(!task.dueDate || new Date(task.dueDate) < new Date()) && task.status !== 'Done' ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'}`}>
                                    {task.startDate ? task.startDate.substring(5).replace('-', '.') : '未定'} 
                                    {' 至 '} 
                                    {task.dueDate ? task.dueDate.substring(5).replace('-', '.') : '至今'}
                                </span>
                            )}
                            <span className="opacity-0 group-hover:opacity-100 smooth-transition text-indigo-500 bg-indigo-50 p-1 rounded"><Icons.Edit /></span>
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 可折叠板块内项目概览 (原泳道)
        const CollapsibleSwimlane = ({ catName, columns, catTasks, draggedOverCol, onDragOver, onDragLeave, onDrop, onEdit }) => {
            const [isOpen, setIsOpen] = useState(true);

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col mb-5 smooth-transition">
                    <button onClick={() => setIsOpen(!isOpen)} className="bg-slate-50 hover:bg-slate-100 transition-colors px-4 py-3.5 flex justify-between items-center w-full border-b border-slate-200">
                        <div className="flex items-center space-x-3">
                            <svg className={`w-4 h-4 text-slate-400 smooth-transition ${isOpen ? 'rotate-90' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                            <h2 className="font-bold text-slate-700 text-sm tracking-wide flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-400"></span>
                                {catName}
                            </h2>
                            <span className="text-[11px] text-slate-500 bg-white border border-slate-200 px-2 py-0.5 rounded-full">{catTasks.length} 项</span>
                        </div>
                    </button>
                    
                    <div className={`swimlane-content bg-slate-50/50 ${isOpen ? 'swimlane-open' : 'swimlane-closed'}`}>
                        <div className="flex overflow-x-auto p-4 space-x-4 min-h-[200px]">
                            {columns.map(status => {
                                const config = COLUMN_CONFIG[status];
                                const colTasks = catTasks.filter(t => {
                                    if (status === 'Need Attention') return t.isUrgent === true;
                                    return t.status === status && !t.isUrgent;
                                });
                                const dropKey = `${catName}-${status}`;
                                const isDragOver = draggedOverCol === dropKey;

                                return (
                                    <div 
                                        key={dropKey} 
                                        onDragOver={(e) => onDragOver(e, dropKey)} 
                                        onDragLeave={onDragLeave} 
                                        onDrop={(e) => onDrop(e, status, catName)} 
                                        className={`flex-shrink-0 w-[290px] flex flex-col rounded-xl bg-white transition-colors duration-200 border-t-4 border-x border-b ${config.borderColor} ${isDragOver ? 'drag-over border-transparent' : 'border-x-slate-200 border-b-slate-200'}`}
                                    >
                                        <div className={`px-3 py-2.5 flex justify-between items-center border-b border-slate-100/50 ${config.headerBg}`}>
                                            <h3 className={`font-semibold text-[13px] flex items-center space-x-1.5 ${config.text}`}>
                                                {config.icon}
                                                <span>{config.title}</span>
                                            </h3>
                                            <span className={`text-[11px] font-bold ${config.text} bg-white px-2 py-0.5 rounded shadow-sm opacity-80`}>{colTasks.length}</span>
                                        </div>
                                        <div className="p-2.5 flex-1 space-y-2.5 overflow-y-auto max-h-[500px] no-scrollbar">
                                            {colTasks.length === 0 ? (
                                                <div className="h-full min-h-[80px] rounded-lg border-2 border-dashed border-slate-100 flex items-center justify-center text-slate-300 text-xs">拖拽至此</div>
                                            ) : (
                                                colTasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} hideCategoryLabel={true} />)
                                            )}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // UI 组件: 各板块进度条 (Timeline/Gantt View - 按月显示，更加紧凑)
        const TimelineView = ({ tasks, categories, onEdit }) => {
            const today = useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);

            // 智能处理“至今”逻辑：空截止日期视为跨度到今天
            const enrichedTasks = useMemo(() => {
                return tasks.map(t => {
                    let s = parseDateOnly(t.startDate);
                    let e = parseDateOnly(t.dueDate);
                    if (!s && !e) {
                        s = new Date(today); e = new Date(today);
                    } else if (s && !e) {
                        e = new Date(today); // 无截止日期，视为“至今”
                    } else if (!s && e) {
                        s = new Date(e);
                    }
                    if (e < s) e = new Date(s);
                    return { ...t, _start: s, _end: e };
                });
            }, [tasks, today]);

            // 按照月进行时间段划分缩放
            const { minDate, maxDate, monthsArray, totalDays } = useMemo(() => {
                let minT = Math.min(...enrichedTasks.map(t => t._start.getTime()));
                let maxT = Math.max(...enrichedTasks.map(t => t._end.getTime()));
                
                if (!isFinite(minT)) minT = today.getTime();
                if (!isFinite(maxT)) maxT = today.getTime();

                let minD = new Date(minT);
                let maxD = new Date(maxT);
                
                // 左右留出适量缓冲空间 (往前推1个月，往后推2个月)
                minD = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
                maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 0); // 月末最后一天

                const mArray = [];
                let curr = new Date(minD);
                while (curr <= maxD) {
                    const y = curr.getFullYear();
                    const m = curr.getMonth();
                    const days = new Date(y, m + 1, 0).getDate(); // 获取该月总天数
                    mArray.push({ year: y, month: m, daysInMonth: days, date: new Date(curr) });
                    curr.setMonth(m + 1);
                }
                
                const tDays = mArray.reduce((acc, val) => acc + val.daysInMonth, 0);
                return { minDate: minD, maxDate: maxD, monthsArray: mArray, totalDays: tDays };
            }, [enrichedTasks, today]);

            // 核心缩放参数：缩小每一天所占像素，利用月份作为网格底纹
            const DAY_WIDTH = 4; // 这样1个月大约120像素宽，非常紧凑美观
            const leftColWidth = 320; 

            const renderCategories = () => {
                return (categories.filter(c => c !== 'All')).map(catName => {
                    const catTasks = enrichedTasks.filter(t => t.category === catName);
                    if (catTasks.length === 0) return null;

                    return (
                        <div key={catName} className="border-b border-slate-200 relative z-10">
                            {/* 分类标题行 */}
                            <div className="flex bg-slate-50/90 sticky left-0 z-20 border-r border-slate-200 font-bold text-[13px] text-slate-700 items-center px-4 py-2.5 shadow-sm" style={{ width: leftColWidth }}>
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 mr-2"></span>
                                {catName}
                            </div>
                            
                            {/* 任务行 */}
                            {catTasks.map(task => {
                                const offsetDays = (task._start.getTime() - minDate.getTime()) / 86400000;
                                const durationDays = (task._end.getTime() - task._start.getTime()) / 86400000 + 1;
                                
                                const config = COLUMN_CONFIG[task.status];
                                const barColorClass = task.isUrgent ? 'bg-red-500' : (config ? config.barColor : 'bg-slate-400');
                                
                                // 保证进度条至少有一点可见宽度
                                const barWidth = Math.max(durationDays * DAY_WIDTH, 12);

                                return (
                                    <div key={task.id} className="relative flex group border-b border-slate-100 hover:bg-slate-50/70 transition-colors h-12">
                                        {/* 左侧冻结的任务信息 */}
                                        <div className="sticky left-0 z-20 bg-white group-hover:bg-slate-50 flex items-center px-4 border-r border-slate-200 cursor-pointer" style={{ width: leftColWidth }} onClick={() => onEdit(task)}>
                                            <div className="flex-1 min-w-0 pr-2">
                                                <p className="text-[13px] font-semibold text-slate-800 truncate">{task.task}</p>
                                                <p className="text-[11px] text-slate-400 truncate mt-0.5">{task.assignee}</p>
                                            </div>
                                        </div>
                                        
                                        {/* 右侧进度轨道 */}
                                        <div className="absolute top-0 bottom-0 right-0 pointer-events-none" style={{ left: leftColWidth }}>
                                            <div 
                                                className={`absolute top-2.5 bottom-2.5 rounded-md shadow-sm opacity-90 transition-all ${barColorClass} cursor-pointer pointer-events-auto flex items-center px-2 overflow-hidden hover:opacity-100 hover:shadow-md hover:-translate-y-0.5`}
                                                style={{ left: `${offsetDays * DAY_WIDTH}px`, width: `${barWidth}px` }}
                                                onClick={() => onEdit(task)}
                                                title={`状态: ${task.status}\n时间: ${task.startDate || '未定'} 至 ${task.dueDate || '至今'}`}
                                            >
                                                {barWidth > 40 && <span className="text-[11px] font-bold text-white truncate mix-blend-screen pl-1">{task.progress || '查看详情'}</span>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    );
                });
            };

            const todayOffset = (today.getTime() - minDate.getTime()) / 86400000;

            return (
                <div className="h-full bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative">
                    <div className="flex-1 overflow-auto relative flex">
                        <div className="min-w-max relative pb-4">
                            {/* 顶部月份表头 */}
                            <div className="flex sticky top-0 z-30 bg-white border-b border-slate-200 h-10 shadow-sm">
                                <div className="sticky left-0 z-40 bg-white border-r border-slate-200 flex items-center px-4 font-bold text-[13px] text-slate-600 uppercase tracking-wider" style={{ width: leftColWidth }}>
                                    板块与事项标题
                                </div>
                                <div className="flex relative" style={{ width: totalDays * DAY_WIDTH }}>
                                    {monthsArray.map((m, i) => (
                                        <div key={i} className="flex flex-col items-center justify-center border-r border-slate-200 text-[11px] text-slate-500 font-bold bg-slate-50/50" style={{ width: m.daysInMonth * DAY_WIDTH }}>
                                            {m.year}年{m.month + 1}月
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* 主体图表与网格 */}
                            <div className="relative" style={{ width: leftColWidth + totalDays * DAY_WIDTH, minHeight: '100%' }}>
                                {/* 月份竖向分割线 */}
                                <div className="absolute top-0 bottom-0 flex pointer-events-none z-0" style={{ left: leftColWidth }}>
                                    {monthsArray.map((m, i) => (
                                        <div key={i} className="border-r border-slate-100 h-full box-border" style={{ width: m.daysInMonth * DAY_WIDTH }}></div>
                                    ))}
                                </div>
                                
                                {/* 今天红线指示 */}
                                {todayOffset >= 0 && todayOffset <= totalDays && (
                                    <div className="absolute top-0 bottom-0 w-[2px] bg-red-400/70 z-0 pointer-events-none" style={{ left: leftColWidth + todayOffset * DAY_WIDTH }}></div>
                                )}
                                
                                {renderCategories()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 主应用组件
        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [uploadingObj, setUploadingObj] = useState({ isUploading: false, progress: 0 });

            // 视图状态与所有筛选器（包含全局状态筛选）
            const [filters, setFilters] = useState({ view: 'kanban', search: '', category: 'All', assignee: 'All', status: 'All' });
            const [draggedOverCol, setDraggedOverCol] = useState(null);
            
            const [editingTask, setEditingTask] = useState(null);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [importText, setImportText] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

            // 1. 鉴权初始化
            useEffect(() => {
                const initAuth = async () => {
                    if (window.FB && window.FB.auth) {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(window.FB.auth, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(window.FB.auth);
                            }
                        } catch (e) {
                            console.error("Auth failed:", e);
                        }
                    }
                };

                const setupListener = () => {
                    if(window.FB && window.FB.auth) {
                        initAuth();
                        return window.FB.onAuthStateChanged(window.FB.auth, setUser);
                    }
                }

                let unsub = window.FB ? setupListener() : null;
                if (!window.FB) {
                    window.addEventListener('firebase-loaded', () => { unsub = setupListener(); });
                }
                return () => { if(unsub) unsub(); window.removeEventListener('firebase-loaded', setupListener); };
            }, []);

            // 2. 数据库监听与智能自愈
            useEffect(() => {
                if (!user || !window.FB) return;
                
                const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
                const colRef = window.FB.collection(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks');
                
                const unsub = window.FB.onSnapshot(colRef, 
                    (snapshot) => {
                        const fetchedTasks = [];
                        const categoryCasingMap = new Map();

                        snapshot.forEach(doc => {
                            let data = doc.data();
                            
                            if (data.status === 'Need Attention') {
                                data.status = 'In progress'; 
                                data.isUrgent = true;
                            }

                            if (data.category) {
                                const lowerCat = data.category.toLowerCase().trim();
                                if (!categoryCasingMap.has(lowerCat)) {
                                    categoryCasingMap.set(lowerCat, data.category.trim());
                                }
                                data.category = categoryCasingMap.get(lowerCat);
                            }

                            fetchedTasks.push({ id: doc.id, ...data });
                        });
                        setTasks(fetchedTasks);
                        setLoading(false);
                    }, 
                    (err) => {
                        console.error("Firestore sync error:", err);
                        showToast("连接数据库失败，请检查配置或权限！");
                        setLoading(false);
                    }
                );
                return () => unsub();
            }, [user]);

            const getNormalizedCategory = (catName) => {
                if (!catName) return "未分类";
                const trimmed = catName.trim();
                const lower = trimmed.toLowerCase();
                const existing = tasks.find(t => t.category && t.category.toLowerCase() === lower);
                return existing ? existing.category : trimmed;
            };

            // 附件文件上传
            const handleFileUpload = async (e) => {
                const fileInput = e.target;
                const file = fileInput.files[0];
                if (!file) return;

                if (file.size > 20 * 1024 * 1024) { 
                    alert('文件过大，请上传 20MB 以内的文件'); 
                    fileInput.value = '';
                    return; 
                }

                setUploadingObj({ isUploading: true, progress: 0 });

                try {
                    if (!window.FB || !window.FB.storage) throw new Error("存储服务尚未初始化");

                    const safeName = `${Date.now()}_${encodeURIComponent(file.name)}`;
                    const storageRef = window.FB.ref(window.FB.storage, `kanban_attachments/${safeName}`);
                    const uploadTask = window.FB.uploadBytesResumable(storageRef, file);

                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                const prog = snapshot.totalBytes > 0 ? Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100) : 0;
                                setUploadingObj({ isUploading: true, progress: prog });
                            }, 
                            (error) => reject(error),
                            () => resolve()
                        );
                    });

                    const downloadURL = await window.FB.getDownloadURL(uploadTask.snapshot.ref);
                    setEditingTask(prev => prev ? { ...prev, attachmentUrl: downloadURL, attachmentName: file.name } : null);
                    showToast('附件上传成功！');
                } catch (error) {
                    console.error("Upload error:", error);
                    alert('上传失败: ' + (error.message || '未知错误'));
                } finally {
                    setUploadingObj({ isUploading: false, progress: 0 });
                    fileInput.value = ''; 
                }
            };

            const getDocRef = (taskId) => {
                const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
                return window.FB.doc(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks', taskId);
            };

            // 数据保存操作
            const handleSaveTask = async (e) => {
                e.preventDefault();
                setSaving(true);
                const formData = new FormData(e.target);
                const taskId = editingTask.id || generateId();
                
                // 处理时间字段
                let sDate = formData.get('startDate');
                let eDate = formData.get('dueDate');
                if (sDate && eDate && new Date(eDate) < new Date(sDate)) eDate = sDate;

                const taskData = {
                    id: taskId,
                    category: getNormalizedCategory(formData.get('category')),
                    task: formData.get('task').trim(),
                    detail: formData.get('detail').trim(),
                    progress: formData.get('progress').trim(),
                    status: formData.get('status'),
                    isUrgent: formData.get('isUrgent') === 'on',
                    assignee: formData.get('assignee').trim(),
                    startDate: sDate || '',
                    dueDate: eDate || '',
                    attachmentUrl: editingTask.attachmentUrl || '', 
                    attachmentName: editingTask.attachmentName || '', 
                    updatedAt: Date.now()
                };

                try {
                    await window.FB.setDoc(getDocRef(taskId), taskData);
                    showToast(editingTask.id ? '已同步更新' : '已发布任务');
                    setEditingTask(null);
                } catch (error) { showToast("保存失败，请检查网络！"); console.error(error); } 
                finally { setSaving(false); }
            };

            const handleDeleteTask = async () => {
                if(!editingTask.id) return;
                if(confirm('确定彻底删除此记录吗？')) {
                    setSaving(true);
                    try {
                        await window.FB.deleteDoc(getDocRef(editingTask.id));
                        showToast('已删除'); setEditingTask(null);
                    } catch (error) {} 
                    finally { setSaving(false); }
                }
            };

            // 拖拽操作
            const handleDrop = async (e, targetStatus, newCategory = null) => {
                e.preventDefault();
                setDraggedOverCol(null);
                const taskId = e.dataTransfer.getData('taskId');
                if (!taskId) return;

                const taskToMove = tasks.find(t => t.id === taskId);
                if (!taskToMove) return;

                let updatedFields = { updatedAt: Date.now() };
                if (newCategory) updatedFields.category = newCategory;

                if (targetStatus === 'Need Attention') {
                    updatedFields.isUrgent = true;
                } else {
                    updatedFields.status = targetStatus;
                    updatedFields.isUrgent = false;
                }

                setTasks(prev => prev.map(t => t.id === taskId ? { ...t, ...updatedFields } : t));
                
                if (user && window.FB) {
                    try { await window.FB.updateDoc(getDocRef(taskId), updatedFields); } 
                    catch (error) { showToast("状态同步失败，将刷新页面重试"); }
                }
            };

            // CSV 批量操作
            const handleCsvUpload = (e) => {
                const fileInput = e.target;
                const file = fileInput.files[0];
                if (!file) return;

                try {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImportText(event.target.result);
                        showToast("文件读取成功，请检查内容并点击「解析并导入」");
                        fileInput.value = '';
                    };
                    reader.onerror = () => { alert("读取异常"); fileInput.value = ''; };
                    reader.readAsText(file);
                } catch (error) {
                    alert("加载文件发生异常！"); fileInput.value = '';
                }
            };

            const handleImportSubmit = async () => {
                if (!importText.trim()) return;
                
                const parseCSV = (text) => {
                    const rows = []; let row = []; let cell = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const char = text[i]; const nextChar = text[i + 1];
                        if (char === '"') {
                            if (inQuotes && nextChar === '"') { cell += '"'; i++; } else { inQuotes = !inQuotes; }
                        } else if ((char === ',' || char === '\t') && !inQuotes) { row.push(cell.trim()); cell = '';
                        } else if ((char === '\n' || char === '\r') && !inQuotes) {
                            if (char === '\r' && nextChar === '\n') i++; 
                            row.push(cell.trim()); if (row.some(c => c !== '')) rows.push(row);
                            row = []; cell = '';
                        } else { cell += char; }
                    }
                    if (cell || row.length > 0) { row.push(cell.trim()); if (row.some(c => c !== '')) rows.push(row); }
                    return rows;
                };

                const matrix = parseCSV(importText);
                if (matrix.length < 2) { alert("未检测到有效数据"); return; }
                const headers = matrix[0];
                
                const colMap = {
                    category: Math.max(0, headers.findIndex(h => h.includes('分类') || h.includes('板块'))),
                    task: Math.max(1, headers.findIndex(h => h.includes('事项') || h.includes('项目'))),
                    detail: Math.max(2, headers.findIndex(h => h.includes('具体') || h.includes('详细') || h.includes('备注'))),
                    progress: Math.max(3, headers.findIndex(h => h.includes('进展') || h.includes('预期'))),
                    status: Math.max(4, headers.findIndex(h => h.includes('状态'))),
                    assignee: Math.max(5, headers.findIndex(h => h.includes('参与人') || h.includes('负责人'))),
                };

                const localCategoryMap = new Map();
                let parsedData = [], lastCat = "", lastTask = "";
                
                for (let i = 1; i < matrix.length; i++) {
                    const row = matrix[i];
                    if (row.length === 0 || row.every(c => !c)) continue;
                    
                    const getCell = (idx) => (idx === -1 || idx >= row.length) ? "" : (row[idx] || "");
                    
                    let rawCat = getCell(colMap.category); if (rawCat) lastCat = rawCat; else rawCat = lastCat;
                    let task = getCell(colMap.task); if (task) lastTask = task; else task = lastTask;
                    
                    let detail = getCell(colMap.detail), progress = getCell(colMap.progress);
                    let statusRaw = getCell(colMap.status) || "To Do", assignee = getCell(colMap.assignee);
                    if (!task && !detail && !progress) continue;

                    let normalizedCat = "未分类";
                    if (rawCat) {
                        const lower = rawCat.toLowerCase().trim();
                        if (!localCategoryMap.has(lower)) localCategoryMap.set(lower, getNormalizedCategory(rawCat));
                        normalizedCat = localCategoryMap.get(lower);
                    }

                    let isUrgent = false, status = "To Do";
                    const sLower = statusRaw.toLowerCase();
                    if (sLower.includes("attention") || sLower.includes("重点")) { isUrgent = true; status = "In progress"; } 
                    else if (sLower.includes("progress") || sLower.includes("进行")) { status = "In progress"; } 
                    else if (sLower.includes("done") || sLower.includes("完成")) { status = "Done"; } 
                    else if (sLower.includes("pending") || sLower.includes("暂缓")) { status = "Pending"; } 
                    else if (statusRaw.trim() && COLUMN_CONFIG[statusRaw]) { status = statusRaw; }
                    
                    parsedData.push({ 
                        id: `task-imp-${Date.now()}-${i}`, category: normalizedCat, 
                        task: task || "未命名事项", detail, progress, status, isUrgent, assignee: assignee || "未分配", 
                        startDate: '', dueDate: '', attachmentUrl: '', attachmentName: '', updatedAt: Date.now() 
                    });
                }

                setSaving(true);
                try {
                    await Promise.all(parsedData.map(t => window.FB.setDoc(getDocRef(t.id), t)));
                    showToast(`成功导入 ${parsedData.length} 条数据！`);
                    setIsImportModalOpen(false); setImportText('');
                } catch (error) { alert("批量同步失败"); }
                finally { setSaving(false); }
            };

            const handleExport = () => {
                const headers = ['板块', '事项标题', '内部说明', '进展', '真实状态', '是否紧急(Need Attention)', '参与人', '开始日期', '截止日期', '最后编辑时间'];
                const rows = tasks.map(t => [
                    `"${t.category||''}"`, `"${(t.task||'').replace(/"/g, '""')}"`, 
                    `"${(t.detail||'').replace(/"/g, '""')}"`, `"${(t.progress||'').replace(/"/g, '""')}"`, 
                    `"${t.status||''}"`, `"${t.isUrgent ? 'Yes' : 'No'}"`, `"${t.assignee||''}"`, 
                    `"${t.startDate||''}"`, `"${t.dueDate||''}"`, `"${formatDateTime(t.updatedAt)}"`
                ]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const link = document.createElement("a");
                link.href = encodeURI(csvContent);
                link.download = `看板导出_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            // 过滤与计算 (加入了状态过滤)
            const filteredTasks = useMemo(() => {
                return [...tasks]
                    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
                    .filter(t => {
                        const matchSearch = `${t.task} ${t.detail} ${t.progress} ${t.assignee}`.toLowerCase().includes(filters.search.toLowerCase());
                        const matchCat = filters.category === 'All' || t.category === filters.category;
                        const matchAssignee = filters.assignee === 'All' || (t.assignee && t.assignee.includes(filters.assignee));
                        const matchStatus = filters.status === 'All' || t.status === filters.status || (filters.status === 'Need Attention' && t.isUrgent);
                        return matchSearch && matchCat && matchAssignee && matchStatus;
                    });
            }, [tasks, filters]);

            const categories = ['All', ...new Set(tasks.map(t => t.category).filter(Boolean).sort())];
            const assignees = ['All', ...new Set(tasks.flatMap(t => t.assignee ? t.assignee.split(/[,&、]/).map(a => a.trim()).filter(Boolean) : []))];
            const columns = Object.keys(COLUMN_CONFIG);
            
            // 下拉栏所需的所有状态
            const statusOptions = ['All', ...columns];

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <h2 className="text-slate-500 font-medium text-sm">正在加载工作台...</h2>
                    </div>
                );
            }

            // 精调视图顺序并重命名
            const viewOptions = [
                { id: 'kanban', label: '看板视图' },
                { id: 'swimlane', label: '板块内项目概览' },
                { id: 'timeline', label: '各板块进度条' },
                { id: 'table', label: '列表清单' }
            ];

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* 顶部导航 */}
                    <header className="glass-header border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 z-20">
                        <div className="flex items-center space-x-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-lg shadow-sm flex items-center justify-center font-bold text-white tracking-wider text-sm">HC</div>
                            <div>
                                <h1 className="text-[17px] font-bold text-slate-800 flex items-center">
                                    协同工作台
                                </h1>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                            <div className="flex bg-slate-100/80 rounded-lg p-1.5 border border-slate-200/60 shadow-inner">
                                {viewOptions.map(v => (
                                    <button key={v.id} onClick={() => setFilters(f => ({...f, view: v.id}))} className={`px-4 py-1.5 text-[13px] font-medium rounded-md transition-all ${filters.view === v.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                        {v.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setIsImportModalOpen(true)} className="flex items-center space-x-1.5 bg-white text-slate-600 border border-slate-300 px-4 py-2 rounded-lg text-[13px] font-medium hover:bg-slate-50 transition-colors shadow-sm">
                                <Icons.Upload /> <span>导入</span>
                            </button>
                            <button onClick={() => setEditingTask({ status: 'To Do', isUrgent: false })} className="flex items-center space-x-1.5 bg-indigo-600 text-white px-5 py-2 rounded-lg text-[13px] font-medium hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">
                                <span className="text-lg leading-none mb-0.5">+</span> <span>新建任务</span>
                            </button>
                        </div>
                    </header>

                    {/* 控制栏 (增加全局状态筛选) */}
                    <div className="bg-white/80 backdrop-blur-sm border-b border-slate-200 px-6 py-2.5 flex items-center justify-between shrink-0 z-10">
                        <div className="flex items-center space-x-5 overflow-x-auto no-scrollbar py-1">
                            <div className="flex items-center space-x-2 pr-5 border-r border-slate-200">
                                <span className="text-[13px] font-medium text-slate-400 uppercase tracking-wider">执行人</span>
                                <select className="text-[13px] bg-slate-50 border border-slate-200 rounded-md py-1.5 px-3 focus:ring-1 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer" value={filters.assignee} onChange={(e) => setFilters(f => ({...f, assignee: e.target.value}))}>
                                    {assignees.map(a => <option key={a} value={a}>{a === 'All' ? '全部人员' : a}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center space-x-2 pr-5 border-r border-slate-200">
                                <span className="text-[13px] font-medium text-slate-400 uppercase tracking-wider">状态过滤</span>
                                <select className="text-[13px] bg-slate-50 border border-slate-200 rounded-md py-1.5 px-3 focus:ring-1 focus:ring-indigo-500 text-slate-700 font-medium cursor-pointer" value={filters.status} onChange={(e) => setFilters(f => ({...f, status: e.target.value}))}>
                                    {statusOptions.map(s => <option key={s} value={s}>{s === 'All' ? '全部状态' : (COLUMN_CONFIG[s]?.title || s)}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center space-x-2">
                                <span className="text-[13px] font-medium text-slate-400 uppercase tracking-wider mr-2">板块分类</span>
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilters(f => ({...f, category: cat}))} className={`px-3.5 py-1.5 rounded-full text-[13px] font-medium transition-colors border ${filters.category === cat ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                                        {cat === 'All' ? '全部' : cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center space-x-3 pl-4 border-l border-slate-200">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 flex items-center pl-2.5 text-slate-400"><Icons.Search /></span>
                                <input type="text" placeholder="搜索事项或人员..." className="pl-8 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-[13px] focus:outline-none focus:ring-1 focus:ring-indigo-500 w-52 transition-all focus:w-64 focus:bg-white" value={filters.search} onChange={(e) => setFilters(f => ({...f, search: e.target.value}))} />
                            </div>
                            <button onClick={handleExport} className="text-slate-400 hover:text-indigo-600 p-2 rounded-md hover:bg-slate-100 transition-colors" title="导出备份"><Icons.Download /></button>
                        </div>
                    </div>

                    {/* 主内容区 */}
                    <main className="flex-1 overflow-hidden p-6 relative">
                        {tasks.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
                                <div className="text-4xl mb-4 opacity-50">✨</div>
                                <h3 className="text-base font-medium text-slate-700 mb-1">开始你的第一个项目</h3>
                                <p className="text-sm mb-4">点击右上角新建任务，或导入已有的 Excel 数据。</p>
                            </div>
                        ) : filters.view === 'kanban' ? (
                            <div className="flex h-full space-x-5 overflow-x-auto no-scrollbar pb-4 items-start">
                                {columns.map(status => {
                                    const config = COLUMN_CONFIG[status];
                                    const colTasks = filteredTasks.filter(t => {
                                        if (status === 'Need Attention') return t.isUrgent === true;
                                        return t.status === status && !t.isUrgent;
                                    });
                                    const isDragOver = draggedOverCol === status;

                                    return (
                                        <div key={status} onDragOver={(e) => { e.preventDefault(); setDraggedOverCol(status); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={(e) => handleDrop(e, status)} className={`flex-shrink-0 w-[310px] max-h-full flex flex-col rounded-2xl bg-white shadow-sm transition-all duration-200 border-t-4 border-x border-b ${config.borderColor} ${isDragOver ? 'drag-over border-transparent' : 'border-x-slate-200 border-b-slate-200'}`}>
                                            <div className={`px-4 py-3 flex justify-between items-center border-b border-slate-100/60 rounded-t-xl ${config.headerBg}`}>
                                                <h3 className={`font-semibold text-[14px] flex items-center space-x-1.5 ${config.text}`}>{config.icon}<span>{config.title}</span></h3>
                                                <span className={`text-[11px] font-bold ${config.text} bg-white px-2.5 py-0.5 rounded shadow-sm opacity-80`}>{colTasks.length}</span>
                                            </div>
                                            <div className="p-3 flex-1 overflow-y-auto no-scrollbar bg-slate-50/40 rounded-b-xl">
                                                {colTasks.length === 0 ? (
                                                    <div className="h-24 m-1 border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center text-slate-300 text-sm">拖拽至此</div>
                                                ) : (
                                                    categories.filter(c => c !== 'All').map(cat => {
                                                        const catTasks = colTasks.filter(t => t.category === cat);
                                                        if (catTasks.length === 0) return null;
                                                        return <CategoryAccordionGroup key={cat} category={cat} tasks={catTasks} onEdit={setEditingTask} />;
                                                    })
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : filters.view === 'timeline' ? (
                            <TimelineView tasks={filteredTasks} categories={categories} onEdit={setEditingTask} />
                        ) : filters.view === 'swimlane' ? (
                            <div className="h-full overflow-y-auto pr-2 pb-10">
                                {(filters.category === 'All' ? categories.slice(1) : [filters.category]).map(catName => {
                                    const catTasks = filteredTasks.filter(t => t.category === catName);
                                    if (catTasks.length === 0) return null;
                                    return <CollapsibleSwimlane key={catName} catName={catName} columns={columns} catTasks={catTasks} draggedOverCol={draggedOverCol} onDragOver={(e, key) => { e.preventDefault(); setDraggedOverCol(key); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={handleDrop} onEdit={setEditingTask} />
                                })}
                            </div>
                        ) : (
                            <div className="h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="overflow-auto flex-1 relative">
                                    <table className="min-w-full divide-y divide-slate-200 text-left">
                                        <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-48">
                                                    <div className="flex items-center justify-between">
                                                        <span>板块分类</span>
                                                        <select 
                                                            className="ml-2 px-1.5 py-1 bg-white border border-slate-200 rounded text-[11px] normal-case tracking-normal text-slate-700 font-medium focus:outline-none focus:ring-1 focus:ring-indigo-500 cursor-pointer shadow-sm max-w-[85px] truncate"
                                                            value={filters.category}
                                                            onChange={(e) => setFilters(f => ({...f, category: e.target.value}))}
                                                            onClick={(e) => e.stopPropagation()}
                                                        >
                                                            {categories.map(cat => <option key={cat} value={cat}>{cat === 'All' ? '全部板块' : cat}</option>)}
                                                        </select>
                                                    </div>
                                                </th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-1/4">事项标题</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">进展动态</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-36">状态</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-32">周期</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-44">
                                                    <div className="flex items-center justify-between">
                                                        <span>参与人</span>
                                                        <select 
                                                            className="ml-2 px-1.5 py-1 bg-white border border-slate-200 rounded text-[11px] normal-case tracking-normal text-slate-700 font-medium focus:outline-none focus:ring-1 focus:ring-indigo-500 cursor-pointer shadow-sm max-w-[80px] truncate"
                                                            value={filters.assignee}
                                                            onChange={(e) => setFilters(f => ({...f, assignee: e.target.value}))}
                                                            onClick={(e) => e.stopPropagation()}
                                                        >
                                                            {assignees.map(a => <option key={a} value={a}>{a === 'All' ? '全部人员' : a}</option>)}
                                                        </select>
                                                    </div>
                                                </th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-48 text-right">最后编辑时间</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {filteredTasks.map(task => {
                                                const config = COLUMN_CONFIG[task.status];
                                                return (
                                                    <tr key={task.id} onClick={() => setEditingTask(task)} className="hover:bg-slate-50/80 transition-colors cursor-pointer group">
                                                        <td className="px-6 py-4 whitespace-nowrap"><span className="bg-slate-100 text-slate-600 text-[13px] font-medium px-2 py-1 rounded-md">{task.category || '-'}</span></td>
                                                        <td className="px-6 py-4 text-[13px] text-slate-800 font-medium">
                                                            <div className="flex items-center gap-2 mb-1.5">
                                                                <span>{task.task}</span>
                                                            </div>
                                                            {task.detail && <div className="text-[11px] text-slate-400 line-clamp-1 font-normal">{task.detail}</div>}
                                                        </td>
                                                        <td className="px-6 py-4 text-[13px] text-slate-600"><div className="line-clamp-2 leading-relaxed">{task.progress || '-'}</div></td>
                                                        <td className="px-6 py-4 whitespace-nowrap">
                                                            {task.isUrgent && <span className="mr-1.5 px-2 py-1 inline-flex text-[11px] font-bold rounded-md bg-red-100 text-red-700 shadow-sm border border-red-200">Need Attention</span>}
                                                            <span className={`px-2.5 py-1 inline-flex text-[11px] font-semibold rounded-md border ${config ? config.headerBg + ' ' + config.text + ' border-transparent' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                                {config?.title.split(' ')[0] || task.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4 text-[11px] text-slate-500 whitespace-nowrap leading-relaxed">
                                                            {task.startDate || task.dueDate ? (
                                                                <>
                                                                    {task.startDate || '未定'} <br/> 
                                                                    <span className={!task.dueDate ? "text-indigo-500 font-bold" : ""}>至 {task.dueDate || '至今'}</span>
                                                                </>
                                                            ) : '-'}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap"><AvatarGroup name={task.assignee} /></td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-right text-[11px] text-slate-400 font-mono">{formatDateTime(task.updatedAt)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 编辑/新建 任务弹窗 */}
                    {editingTask && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] modal-content border border-slate-200/50">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center">
                                        {editingTask.id ? '编辑任务' : '新建任务'}
                                        {saving && <span className="ml-3 text-[13px] text-indigo-500 font-normal flex items-center"><span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-ping mr-2"></span>同步中...</span>}
                                    </h2>
                                    <button type="button" onClick={() => setEditingTask(null)} className="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-full transition-colors" disabled={saving || uploadingObj.isUploading}><Icons.Alert style={{display:'none'}}/><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                                </div>
                                
                                <form id="task-form" onSubmit={handleSaveTask} className="flex-1 overflow-y-auto p-6 space-y-6">
                                    <div>
                                        <label className="block text-[14px] font-semibold text-slate-600 mb-2">板块分类</label>
                                        <input name="category" defaultValue={editingTask.category} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" placeholder="例如：顶层设计" disabled={saving} />
                                    </div>
                                    
                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">事项标题 <span className="text-red-500">*</span></label><input required name="task" defaultValue={editingTask.task} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium text-slate-800 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                    
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">开始日期</label><input type="date" name="startDate" defaultValue={editingTask.startDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">截止日期 <span className="text-[11px] font-normal text-slate-400 ml-1">(留空表示“至今”)</span></label><input type="date" name="dueDate" defaultValue={editingTask.dueDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                    </div>

                                    {/* 附件模块 */}
                                    <div className="bg-slate-50/50 p-4 rounded-xl border border-slate-200/60">
                                        <label className="flex items-center text-[14px] font-semibold text-slate-700 mb-3"><Icons.Link /><span className="ml-1.5">附件与相关链接</span></label>
                                        <div className="flex flex-col sm:flex-row items-start sm:items-center space-y-3 sm:space-y-0 sm:space-x-3">
                                            <label className={`px-4 py-2.5 border rounded-lg text-[13px] font-medium transition-colors whitespace-nowrap shadow-sm flex items-center justify-center ${uploadingObj.isUploading ? 'bg-indigo-50 text-indigo-400 border-indigo-100 cursor-not-allowed' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50 hover:border-slate-300 cursor-pointer'}`}>
                                                <Icons.Upload /> <span className="ml-1.5">{uploadingObj.isUploading ? `上传中 ${uploadingObj.progress}%` : '上传本地文件'}</span>
                                                <input type="file" className="hidden" onChange={handleFileUpload} disabled={uploadingObj.isUploading || saving} />
                                            </label>
                                            <div className="flex-1 w-full">
                                                <input type="text" value={editingTask.attachmentUrl || ''} onChange={(e) => setEditingTask({...editingTask, attachmentUrl: e.target.value})} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-[13px] text-indigo-600 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400" placeholder="或直接粘贴链接 (https://...)" disabled={saving} />
                                            </div>
                                        </div>
                                        {editingTask.attachmentName && (
                                            <div className="mt-4 flex items-center inline-flex bg-white px-3 py-2 rounded-md border border-slate-200 shadow-sm">
                                                <Icons.File /> <span className="ml-2 text-[13px] text-slate-600 font-medium max-w-[200px] truncate">{editingTask.attachmentName}</span>
                                                <button type="button" onClick={() => setEditingTask({...editingTask, attachmentName: '', attachmentUrl: ''})} className="ml-3 text-slate-400 hover:text-red-500"><Icons.Edit style={{display:'none'}}/><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                                            </div>
                                        )}
                                    </div>

                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">最新进展</label><textarea name="progress" defaultValue={editingTask.progress} rows="3" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap leading-relaxed transition-colors" disabled={saving}></textarea></div>
                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">内部说明备注</label><textarea name="detail" defaultValue={editingTask.detail} rows="2" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap transition-colors" disabled={saving}></textarea></div>

                                    <div className="grid grid-cols-2 gap-5 pb-2">
                                        <div>
                                            <label className="block text-[14px] font-semibold text-slate-600 mb-2">底层进度状态</label>
                                            <select name="status" defaultValue={editingTask.status || 'To Do'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}>
                                                <option value="To Do">待处理 (To Do)</option>
                                                <option value="In progress">进行中 (In progress)</option>
                                                <option value="Pending">等待/暂停 (Pending)</option>
                                                <option value="Done">已完成 (Done)</option>
                                            </select>
                                            
                                            <label className="flex items-center mt-4 cursor-pointer select-none">
                                                <input type="checkbox" name="isUrgent" defaultChecked={editingTask.isUrgent} className="w-4 h-4 text-red-600 rounded border-slate-300 focus:ring-red-500 cursor-pointer" disabled={saving} />
                                                <span className="ml-2 text-[14px] font-bold text-red-600">🚨 标记为 Need Attention (需高优关注)</span>
                                            </label>
                                        </div>
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">负责人</label><input name="assignee" defaultValue={editingTask.assignee} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" placeholder="如：Finn, Lydia" disabled={saving} /></div>
                                    </div>
                                </form>
                                
                                <div className="px-6 py-4 bg-slate-50/80 border-t border-slate-200 flex justify-between items-center">
                                    {editingTask.id ? <button type="button" onClick={handleDeleteTask} disabled={saving || uploadingObj.isUploading} className="text-slate-400 hover:text-red-500 text-[14px] font-medium transition-colors">删除任务</button> : <div></div>}
                                    <div className="flex space-x-3">
                                        <button type="button" onClick={() => setEditingTask(null)} disabled={saving || uploadingObj.isUploading} className="px-5 py-2.5 text-[14px] font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">取消</button>
                                        <button type="submit" form="task-form" disabled={saving || uploadingObj.isUploading} className={`px-6 py-2.5 text-[14px] font-bold text-white rounded-lg transition-all shadow-sm ${uploadingObj.isUploading ? 'bg-indigo-300' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-md hover:-translate-y-0.5'}`}>
                                            {saving ? '保存中...' : (uploadingObj.isUploading ? '处理文件中' : '确认保存')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 导入弹窗 */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
