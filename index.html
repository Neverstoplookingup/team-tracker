                                                <span className={`text-[11px] font-bold ${config.text} bg-white px-2.5 py-0.5 rounded shadow-sm opacity-80`}>{colTasks.length}</span>
                                            </div>
                                            <div className="p-3 flex-1 overflow-y-auto custom-scrollbar bg-slate-50/40 rounded-b-xl">
                                                {colTasks.length === 0 ? (
                                                    <div className="h-24 m-1 border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center text-slate-300 text-sm">拖拽至此</div>
                                                ) : (
                                                    categories.filter(c => c !== 'All').map(cat => {
                                                        const catTasks = colTasks.filter(t => t.category === cat);
                                                        if (catTasks.length === 0) return null;
                                                        return <CategoryAccordionGroup key={cat} category={cat} tasks={catTasks} onEdit={setEditingTask} />;
                                                    })
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : filters.view === 'timeline' ? (
                            <TimelineView tasks={filteredTasks} categories={categories} onEdit={setEditingTask} />
                        ) : filters.view === 'swimlane' ? (
                            <div className="h-full overflow-y-auto custom-scrollbar pr-2 pb-10">
                                {(filters.category === 'All' ? categories.slice(1) : [filters.category]).map(catName => {
                                    const catTasks = filteredTasks.filter(t => t.category === catName);
                                    if (catTasks.length === 0) return null;
                                    return <CollapsibleSwimlane key={catName} catName={catName} columns={columns} catTasks={catTasks} draggedOverCol={draggedOverCol} onDragOver={(e, key) => { e.preventDefault(); setDraggedOverCol(key); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={handleDrop} onEdit={setEditingTask} />
                                })}
                            </div>
                        ) : (
                            <div className="h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                <div className="overflow-auto custom-scrollbar flex-1 relative">
                                    <table className="min-w-full divide-y divide-slate-200 text-left">
                                        <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-48">
                                                    <div className="flex items-center justify-between">
                                                        <span>板块分类</span>
                                                        <select 
                                                            className="ml-2 px-1.5 py-1 bg-white border border-slate-200 rounded text-[11px] normal-case tracking-normal text-slate-700 font-medium focus:outline-none focus:ring-1 focus:ring-indigo-500 cursor-pointer shadow-sm max-w-[85px] truncate"
                                                            value={filters.category}
                                                            onChange={(e) => setFilters(f => ({...f, category: e.target.value}))}
                                                        >
                                                            {categories.map(cat => <option key={cat} value={cat}>{cat === 'All' ? '全部板块' : cat}</option>)}
                                                        </select>
                                                    </div>
                                                </th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-1/4">事项标题</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">进展动态</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-36">状态</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-32">周期</th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-44">
                                                    <div className="flex items-center justify-between">
                                                        <span>参与人</span>
                                                        <select 
                                                            className="ml-2 px-1.5 py-1 bg-white border border-slate-200 rounded text-[11px] normal-case tracking-normal text-slate-700 font-medium focus:outline-none focus:ring-1 focus:ring-indigo-500 cursor-pointer shadow-sm max-w-[80px] truncate"
                                                            value={filters.assignee}
                                                            onChange={(e) => setFilters(f => ({...f, assignee: e.target.value}))}
                                                        >
                                                            {assignees.map(a => <option key={a} value={a}>{a === 'All' ? '全部人员' : a}</option>)}
                                                        </select>
                                                    </div>
                                                </th>
                                                <th className="px-6 py-3 text-[13px] font-semibold text-slate-500 uppercase tracking-wider w-48 text-right">最后修订时间</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {sortedFilteredTasks.map(task => {
                                                const config = COLUMN_CONFIG[task.status];
                                                const isP0 = task.priority === 'P0 - 极急';
                                                const isP1 = task.priority === 'P1 - 高优';
                                                
                                                return (
                                                    <tr key={task.id} onClick={() => setEditingTask(task)} className={`hover:bg-slate-50/80 transition-colors cursor-pointer group ${isP0 ? 'bg-red-50/30' : ''}`}>
                                                        <td className="px-6 py-4 whitespace-nowrap"><span className="bg-slate-100 text-slate-600 text-[13px] font-medium px-2 py-1 rounded-md">{task.category || '-'}</span></td>
                                                        <td className="px-6 py-4 text-[13px] text-slate-800 font-medium">
                                                            <div className="flex items-center gap-2 mb-1.5">
                                                                {isP0 && <span className="text-[11px] px-1 bg-red-100 text-red-600 rounded font-bold">极急</span>}
                                                                {isP1 && <span className="text-[11px] px-1 bg-orange-100 text-orange-600 rounded font-bold">高优</span>}
                                                                {task.isUrgent && <span className="text-[10px] px-1 bg-violet-100 text-violet-700 border border-violet-200 rounded font-bold">👀待过目</span>}
                                                                <span>{task.task}</span>
                                                            </div>
                                                            {task.detail && <div className="text-[11px] text-slate-400 line-clamp-1 font-normal">{task.detail}</div>}
                                                        </td>
                                                        <td className="px-6 py-4 text-[13px] text-slate-600"><div className="line-clamp-2 leading-relaxed">{task.progress || '-'}</div></td>
                                                        <td className="px-6 py-4 whitespace-nowrap">
                                                            <span className={`px-2.5 py-1 inline-flex text-[11px] font-semibold rounded-md border ${config ? config.headerBg + ' ' + config.text + ' border-transparent' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                                {config?.title.split(' ')[0] || task.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4 text-[11px] text-slate-500 whitespace-nowrap leading-relaxed">
                                                            {task.startDate || task.dueDate ? (
                                                                <>
                                                                    {task.startDate || '未定'} <br/> 
                                                                    <span className={!task.dueDate ? "text-indigo-500 font-bold" : ""}>至 {task.dueDate || '至今'}</span>
                                                                </>
                                                            ) : '-'}
                                                        </td>
                                                        <td className="px-6 py-4 whitespace-nowrap"><AvatarGroup name={task.assignee} /></td>
                                                        <td className="px-6 py-4 whitespace-nowrap text-right text-[12px] text-slate-500 font-mono tracking-tight">{formatDateTime(task.updatedAt)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 编辑/新建 任务弹窗 */}
                    {editingTask && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] modal-content border border-slate-200/50">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center">
                                        {editingTask.id ? '编辑任务' : '新建任务'}
                                        {saving && <span className="ml-3 text-[13px] text-indigo-500 font-normal flex items-center"><span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-ping mr-2"></span>同步中...</span>}
                                    </h2>
                                    <button type="button" onClick={() => setEditingTask(null)} className="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-full transition-colors" disabled={saving}><Icons.Alert style={{display:'none'}}/><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                                </div>
                                
                                <form id="task-form" onSubmit={handleSaveTask} className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div>
                                            <label className="block text-[14px] font-semibold text-slate-600 mb-2">板块分类</label>
                                            <input name="category" defaultValue={editingTask.category} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" placeholder="例如：顶层设计" disabled={saving} />
                                        </div>
                                        <div>
                                            <label className="block text-[14px] font-semibold text-slate-600 mb-2">紧急度 (优先级)</label>
                                            <select name="priority" defaultValue={editingTask.priority || 'P2 - 正常'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-bold focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors cursor-pointer" disabled={saving}>
                                                <option value="P0 - 极急" className="text-red-600">🚨 P0 - 极急 (最高优)</option>
                                                <option value="P1 - 高优" className="text-orange-600">🔥 P1 - 高优</option>
                                                <option value="P2 - 正常" className="text-slate-700">🔵 P2 - 正常</option>
                                                <option value="P3 - 暂缓" className="text-slate-400">🟢 P3 - 暂缓</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">事项标题 <span className="text-red-500">*</span></label><input required name="task" defaultValue={editingTask.task} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium text-slate-800 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                    
                                    <div className="grid grid-cols-2 gap-5">
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">开始日期</label><input type="date" name="startDate" defaultValue={editingTask.startDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">截止日期 <span className="text-[11px] font-normal text-slate-400 ml-1">(留空表示“至今”)</span></label><input type="date" name="dueDate" defaultValue={editingTask.dueDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                                    </div>

                                    {/* 纯链接模块 */}
                                    <div className="bg-slate-50/50 p-4 rounded-xl border border-slate-200/60">
                                        <label className="flex items-center text-[14px] font-semibold text-slate-700 mb-3"><Icons.Link /><span className="ml-1.5">相关链接 (文档/网盘/网页)</span></label>
                                        <input type="text" name="attachmentUrl" defaultValue={editingTask.attachmentUrl || ''} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-[13px] text-indigo-600 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400" placeholder="请在此粘贴以 http:// 或 https:// 开头的链接..." disabled={saving} />
                                    </div>

                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">最新进展</label><textarea name="progress" defaultValue={editingTask.progress} rows="3" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap leading-relaxed transition-colors" disabled={saving}></textarea></div>
                                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">内部说明备注</label><textarea name="detail" defaultValue={editingTask.detail} rows="2" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap transition-colors" disabled={saving}></textarea></div>

                                    <div className="grid grid-cols-2 gap-5 pb-2">
                                        <div>
                                            <label className="block text-[14px] font-semibold text-slate-600 mb-2">当前业务状态</label>
                                            <select name="status" defaultValue={editingTask.status || 'To Do'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}>
                                                <option value="To Do">待处理 (To Do)</option>
                                                <option value="In progress">进行中 (In progress)</option>
                                                <option value="Pending">等待/暂停 (Pending)</option>
                                                <option value="Done">已完成 (Done)</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">负责人</label><input name="assignee" defaultValue={editingTask.assignee} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" placeholder="如：Finn, Lydia" disabled={saving} /></div>
                                    </div>
                                    
                                    <div className="mt-2 p-3 bg-violet-50/50 border border-violet-200 rounded-xl">
                                        <label className="flex items-center cursor-pointer select-none">
                                            <input type="checkbox" name="isUrgent" defaultChecked={editingTask.isUrgent} className="w-4 h-4 text-violet-600 rounded border-violet-300 focus:ring-violet-500 cursor-pointer" disabled={saving} />
                                            <span className="ml-2 text-[14px] font-bold text-violet-700">👀 遇到卡点，需要老板批示/过目 <span className="text-xs font-normal text-violet-500 ml-1">(勾选后将显示在看板的专属首列中)</span></span>
                                        </label>
                                    </div>
                                </form>
                                
                                <div className="px-6 py-4 bg-slate-50/80 border-t border-slate-200 flex justify-between items-center">
                                    {editingTask.id ? <button type="button" onClick={handleDeleteTask} disabled={saving} className="text-slate-400 hover:text-red-500 text-[14px] font-medium transition-colors">删除任务</button> : <div></div>}
                                    <div className="flex space-x-3">
                                        <button type="button" onClick={() => setEditingTask(null)} disabled={saving} className="px-5 py-2.5 text-[14px] font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">取消</button>
                                        <button type="submit" form="task-form" disabled={saving} className={`px-6 py-2.5 text-[14px] font-bold text-white bg-indigo-600 hover:bg-indigo-700 hover:shadow-md hover:-translate-y-0.5 rounded-lg transition-all shadow-sm`}>
                                            {saving ? '保存中...' : '确认保存'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 导入弹窗 */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col border border-slate-200/50">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                    <h2 className="text-lg font-bold text-slate-800">批量导入数据</h2>
                                    <button onClick={() => setIsImportModalOpen(false)} className="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-full transition-colors" disabled={saving}><Icons.Alert style={{display:'none'}}/><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                                </div>
                                <div className="p-6">
                                    <div className="mb-4 bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-center justify-between">
                                        <div>
                                            <h3 className="text-[14px] font-bold text-indigo-800 mb-1">直接上传 CSV 文件</h3>
                                            <p className="text-[13px] text-indigo-600">系统已适配您表格的格式，支持自动解析合并单元格与多行文本。</p>
                                        </div>
                                        <label className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-bold rounded-lg cursor-pointer transition-colors shadow-sm whitespace-nowrap">
                                            选择文件
                                            <input type="file" accept=".csv" className="hidden" onChange={handleCsvUpload} disabled={saving} />
                                        </label>
                                    </div>
                                    
                                    <div className="flex items-center my-3">
                                        <div className="flex-1 border-t border-slate-200"></div>
                                        <span className="px-3 text-[13px] text-slate-400 font-medium">或者手动粘贴文本</span>
                                        <div className="flex-1 border-t border-slate-200"></div>
                                    </div>

                                    <textarea className="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl custom-scrollbar focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-[13px] transition-colors leading-relaxed" placeholder="在此粘贴数据..." value={importText} onChange={(e) => setImportText(e.target.value)} disabled={saving}></textarea>
                                </div>
                                <div className="px-6 py-4 bg-slate-50/80 border-t border-slate-100 flex justify-end space-x-3">
                                    <button onClick={() => setIsImportModalOpen(false)} className="px-5 py-2.5 text-[14px] font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm" disabled={saving}>取消</button>
                                    <button onClick={handleImportSubmit} className="px-6 py-2.5 text-[14px] font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-all shadow-sm" disabled={saving}>
                                        {saving ? '同步解析中...' : '解析并导入'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast 提示 */}
                    {toastMsg && (
                        <div className="fixed bottom-8 right-8 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 animate-bounce z-50">
                            <Icons.Check />
                            <span className="text-[13px] font-medium tracking-wide">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
