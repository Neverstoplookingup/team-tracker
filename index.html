  <style>
    * { box-sizing: border-box; }
    /* 彻底修复移动端滚动卡死问题：锁定视口，利用内部 Flex 容器实现原生丝滑滑动 */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; touch-action: pan-x pan-y; }
    #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }
    
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #f4f7fb 42%, #eef3f9 100%);
      color: #1e293b;
    }
    
    /* 优化全局与局部滚动条，开启 iOS 原生动量滚动 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .custom-scrollbar { 
        scrollbar-width: thin; 
        scrollbar-color: #94a3b8 transparent; 
        -webkit-overflow-scrolling: touch; 
    }
    
    .glass-header {
      background: rgba(255,255,255,.78);

      -webkit-backdrop-filter: blur(16px);

    .panel-glass {

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);

    .summary-card {

      border: 1px solid rgba(226,232,240,.92);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);

    .summary-card-btn {

      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      cursor: pointer;

    .summary-card-btn:hover {

      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);

    .task-card:hover {

      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.10);
      border-color: rgba(99, 102, 241, 0.18);
    }
    .task-card-urgent {

      border-color: rgba(251,113,133,.28);
    }
    .task-card-overdue {

      border-color: rgba(248,113,113,.30);
    }
    .board-main { position: relative; }
    .board-main::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.45) 1px, transparent 1px);
      background-size: 34px 34px;
      -webkit-mask-image: linear-gradient(180deg, rgba(255,255,255,.22), transparent 88%);
      mask-image: linear-gradient(180deg, rgba(255,255,255,.22), transparent 88%);

    .smooth-transition { transition: all .28s cubic-bezier(.4,0,.2,1); }
    .swimlane-content { transition: max-height .45s ease, opacity .35s ease; overflow: hidden; }
    .swimlane-open { max-height: 5000px; opacity: 1; }
    .swimlane-closed { max-height: 0; opacity: 0; }
    .overdue-pill { background: rgba(254,226,226,.92); color: #dc2626; border: 1px solid rgba(252,165,165,.55); }

    /* 弹窗动画 */

  function withTimeout(promise, ms, label) {
    let timer;
    const timeoutPromise = new Promise((_, reject) => {
      timer = setTimeout(() => reject(new Error(label || '操作超时')), ms);
    });
    return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timer));
  }

  function createScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      let settled = false;
      const timer = setTimeout(() => {
        if (settled) return;
        settled = true;
        reject(new Error('Script load timeout: ' + src));
      }, FIREBASE_INIT_TIMEOUT_MS);
      s.src = src;
      s.async = true;
      s.onload = () => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        resolve(src);
      };
      s.onerror = () => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        reject(new Error('Script load failed: ' + src));
      };
      document.head.appendChild(s);
    });
  }

  async function initFirebaseWithCompat() {
    await createScript(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-app-compat.js`);
    await createScript(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-auth-compat.js`);
    await createScript(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-firestore-compat.js`);

    if (!window.firebase) {
      throw new Error('Compat SDK loaded but window.firebase is missing');
    }

    if (!window.firebase.apps.length) {
      window.firebase.initializeApp(firebaseConfig);
    }

    const auth = window.firebase.auth();
    const db = window.firebase.firestore();

    window.FB = {
      auth,
      db,
      // 兼容版 SDK 的 doc/collection 也统一成模块版调用签名：
      // window.FB.collection(window.FB.db, 'a', 'b')
      doc: (dbInstance, ...segments) => dbInstance.doc(segments.join('/')),
      collection: (dbInstance, ...segments) => dbInstance.collection(segments.join('/')),
      setDoc: (ref, data) => ref.set(data),
      deleteDoc: (ref) => ref.delete(),
      updateDoc: (ref, data) => ref.update(data),
      onSnapshot: (ref, next, error) => ref.onSnapshot(next, error),
      signInAnonymously: (authInstance) => authInstance.signInAnonymously(),
      signInWithCustomToken: (authInstance, token) => authInstance.signInWithCustomToken(token),
      onAuthStateChanged: (authInstance, cb) => authInstance.onAuthStateChanged(cb)
    };

    window.__fbInitMode = 'compat';
    console.log('Firebase init success via compat SDK');
  }

  async function initFirebaseWithModule() {
    const [appMod, authMod, fsMod] = await withTimeout(Promise.all([
      import(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-auth.js`),
      import(`https://www.gstatic.com/firebasejs/${FB_SDK_VERSION}/firebase-firestore.js`)
    ]), FIREBASE_INIT_TIMEOUT_MS, 'Firebase module SDK 加载超时');

    const { initializeApp } = appMod;
    const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = authMod;
    const { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } = fsMod;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = {
      auth,
      db,
      doc,
      collection,
      setDoc,
      deleteDoc,
      updateDoc,
      onSnapshot,
      signInAnonymously,
      signInWithCustomToken,
      onAuthStateChanged
    };

    window.__fbInitMode = 'module';
    console.log('Firebase init success via module SDK');
  }

  (async () => {
    window.__fbInitStartedAt = Date.now();
    try {
      // 手机端浏览器对动态 import 的 Firebase module SDK 更容易出现“挂起不报错”。
      // 因此优先使用兼容版脚本加载，失败后再尝试 module 方案。
      await withTimeout(initFirebaseWithCompat(), FIREBASE_INIT_TIMEOUT_MS * 2, 'Firebase compat 初始化超时');
    } catch (compatError) {
      console.warn('Compat SDK failed, trying module fallback...', compatError);
      try {
        await withTimeout(initFirebaseWithModule(), FIREBASE_INIT_TIMEOUT_MS, 'Firebase module 初始化超时');
      } catch (moduleError) {
        window.__fbInitError = moduleError;
        window.FB = null;
        console.error('Firebase compat + module init both failed:', {
          compatError,
          moduleError
        });
      }
    } finally {
      dispatchFirebaseLoaded();
    }
  })();
</script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icons = {

      Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Alert: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v3m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 17c-.77 1.333.192 3 1.732 3z" /></svg>,
      Search: () => <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      Link: () => <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
      Edit: () => <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
      Download: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M7 10l5 5m0 0l5-5m-5 5V4" /></svg>,
      EmptyBox: () => <svg className="w-12 h-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
    };

    const COLUMN_CONFIG = {
      'Need Attention': { title: '需过目', borderColor: 'border-rose-400', headerBg: 'bg-rose-50', text: 'text-rose-600', icon: <Icons.Eye />, barColor: 'bg-rose-500' },
      'To Do': { title: '待处理', borderColor: 'border-slate-300', headerBg: 'bg-slate-100', text: 'text-slate-600', icon: <Icons.File />, barColor: 'bg-slate-400' },
      'In progress': { title: '进行中', borderColor: 'border-indigo-400', headerBg: 'bg-indigo-50', text: 'text-indigo-600', icon: <Icons.Play />, barColor: 'bg-indigo-500' },
      'Pending': { title: '等待/暂停', borderColor: 'border-amber-400', headerBg: 'bg-amber-50', text: 'text-amber-600', icon: <Icons.Pause />, barColor: 'bg-amber-400' },
      'Overdue': { title: '已逾期', borderColor: 'border-red-400', headerBg: 'bg-red-50', text: 'text-red-600', icon: <Icons.Alert />, barColor: 'bg-red-500' },
      'Done': { title: '已完成', borderColor: 'border-emerald-400', headerBg: 'bg-emerald-50', text: 'text-emerald-600', icon: <Icons.Check />, barColor: 'bg-emerald-500' }
    };

    const PRIORITY_WEIGHTS = { 'P0 - 紧急': 3, 'P1 - 优先': 2, 'P2 - 正常': 1, 'P3 - 暂缓': 0 };
    const EDITABLE_STATUS_OPTIONS = ['To Do', 'In progress', 'Pending', 'Done'];
    const KANBAN_COMPACT_STATUSES = ['Need Attention', 'To Do', 'Pending', 'Overdue'];
    const SWIMLANE_STATUSES = ['Need Attention', 'In progress', 'Pending', 'Overdue'];

    const FIREBASE_CLIENT_TIMEOUT_MS = 10000;

    const clientTimeout = (promise, ms, label) => {
      let timer;
      const timeoutPromise = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(label || '操作超时')), ms);
      });
      return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timer));
    };

    // 不再使用本地数据兜底，确保手机端和电脑端进入的是同一个 Firestore 云端看板。
    // 云端连接慢时，先打开工作台界面并显示连接状态；云端快照返回后自动填充真实数据。
    const DEFAULT_TASKS = [];

    const generateId = () => `task-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    const getCreatedAt = (task) => task?.createdAt || task?.updatedAt || Date.now();
    const parseDateOnly = (dateStr) => {
      if (!dateStr) return null;
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      return Number.isNaN(d.getTime()) ? null : d;
    };
    const formatDateTime = (timestamp) => {
      if (!timestamp) return '-';
      const d = new Date(Number(timestamp));
      if (Number.isNaN(d.getTime())) return String(timestamp);
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const date = String(d.getDate()).padStart(2, '0');
      const year = d.getFullYear();
      const hours = String(d.getHours()).padStart(2, '0');
      const minutes = String(d.getMinutes()).padStart(2, '0');
      return `${month}/${date}/${year}, ${hours}:${minutes}`;
    };
    const formatDateRange = (startDate, dueDate) => `${startDate ? startDate.substring(5).replace('-', '.') : '未定'} 至 ${dueDate ? dueDate.substring(5).replace('-', '.') : '至今'}`;
    const getInitials = (name) => {
      if (!name || typeof name !== 'string' || !name.trim()) return '?';
      const first = name.split(/[,&、]/)[0].trim();
      return /^[a-zA-Z]/.test(first) ? first.substring(0, 2).toUpperCase() : first.substring(0, 1);
    };
    const stringToColor = (str = '') => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 65%, 78%)`;
    };
    // 用固定业务时区判断逾期，避免电脑/手机因系统时区不同导致看板数据位置不一致。
    const BUSINESS_TIME_ZONE = 'America/Los_Angeles';
    const getTodayKey = () => new Intl.DateTimeFormat('en-CA', {
      timeZone: BUSINESS_TIME_ZONE,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).format(new Date());

    const isOverdue = (task) => {
      if (!task?.dueDate || task?.status === 'Done') return false;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(task.dueDate)) {
        const due = parseDateOnly(task.dueDate);
        if (!due) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return due < today;
      }
      return task.dueDate < getTodayKey();
    };
    const getBoardColumnKey = (task) => {
      if (!task) return 'To Do';
      if (task.status === 'Done') return 'Done';
      if (isOverdue(task)) return 'Overdue';
      if (task.isUrgent) return 'Need Attention';
      return task.status || 'To Do';
    };
    const normalizeCategory = (value) => {
      if (!value || typeof value !== 'string' || !value.trim()) return '未分类';
      return value.trim();
    };
    
    // 安全获取状态名称，防止因脏数据导致的崩溃
    const getStatusTitle = (statusKey) => COLUMN_CONFIG[statusKey]?.title || statusKey || '未知状态';
    
    const sortTasks = (tasksList) => [...tasksList].sort((a, b) => {
      const wa = PRIORITY_WEIGHTS[a.priority] ?? 1;
      const wb = PRIORITY_WEIGHTS[b.priority] ?? 1;
      if (wa !== wb) return wb - wa;
      return getCreatedAt(b) - getCreatedAt(a);
    });

    const buildExportRows = (tasksList) => sortTasks(tasksList).map(task => ({
      '板块分类': task.category || '未分类',
      '事项标题': task.task || '未命名事项',
      '最新进展': task.progress || '',
      '内部说明备注': task.detail || '',
      '看板状态': getStatusTitle(getBoardColumnKey(task)),
      '当前业务状态': task.status || 'To Do',
      '优先级': task.priority || 'P2 - 正常',
      '需过目': task.isUrgent ? '是' : '否',
      '参与人': task.assignee || '未分配',
      '开始日期': task.startDate || '',
      '截止日期': task.dueDate || '',
      '相关链接': task.attachmentUrl || '',
      '创建时间': formatDateTime(task.createdAt),
      '最后修订时间': formatDateTime(task.updatedAt)
    }));

    const downloadBlob = (blob, filename) => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    const exportTasksToExcel = (tasksList) => {
      const rows = buildExportRows(tasksList);
      if (!rows.length) {
        alert('当前列表没有可导出的内容。');
        return;
      }

      const now = new Date();
      const stamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
      const filenameBase = `团队协作工作台_列表清单_${stamp}`;

      if (window.XLSX) {
        const worksheet = window.XLSX.utils.json_to_sheet(rows);
        const workbook = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(workbook, worksheet, '工作进度');
        const range = window.XLSX.utils.decode_range(worksheet['!ref']);
        const columnWidths = [];
        for (let c = range.s.c; c <= range.e.c; c++) {
          let maxLen = 10;
          for (let r = range.s.r; r <= range.e.r; r++) {
            const cell = worksheet[window.XLSX.utils.encode_cell({ r, c })];
            const value = cell ? String(cell.v ?? '') : '';
            maxLen = Math.max(maxLen, Math.min(value.length + 2, 40));
          }
          columnWidths.push({ wch: maxLen });
        }
        worksheet['!cols'] = columnWidths;
        window.XLSX.writeFile(workbook, `${filenameBase}.xlsx`);
        return;
      }

      const headers = Object.keys(rows[0]);
      const csv = [headers.join(','), ...rows.map(row => headers.map(key => `"${String(row[key] ?? '').replace(/"/g, '""')}"`).join(','))].join('\n');
      downloadBlob(new Blob([`﻿${csv}`], { type: 'text/csv;charset=utf-8;' }), `${filenameBase}.csv`);
      alert('Excel 组件未加载成功，已改为导出 CSV，Excel 也可以直接打开。');
    };

    const AvatarGroup = ({ name }) => {
      const names = (name && typeof name === 'string') ? name.split(/[,&、]/).map(n => n.trim()).filter(Boolean) : [];
      if (names.length === 0) return <span className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded-sm">未分配</span>;
      return (
        <div className="flex items-center">
          <div className="flex -space-x-1.5">
            {names.slice(0, 3).map((n, i) => (
              <div key={i} className="w-5 h-5 rounded-full ring-2 ring-white flex items-center justify-center text-[9px] font-bold text-slate-700 shadow-sm" style={{ backgroundColor: stringToColor(n) }} title={n}>
                {getInitials(n)}
              </div>
            ))}
            {names.length > 3 && <div className="w-5 h-5 rounded-full ring-2 ring-white bg-slate-200 flex items-center justify-center text-[9px] font-bold text-slate-600 shadow-sm">+{names.length - 3}</div>}
          </div>
          {names.length === 1 && <span className="text-[10px] text-slate-500 ml-1.5 truncate max-w-[80px] font-medium">{names[0]}</span>}
        </div>
      );
    };

    const TaskCard = ({ task, onEdit }) => {
      const boardKey = getBoardColumnKey(task);
      const config = COLUMN_CONFIG[boardKey] || COLUMN_CONFIG['To Do'];
      const overdue = boardKey === 'Overdue';
      const handleDragStart = (e) => {
        e.dataTransfer.setData('taskId', task.id);
        setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
      };
      const handleDragEnd = (e) => e.currentTarget.classList.remove('dragging');
      return (
        <article
          draggable="true"
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          onClick={() => onEdit(task)}
          className={`task-card rounded-2xl p-3 flex flex-col min-h-[96px] cursor-grab active:cursor-grabbing group ${task.isUrgent ? 'task-card-urgent' : ''} ${overdue ? 'task-card-overdue' : ''}`}
        >
          <div className="flex items-start justify-between gap-2 mb-2">
            <div className="flex flex-wrap gap-1.5">
              {task.isUrgent && <span className="px-1.5 py-0.5 bg-rose-100 text-rose-700 border border-rose-200 text-[10px] font-bold rounded-md">需过目</span>}
              {(task.priority === 'P0 - 紧急' || task.priority === 'P1 - 优先') && (
                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-md shadow-sm ${task.priority === 'P0 - 紧急' ? 'text-red-600 bg-red-50 border border-red-100' : 'text-orange-600 bg-orange-50 border border-orange-100'}`}>
                  {task.priority === 'P0 - 紧急' ? 'P0 紧急' : 'P1 优先'}
                </span>
              )}
              <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${overdue ? 'overdue-pill' : 'healthy-pill'}`}>
                {config.title}
              </span>
            </div>
            <span className="opacity-0 group-hover:opacity-100 smooth-transition text-indigo-500 bg-indigo-50 p-1 rounded"><Icons.Edit /></span>
          </div>

          <h4 className="font-semibold text-slate-800 text-[13px] leading-5 line-clamp-2 group-hover:text-indigo-600 transition-colors">
            {task.task || '未命名事项'}
          </h4>

          {task.progress && <p className="text-[12px] text-slate-500 line-clamp-1 leading-5 mt-1.5">{task.progress}</p>}

          <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100/80 gap-2">
            <div className="flex items-center gap-2 min-w-0">
              <AvatarGroup name={task.assignee} />
              {task.attachmentUrl && <span className="text-[10px] text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded-md shrink-0">链接</span>}
            </div>
            <div className="flex items-center gap-1.5 flex-wrap justify-end shrink-0">
              {(task.startDate || task.dueDate) && (
                <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${overdue ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'}`}>
                  {formatDateRange(task.startDate, task.dueDate)}
                </span>
              )}
            </div>
          </div>
        </article>
      );
    };

    const CategoryAccordionGroup = ({ category, tasks, onEdit, defaultExpanded = false, previewCount = 2 }) => {
      const [isExpanded, setIsExpanded] = useState(defaultExpanded);
      const sortedTasks = sortTasks(tasks);
      const urgentCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'Need Attention').length;
      const overdueCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'Overdue').length;
      const inProgressCount = sortedTasks.filter(t => getBoardColumnKey(t) === 'In progress').length;
      const visibleTasks = isExpanded ? sortedTasks : sortedTasks.slice(0, previewCount);
      return (
        <div className="category-mobile-compact mb-3 bg-white/60 rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
          <button onClick={() => setIsExpanded(!isExpanded)} className="w-full flex items-center justify-between px-3 py-3 hover:bg-white transition-colors border-b border-slate-100/50 text-left">
            <div className="min-w-0 pr-3">
              <div className="text-xs font-bold text-slate-700 flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>{category}</div>
              <div className="flex flex-wrap gap-1.5 mt-2">
                <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">{sortedTasks.length} 项</span>
                {inProgressCount > 0 && <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-semibold">推进中 {inProgressCount}</span>}
                {urgentCount > 0 && <span className="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded font-semibold">需过目 {urgentCount}</span>}
                {overdueCount > 0 && <span className="text-[10px] bg-red-50 text-red-600 px-2 py-0.5 rounded font-semibold">逾期 {overdueCount}</span>}
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              {!isExpanded && sortedTasks.length > previewCount && <span className="text-[11px] text-slate-400">先显示 {previewCount} 项</span>}
              <span className="text-[11px] font-semibold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">{isExpanded ? '收起' : '展开'}</span>
            </div>
          </button>
          <div className="p-2.5 space-y-2 bg-slate-50/20">
            {visibleTasks.map(task => <TaskCard key={task.id} task={task} onEdit={onEdit} />)}
            {!isExpanded && sortedTasks.length > previewCount && (
              <button onClick={() => setIsExpanded(true)} className="w-full rounded-xl border border-dashed border-slate-200 bg-white/70 hover:bg-white px-3 py-2 text-xs font-semibold text-slate-500 hover:text-indigo-600 transition-colors">
                还有 {sortedTasks.length - previewCount} 项，点击展开查看

    const TimelineView = ({ tasks, categories, onEdit }) => {

        let s = parseDateOnly(t.startDate);
        let e = parseDateOnly(t.dueDate);
        if (!s && !e) { s = new Date(today); e = new Date(today); }
        else if (s && !e) e = new Date(today);
        else if (!s && e) s = new Date(e);
        if (e < s) e = new Date(s);
        return { ...t, _start: s, _end: e };
      }), [tasks, today]);

      const { minDate, monthsArray, totalDays } = useMemo(() => {
        let minT = Math.min(...enrichedTasks.map(t => t._start.getTime()));
        let maxT = Math.max(...enrichedTasks.map(t => t._end.getTime()));
        if (!Number.isFinite(minT)) minT = today.getTime();
        if (!Number.isFinite(maxT)) maxT = today.getTime();
        let minD = new Date(minT);
        let maxD = new Date(maxT);
        minD = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
        maxD = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 0);
        const mArray = [];
        let curr = new Date(minD);
        while (curr <= maxD) {
          const y = curr.getFullYear();
          const m = curr.getMonth();
          const days = new Date(y, m + 1, 0).getDate();
          mArray.push({ year: y, month: m, daysInMonth: days });
          curr.setMonth(m + 1);
        }
        return { minDate: minD, monthsArray: mArray, totalDays: mArray.reduce((acc, val) => acc + val.daysInMonth, 0) };

                {todayOffset >= 0 && todayOffset <= totalDays && <div className="absolute top-0 bottom-0 w-[2px] bg-red-400/70 z-0 pointer-events-none" style={{ left: leftColWidth + todayOffset * DAY_WIDTH }}></div>}
                {categories.filter(c => c !== 'All').map(catName => {

                  return (

                      {catTasks.map(task => {
                        const offsetDays = (task._start.getTime() - minDate.getTime()) / 86400000;

    function App() {
      const [tasks, setTasks] = useState(() => DEFAULT_TASKS);
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [loading, setLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [syncMode, setSyncMode] = useState('connecting');
      const [connectionNotice, setConnectionNotice] = useState('正在连接云端数据...');
      const [draggedOverCol, setDraggedOverCol] = useState(null);
      const [editingTask, setEditingTask] = useState(null);
      const [filters, setFilters] = useState({ view: 'kanban', search: '', category: 'All', assignee: 'All', status: 'All' });

      const deployAppId = typeof __app_id !== 'undefined' ? __app_id : 'github-deploy';
      const getTasksCollectionRef = () => window.FB?.db ? window.FB.collection(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks') : null;
      const getDocRef = (taskId) => window.FB?.db ? window.FB.doc(window.FB.db, 'artifacts', deployAppId, 'public', 'data', 'kanban_tasks', taskId) : null;

      useEffect(() => {
        let isMounted = true;
        let authUnsub = null;
        let fbWaitTimer = null;

        const openWorkspaceWithCloudIssue = (message) => {
          if (!isMounted) return;
          setSyncMode('error');
          setConnectionNotice(message);
          setErrorMsg(message);
          setLoading(false);
        };

        const initAuthAndListen = async () => {
          if (!window.FB?.auth) {
            const initError = window.__fbInitError;
            openWorkspaceWithCloudIssue(initError?.message || 'Firebase 初始化失败或超时。工作台界面已打开，但云端数据暂未连接；请检查手机网络、浏览器隐私拦截或刷新重试。');
            return;
          }

          setSyncMode('connecting');
          setConnectionNotice('正在连接云端数据...');

          if (!authUnsub) {
            authUnsub = window.FB.onAuthStateChanged(window.FB.auth, (u) => {
              if (!isMounted) return;
              setUser(u || null);
              if (u) setAuthReady(true);
              console.log('onAuthStateChanged =>', u ? { uid: u.uid, isAnonymous: u.isAnonymous } : null);
            });
          }

          try {
            if (!window.FB.auth.currentUser) {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await clientTimeout(window.FB.signInWithCustomToken(window.FB.auth, __initial_auth_token), FIREBASE_CLIENT_TIMEOUT_MS, 'Firebase 自定义登录超时');
              } else {
                await clientTimeout(window.FB.signInAnonymously(window.FB.auth), FIREBASE_CLIENT_TIMEOUT_MS, 'Firebase 匿名登录超时');
              }
            } else if (isMounted) {
              setAuthReady(true);
            }

            // 移动端部分浏览器里 onAuthStateChanged 回调可能比 signIn promise 更晚触发。
            // 签名成功后主动推进 authReady，避免继续等待导致看板不读云端数据。
            if (isMounted && window.FB.auth.currentUser) {
              setUser(window.FB.auth.currentUser);
              setAuthReady(true);
            }
          } catch (e) {
            console.error('Firebase Auth failed:', e);
            openWorkspaceWithCloudIssue((e?.message || 'Firebase 认证失败') + '。工作台界面已打开，但暂时不能读写云端数据；请刷新或检查 Firebase 认证设置。');
          }
        };

        const handleFbLoaded = () => {
          if (fbWaitTimer) clearTimeout(fbWaitTimer);
          initAuthAndListen();
        };

        fbWaitTimer = setTimeout(() => {
          if (!isMounted || window.FB?.auth) return;
          openWorkspaceWithCloudIssue('手机端等待 Firebase SDK 加载超时。工作台界面已打开，并会继续等待云端连接；请检查移动网络、浏览器隐私拦截或刷新重试。');
        }, FIREBASE_CLIENT_TIMEOUT_MS + 2000);

        if (typeof window.FB !== 'undefined') {
          handleFbLoaded();
        } else {
          window.addEventListener('firebase-loaded', handleFbLoaded);
        }

        return () => {
          isMounted = false;
          if (fbWaitTimer) clearTimeout(fbWaitTimer);
          if (authUnsub) authUnsub();
          window.removeEventListener('firebase-loaded', handleFbLoaded);
        };
      }, []);

      useEffect(() => {
        if (!authReady) return;

        if (!window.FB?.db || !window.FB?.auth?.currentUser) {
          setSyncMode('connecting');
          setConnectionNotice('云端认证尚未完成。工作台已打开，但数据需要云端连接成功后才会显示。');
          setLoading(false);
          return;
        }

        let unsub = null;
        let snapshotTimer = null;
        try {
          const colRef = getTasksCollectionRef();
          if (!colRef) throw new Error('无法创建 Firestore 数据路径。');

          console.log('Firebase init mode =', window.__fbInitMode);
          console.log('Tasks collection path =', colRef.path || colRef._path?.canonicalString?.() || colRef.toString?.());

          snapshotTimer = setTimeout(() => {
            setSyncMode('connecting');
            setConnectionNotice('已进入工作台，正在等待云端数据返回；云端快照返回后会自动显示团队数据。');
            setLoading(false);
          }, FIREBASE_CLIENT_TIMEOUT_MS + 3000);

          unsub = window.FB.onSnapshot(colRef, (snapshot) => {
            if (snapshotTimer) clearTimeout(snapshotTimer);
            const fetchedTasks = [];
            snapshot.forEach(docSnap => {
              const data = docSnap.data() || {};
              fetchedTasks.push({ id: docSnap.id, ...data });
            });
            console.log('Firebase snapshot size =', snapshot.size);
            setTasks(fetchedTasks);
            setSyncMode('cloud');
            setConnectionNotice('');
            setErrorMsg('');
            setLoading(false);
          }, (err) => {
            if (snapshotTimer) clearTimeout(snapshotTimer);
            console.error('Firebase 数据同步失败:', err);
            setSyncMode('error');
            setConnectionNotice((err?.message || '数据读取失败，请检查 Firebase 权限配置。') + ' 工作台已打开，但当前不能读取云端数据。');
            setErrorMsg('');
            setLoading(false);
          });
        } catch (err) {
          if (snapshotTimer) clearTimeout(snapshotTimer);
          console.error('Firestore 初始化失败:', err);
          setSyncMode('error');
          setConnectionNotice((err?.message || 'Firestore 初始化失败，请检查浏览器兼容性或 Firebase 配置。') + ' 工作台已打开，但当前不能读取云端数据。');
          setErrorMsg('');
          setLoading(false);
        }

        return () => {
          if (snapshotTimer) clearTimeout(snapshotTimer);
          if (unsub) unsub();
        };
      }, [authReady, deployAppId]);

      const categories = useMemo(() => ['All', ...new Set(tasks.map(t => t.category).filter(Boolean).sort())], [tasks]);
      const assignees = useMemo(() => ['All', ...new Set(tasks.flatMap(t => t.assignee ? t.assignee.split(/[,&、]/).map(a => a.trim()).filter(Boolean) : []))], [tasks]);
      const statusOptions = ['All', 'Need Attention', 'In progress', 'To Do', 'Pending', 'Overdue', 'Done'];

      const scopedTasks = useMemo(() => {
        return [...tasks].filter(t => {
          const matchSearch = `${t.task || ''} ${t.detail || ''} ${t.progress || ''} ${t.assignee || ''}`.toLowerCase().includes(filters.search.toLowerCase());
          const matchCat = filters.category === 'All' || t.category === filters.category;
          const matchAssignee = filters.assignee === 'All' || (t.assignee && t.assignee.includes(filters.assignee));
          return matchSearch && matchCat && matchAssignee;
        });
      }, [tasks, filters.search, filters.category, filters.assignee]);

      const filteredTasks = useMemo(() => {
        return scopedTasks.filter(t => filters.status === 'All' || getBoardColumnKey(t) === filters.status);

      const summary = useMemo(() => {

          progress: String(formData.get('progress') || '').trim(),
          status: String(formData.get('status') || 'To Do'),
          priority: String(formData.get('priority') || 'P2 - 正常'),
          isUrgent: formData.get('isUrgent') === 'on',
          assignee: String(formData.get('assignee') || '').trim(),
          startDate: String(formData.get('startDate') || '').trim(),
          dueDate: String(formData.get('dueDate') || '').trim(),
          attachmentUrl: String(formData.get('attachmentUrl') || '').trim(),
          updatedAt: Date.now(),
          createdAt: editingTask?.createdAt || Date.now()
        };
        if (!taskData.task) return;
        setSaving(true);
        const prevTasks = tasks;
        const nextTasks = editingTask?.id ? tasks.map(t => t.id === taskId ? taskData : t) : [taskData, ...tasks];
        setTasks(nextTasks);
        try {
          const docRef = getDocRef(taskId);
          if (window.FB?.setDoc && window.FB?.db && docRef && window.FB?.auth?.currentUser) {
            await window.FB.setDoc(docRef, taskData);
          } else {
            throw new Error('云端尚未连接成功，暂时无法保存。请等待“云端同步”状态出现后再操作，或刷新页面。');
          }
          setEditingTask(null);
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert(err?.message || '保存失败，请重试');
        } finally {
          setSaving(false);
        }
      };

      const handleDeleteTask = async () => {
        if (!editingTask?.id) return;
        const prevTasks = tasks;
        setSaving(true);
        setTasks(tasks.filter(t => t.id !== editingTask.id));
        try {
          const docRef = getDocRef(editingTask.id);
          if (window.FB?.deleteDoc && window.FB?.db && docRef && window.FB?.auth?.currentUser) {
            await window.FB.deleteDoc(docRef);
          } else {
            throw new Error('云端尚未连接成功，暂时无法删除。请等待“云端同步”状态出现后再操作，或刷新页面。');
          }
          setEditingTask(null);
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert(err?.message || '删除失败，请重试');
        } finally {
          setSaving(false);
        }
      };

      const handleDrop = async (e, targetStatus, newCategory = null) => {
        e.preventDefault();
        setDraggedOverCol(null);
        if (targetStatus === 'Overdue') return;
        const taskId = e.dataTransfer.getData('taskId');
        if (!taskId) return;
        const targetTask = tasks.find(t => t.id === taskId);
        if (!targetTask) return;
        
        // 拖入“需过目”列：仅仅打上 isUrgent 标记，不破坏其原有的底层 status
        let newStatus = targetTask.status;
        let newIsUrgent = targetTask.isUrgent;
        
        if (targetStatus === 'Need Attention') {
            newIsUrgent = true;
        } else {
            newStatus = targetStatus;
            newIsUrgent = false;
        }

        const updatedFields = {
          status: newStatus,
          isUrgent: newIsUrgent,
          updatedAt: Date.now(),
          ...(newCategory ? { category: newCategory } : {})
        };
        const prevTasks = tasks;
        const nextTasks = tasks.map(t => t.id === taskId ? { ...t, ...updatedFields } : t);
        setTasks(nextTasks);
        try {
          const docRef = getDocRef(taskId);
          if (window.FB?.updateDoc && window.FB?.db && docRef && window.FB?.auth?.currentUser) {
            await window.FB.updateDoc(docRef, updatedFields);
          } else {
            throw new Error('云端尚未连接成功，暂时无法更新。请等待“云端同步”状态出现后再操作，或刷新页面。');
          }
        } catch (err) {
          console.error(err);
          setTasks(prevTasks);
          alert(err?.message || '拖拽更新失败，请重试');
        }
      };

      const viewOptions = [
        { id: 'kanban', label: '看板' },
        { id: 'swimlane', label: '板块概览' },
        { id: 'timeline', label: '进度条' },
        { id: 'table', label: '清单' }
      ];

      const summaryCards = [
        { label: '总任务', value: summary.total, status: 'All', accent: 'text-slate-900' },
        { label: '需过目', value: summary.needAttention, status: 'Need Attention', accent: 'text-rose-600' },
        { label: '推进中', value: summary.inProgress, status: 'In progress', accent: 'text-indigo-600' },
        { label: '已完成', value: summary.done, status: 'Done', accent: 'text-emerald-600' },
        { label: '已逾期', value: summary.overdue, status: 'Overdue', accent: 'text-red-600' }
      ];

      const syncLabel = syncMode === 'cloud' ? '云端同步' : (syncMode === 'error' ? '云端异常' : '连接云端');
      const syncLabelClass = syncMode === 'cloud' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : (syncMode === 'error' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-slate-100 text-slate-500 border-slate-200');

      const renderColumnSection = (status, compact = false, taskSource = null) => {
        const config = COLUMN_CONFIG[status];
        const columnTasks = taskSource || filteredTasks.filter(task => getBoardColumnKey(task) === status);
        const groupCategories = [...new Set(columnTasks.map(t => t.category || '未分类'))].sort();
        const isDragOver = draggedOverCol === status;
        const dropDisabled = status === 'Overdue';
        return (
          <section
            key={status}
            onDragOver={dropDisabled ? undefined : (e) => { e.preventDefault(); setDraggedOverCol(status); }}
            onDragLeave={dropDisabled ? undefined : () => setDraggedOverCol(null)}
            onDrop={dropDisabled ? undefined : (e) => handleDrop(e, status)}
            className={`kanban-column-shell rounded-3xl border ${config.borderColor} p-3.5 flex flex-col flex-1 min-h-0 ${isDragOver ? 'drag-over' : ''}`}
          >
            <div className={`rounded-2xl ${config.headerBg} px-4 py-3 flex items-center justify-between mb-4 shrink-0`}>
              <div className={`flex items-center gap-2 font-bold ${config.text}`}>
                {config.icon}
                <span>{config.title}</span>
              </div>
              <span className="text-sm font-semibold text-slate-500">{columnTasks.length}</span>
            </div>
            {status === 'Overdue' && (
              <div className="text-[11px] text-red-500 bg-red-50 border border-red-100 rounded-xl px-3 py-2 mb-3 shrink-0">
                到期未完成的项目会自动显示在这里；确认完成后再手动调整为“已完成”。
              </div>
            )}
            <div className="space-y-3 custom-scrollbar overflow-y-auto overflow-x-hidden pr-1 flex-1 min-h-0">
              {columnTasks.length === 0 ? (
                <div className="h-40 rounded-2xl border border-dashed border-slate-200 bg-white/70 flex flex-col items-center justify-center text-center px-4">
                  <Icons.EmptyBox />
                  <p className="text-sm font-medium text-slate-500">当前列暂无任务</p>
                  <p className="text-xs text-slate-400 mt-1">{dropDisabled ? '根据截止日期自动出现。' : '可把卡片拖到这里。'}</p>
                </div>
              ) : groupCategories.map(cat => (
                <CategoryAccordionGroup key={`${status}-${cat}`} category={cat} tasks={columnTasks.filter(t => (t.category || '未分类') === cat)} onEdit={setEditingTask} previewCount={status === 'Overdue' ? 1 : 2} />
              ))}
            </div>
          </section>
        );
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-6 text-center">
            <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <h2 className="text-slate-500 font-medium text-sm">正在启动工作台...</h2>
            <p className="text-xs text-slate-400 mt-2 max-w-xs leading-5">正在连接同一个云端看板；若网络较慢，也会先打开界面，不再无限停留在加载页。</p>
          </div>
        );
      }

      return (
        <div className="app-shell flex flex-col w-full overflow-hidden bg-transparent">
          <header className="glass-header mobile-compact-header border-b border-white/60 shrink-0 z-40 overflow-hidden">
            <div className="mobile-header-inner w-full max-w-[1700px] mx-auto px-4 md:px-5 py-3 space-y-3">
              <div className="mobile-top-row flex flex-col 2xl:flex-row 2xl:items-center 2xl:justify-between gap-4">
                <div className="min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <h1 className="mobile-title text-xl md:text-2xl font-bold text-slate-900">团队协作工作台</h1>
                    <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full border ${syncLabelClass}`}>{syncLabel}</span>
                  </div>
                  {connectionNotice && <div className="sync-banner mt-2 rounded-xl px-3 py-2 text-[11px] leading-5 max-w-3xl">{connectionNotice}</div>}
                </div>
                <div className="mobile-top-actions flex flex-wrap gap-3 items-center">
                  <div className="mobile-view-tabs flex flex-wrap bg-slate-100/90 rounded-2xl p-1.5 border border-slate-200/60 shadow-inner">
                    {viewOptions.map(v => (
                      <button key={v.id} onClick={() => setFilters(f => ({ ...f, view: v.id }))} className={`px-3.5 py-1.5 text-[12px] font-medium rounded-xl transition-all ${filters.view === v.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                        {v.label}
                      </button>
                    ))}
                  </div>
                  <button onClick={openNewTask} className="mobile-add-button px-3.5 py-2 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-bold shadow-sm">+ 新增事项</button>
                </div>
              </div>

              <div className="mobile-summary-strip grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3">
                {summaryCards.map(card => {
                  const active = filters.status === card.status;
                  return (
                    <button
                      key={card.label}
                      onClick={() => setFilters(f => ({ ...f, status: active ? 'All' : card.status }))}
                      className={`summary-card summary-card-btn rounded-2xl p-3 ${active ? 'active' : ''}`}
                    >
                      <div className="flex items-center justify-between gap-2">
                        <div className="summary-label text-xs text-slate-500">{card.label}</div>
                        <span className="click-hint text-[10px] text-slate-400">点击筛选</span>
                      </div>
                      <div className={`summary-value text-2xl font-bold mt-1.5 ${card.accent}`}>{card.value}</div>
                    </button>
                  );
                })}
              </div>

              <div className="mobile-filter-bar flex overflow-x-auto custom-scrollbar gap-3 items-center pb-2">
                <div className="mobile-search-box panel-glass rounded-2xl px-3.5 py-2.5 flex items-center gap-3 flex-shrink-0 min-w-[240px]">
                  <Icons.Search />
                  <input value={filters.search} onChange={(e) => setFilters(f => ({ ...f, search: e.target.value }))} placeholder="搜索事项、负责人、进展..." className="w-full bg-transparent outline-none text-sm" />
                </div>
                <div className="mobile-select-box panel-glass rounded-2xl px-3.5 py-2.5 flex-shrink-0 w-[160px]">
                  <select value={filters.category} onChange={(e) => setFilters(f => ({ ...f, category: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700">
                    <option value="All">全部板块</option>
                    {categories.filter(c => c !== 'All').map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div className="mobile-select-box panel-glass rounded-2xl px-3.5 py-2.5 flex-shrink-0 w-[160px]">
                  <select value={filters.assignee} onChange={(e) => setFilters(f => ({ ...f, assignee: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700">
                    <option value="All">全部负责人</option>
                    {assignees.filter(a => a !== 'All').map(a => <option key={a} value={a}>{a}</option>)}
                  </select>
                </div>
                <div className="mobile-select-box panel-glass rounded-2xl px-3.5 py-2.5 flex-shrink-0 w-[160px]">
                  <select value={filters.status} onChange={(e) => setFilters(f => ({ ...f, status: e.target.value }))} className="w-full bg-transparent outline-none text-sm text-slate-700">
                    {statusOptions.map(s => <option key={s} value={s}>{s === 'All' ? '全部状态' : getStatusTitle(s)}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </header>

          <main className="mobile-main flex-1 overflow-auto custom-scrollbar px-4 md:px-6 py-6 board-main">
            <div className="w-full max-w-[1700px] mx-auto relative z-10 h-full flex flex-col">
              {filters.view === 'kanban' && (
                <div className="flex flex-col h-full">
                  <div className="mobile-kanban-layout flex flex-col xl:flex-row gap-5 items-stretch xl:h-[75vh] xl:min-h-[600px]">
                    <div className="mobile-kanban-column w-full xl:w-[320px] xl:shrink-0 flex flex-col min-h-[420px] xl:min-h-0">
                      {/* 桌面端保持原设计：左侧“需过目”列同时承载需过目与待处理事项，不单独新增“待处理”列。 */}
                      {renderColumnSection(
                        'Need Attention',
                        false,
                        filteredTasks.filter(task => {
                          const key = getBoardColumnKey(task);
                          return key === 'Need Attention' || key === 'To Do';
                        })
                      )}
                    </div>
                    <div className="mobile-kanban-column w-full xl:flex-1 xl:min-w-[400px] flex flex-col min-h-[420px] xl:min-h-0">
                      {renderColumnSection('In progress')}
                    </div>
                    <div className="mobile-kanban-column w-full xl:w-[320px] xl:shrink-0 flex flex-col gap-5 min-h-[420px] xl:min-h-0">
                      {renderColumnSection('Overdue')}
                      {renderColumnSection('Pending')}
                    </div>
                  </div>
                  <div className="mt-5">
                     <CompletedArchivePanel tasks={completedArchiveTasks} onEdit={setEditingTask} />
                  </div>
                </div>
              )}

              {filters.view === 'swimlane' && (
                <div className="pb-10">
                  {categories.filter(c => c !== 'All').length === 0 ? (
                    <div className="panel-glass rounded-2xl p-16 text-center text-slate-400">暂无板块数据</div>
                  ) : categories.filter(c => c !== 'All').map(cat => {
                    const catTasks = filteredTasks.filter(t => t.category === cat && getBoardColumnKey(t) !== 'Done');
                    if (catTasks.length === 0) return null;
                    return <CollapsibleSwimlane key={cat} catName={cat} columns={SWIMLANE_STATUSES} catTasks={catTasks} draggedOverCol={draggedOverCol} onDragOver={(e, key) => { e.preventDefault(); setDraggedOverCol(key); }} onDragLeave={() => setDraggedOverCol(null)} onDrop={handleDrop} onEdit={setEditingTask} />;
                  })}
                  <CompletedArchivePanel tasks={completedArchiveTasks} onEdit={setEditingTask} />
                </div>
              )}

              {filters.view === 'timeline' && <TimelineView tasks={filteredTasks} categories={categories} onEdit={setEditingTask} />}
              {filters.view === 'table' && <TableView tasks={filteredTasks} onEdit={setEditingTask} />}
            </div>
          </main>

          {editingTask && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 modal-overlay">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] border border-slate-200/50 modal-content">
                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                  <h2 className="text-lg font-bold text-slate-800">{editingTask.id ? '编辑事项' : '新增事项'}</h2>
                  <button onClick={() => setEditingTask(null)} className="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-full transition-colors" disabled={saving}><svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                {editingTask.id && (
                  <div className="task-detail-preview">
                    <div className="task-detail-preview-card">
                      <div className="mobile-detail-topline">
                        <span className="mobile-detail-chip status">{getStatusTitle(getBoardColumnKey(editingTask))}</span>
                        {editingTask.priority && <span className="mobile-detail-chip">{editingTask.priority.replace(' - ', ' ')}</span>}
                        {editingTask.isUrgent && <span className="mobile-detail-chip urgent">需过目</span>}
                      </div>
                      <h3 className="mobile-detail-title">{editingTask.task || '未命名事项'}</h3>
                      <div className="mobile-detail-meta">
                        <div className="mobile-detail-meta-item"><span className="mobile-detail-meta-label">板块</span><span className="mobile-detail-meta-value">{editingTask.category || '未分类'}</span></div>
                        <div className="mobile-detail-meta-item"><span className="mobile-detail-meta-label">负责人</span><span className="mobile-detail-meta-value">{editingTask.assignee || '未分配'}</span></div>
                        <div className="mobile-detail-meta-item"><span className="mobile-detail-meta-label">开始</span><span className="mobile-detail-meta-value">{editingTask.startDate || '未定'}</span></div>
                        <div className="mobile-detail-meta-item"><span className="mobile-detail-meta-label">截止</span><span className="mobile-detail-meta-value">{editingTask.dueDate || '未定'}</span></div>
                      </div>
                      <div className="mobile-progress-reader custom-scrollbar">
                        <div className="mobile-read-label">最新进展</div>
                        <p className="mobile-read-text">{editingTask.progress || '暂无最新进展'}</p>
                      </div>
                      {editingTask.detail && <div className="mobile-detail-note"><span className="mobile-read-label">内部说明备注</span><br />{editingTask.detail}</div>}
                      {editingTask.attachmentUrl && <a className="mobile-detail-link" href={editingTask.attachmentUrl} target="_blank" rel="noreferrer">打开相关链接</a>}
                    </div>
                  </div>
                )}
                <form id="task-form" onSubmit={handleSaveTask} className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div className="md:col-span-2"><label className="block text-[14px] font-semibold text-slate-600 mb-2">事项标题</label><input name="task" defaultValue={editingTask.task || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} required /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">板块分类</label><input name="category" defaultValue={editingTask.category || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">负责人</label><input name="assignee" defaultValue={editingTask.assignee || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">开始日期</label><input type="date" name="startDate" defaultValue={editingTask.startDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">截止日期</label><input type="date" name="dueDate" defaultValue={editingTask.dueDate || ''} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving} /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">当前业务状态</label><select name="status" defaultValue={editingTask.status || 'To Do'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}>{EDITABLE_STATUS_OPTIONS.map(option => <option key={option} value={option}>{getStatusTitle(option)}</option>)}</select></div>
                    <div><label className="block text-[14px] font-semibold text-slate-600 mb-2">优先级</label><select name="priority" defaultValue={editingTask.priority || 'P2 - 正常'} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] font-medium focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors" disabled={saving}><option value="P0 - 紧急">P0 - 紧急</option><option value="P1 - 优先">P1 - 优先</option><option value="P2 - 正常">P2 - 正常</option></select></div>
                  </div>
                  {editingTask.id && <div className="mobile-edit-hint">上方是手机阅读视图；需要修改时，直接在下面编辑并保存。</div>}
                  <div className="mobile-field-progress"><label className="block text-[14px] font-semibold text-slate-600 mb-2">最新进展 / 可编辑</label><textarea name="progress" defaultValue={editingTask.progress || ''} rows="6" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap leading-relaxed transition-colors" placeholder="写下当前最新进展，支持换行。" disabled={saving}></textarea></div>
                  <div className="mobile-field-detail"><label className="block text-[14px] font-semibold text-slate-600 mb-2">内部说明备注</label><textarea name="detail" defaultValue={editingTask.detail || ''} rows="4" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-[14px] focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 whitespace-pre-wrap transition-colors" placeholder="补充内部备注、风险点或待确认事项。" disabled={saving}></textarea></div>
                  <div><label className="flex items-center text-[14px] font-semibold text-slate-700 mb-3"><Icons.Link /><span className="ml-1.5">相关链接 (文档/网盘/网页)</span></label><input type="text" name="attachmentUrl" defaultValue={editingTask.attachmentUrl || ''} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-[13px] text-indigo-600 focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400" placeholder="请粘贴 http:// 或 https:// 开头的链接..." disabled={saving} /></div>
                  <div className="mt-2 p-3 bg-rose-50/30 border border-rose-200 rounded-xl"><label className="flex items-center cursor-pointer select-none w-fit"><input type="checkbox" name="isUrgent" defaultChecked={editingTask.isUrgent} className="w-4 h-4 text-rose-600 rounded border-slate-300 focus:ring-rose-500 cursor-pointer" disabled={saving} /><span className="ml-2 text-[14px] font-bold text-rose-700">需过目</span></label></div>
                </form>
                <div className="px-6 py-4 bg-slate-50/80 border-t border-slate-200 flex justify-between items-center">
                  {editingTask.id ? <button type="button" onClick={handleDeleteTask} disabled={saving} className="text-slate-400 hover:text-red-500 text-[14px] font-medium transition-colors">删除任务</button> : <div></div>}
                  <div className="flex space-x-3">
                    <button type="button" onClick={() => setEditingTask(null)} disabled={saving} className="px-5 py-2.5 text-[14px] font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">取消</button>
                    <button type="submit" form="task-form" disabled={saving} className="px-6 py-2.5 text-[14px] font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-all shadow-sm">{saving ? '保存中...' : '确认保存'}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
